<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEO MATRIX">
<link rel="apple-touch-icon" href="matrix-icon.png">
<link rel="apple-touch-icon-precomposed" href="matrix-icon.png">
<link rel="icon" type="image/png" href="matrix-icon.png">
<title>NEO MATRIX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;color:#0f0;font-family:'Courier New',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:30px 20px;text-align:center;
  background:radial-gradient(ellipse at center,#001a00 0%,#000 70%);
}
.icon{width:100px;height:100px;border-radius:22px;margin-bottom:16px;box-shadow:0 0 50px rgba(0,255,0,0.2);}
h1{font-size:32px;font-weight:700;color:#0f0;text-shadow:0 0 20px rgba(0,255,0,0.5);margin-bottom:4px;letter-spacing:4px}
.sub{font-size:11px;color:#060;margin-bottom:30px;letter-spacing:3px;text-transform:uppercase}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 44px;
  background:linear-gradient(135deg,#0f0,#0a0);
  color:#000;text-decoration:none;border-radius:14px;
  font-weight:700;font-size:17px;letter-spacing:1px;
  box-shadow:0 4px 30px rgba(0,255,0,0.2);transition:all 0.3s;
}
.btn:hover{transform:translateY(-3px);box-shadow:0 8px 40px rgba(0,255,0,0.4);}
.instructions{
  margin-top:35px;background:#0a0a0a;border:1px solid rgba(0,255,0,0.1);
  border-radius:16px;padding:20px;max-width:320px;text-align:left;font-size:13px;color:#060;line-height:1.6;
}
.instructions strong{color:#0f0}
code{color:#0f0;font-size:10px}
</style>
</head>
<body>
<img class="icon" src="matrix-icon.png" alt="NEO">
<h1>N.E.O.</h1>
<p class="sub">Matrix Agents Dashboard</p>
<a class="btn" href="https://matrix-hud.onrender.com/">⟐ Abrir Matrix</a>
<div class="instructions">
<strong>📱 Añadir a inicio:</strong><br>
1. ⎙ Compartir → <strong>Añadir a pantalla de inicio</strong><br>
2. El icono NEO matrix aparece automáticamente<br>
3. Toca el icono → abre directo al dashboard
</div>
</body>
</html>
