<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEO SCALPER">
<link rel="apple-touch-icon" href="neo-scalper-icon.png">
<link rel="apple-touch-icon-precomposed" href="neo-scalper-icon.png">
<link rel="icon" type="image/png" href="neo-scalper-icon.png">
<title>NEO SCALPER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  color:#fff;
  font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:30px 20px;
  background:radial-gradient(ellipse at center,#0d0d1a 0%,#0a0a0f 70%);
}
.logo{width:100px;height:100px;border-radius:22px;margin-bottom:16px;box-shadow:0 0 50px rgba(0,212,255,0.25);}
h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#00d4ff,#ff15d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:2px}
.sub{font-size:12px;color:#555;margin-bottom:30px;letter-spacing:3px;text-transform:uppercase}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 44px;
  background:linear-gradient(135deg,#00d4ff,#ff15d0);
  color:#fff;text-decoration:none;border-radius:14px;
  font-weight:600;font-size:17px;
  transition:all 0.3s;letter-spacing:0.5px;
  box-shadow:0 4px 30px rgba(0,212,255,0.2);
}
.btn:hover{transform:translateY(-3px);box-shadow:0 8px 40px rgba(0,212,255,0.4);}
.instructions{
  margin-top:35px;background:#0f0f16;border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;padding:20px;max-width:320px;text-align:left;font-size:13px;color:#666;
  line-height:1.6;
}
.instructions strong{color:#00d4ff}
</style>
</head>
<body>
<img class="logo" src="neo-scalper-icon.png" alt="NEO SCALPER">
<h1>⬡ NEO.SCALPER</h1>
<p class="sub">Binance BTC/USDT · Tiempo real</p>
<a class="btn" href="neo-scalper-dashboard.html">
  <span>⟡</span> Abrir Dashboard
</a>
<div class="instructions">
<strong>📱 Añadir a inicio:</strong><br>
1. Toca Compartir ⎙ en Safari<br>
2. <strong>Añadir a pantalla de inicio</strong><br>
3. El icono NEO aparece automáticamente
</div>
</body>
</html>
