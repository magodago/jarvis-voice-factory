let bullets=[],eBullets=[],particles=[],platformW=0,wallW=14,touchL=false,touchR=false;

let floors=[];
for(let n=0;n<=100;n++)floors.push({n,y:-(n*FG),stairSide:n%2===0?'left':'right',enemies:[],hasFire:Math.random()<0.3,fireX:0});
function initFloors(){platformW=W-20;wallW=14;for(const f of floors){if(f.n===0)continue;const sz=f.stairSide==='left'?90:platformW-90;const smin=f.stairSide==='left'?sz:40,smax=f.stairSide==='left'?platformW-40:sz;f.enemies=[];f.fireX=0;if(f.hasFire)f.fireX=smin+20+Math.random()*(smax-smin-50);const cnt=Math.random()<0.2+f.n*0.01?2:Math.random()<0.3+f.n*0.015?1:0;for(let j=0;j<cnt;j++)f.enemies.push({x:smin+Math.random()*(smax-smin-50),y:f.y-26,w:18,h:26,vx:0,type:Math.random()<0.3?'shooter':'walker',sTimer:Math.random()<0.3?90:999,hp:Math.random()<0.3?1:2});if(f.enemies.length>1)for(let i=1;i<f.enemies.length;i++)f.enemies[i].x=Math.max(smin+10,Math.min(smax-f.enemies[i].w-10,f.enemies[i-1].x+40+Math.random()*40))}}
function cf(){return floors[floorNum]}

function lockLandscape(){
 if(document.fullscreenElement)return;
 const el=document.documentElement;
 if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
 if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();lockLandscape();for(const t of e.changedTouches){if(t.clientX<W/2)touchL=true;else touchR=true}if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart()});
canvas.addEventListener('touchend',e=>{e.preventDefault();touchL=false;touchR=false;for(const t of e.touches){if(t.clientX<W/2)touchL=true;else touchR=true}});
canvas.addEventListener('touchcancel',()=>{touchL=false;touchR=false});
canvas.addEventListener('click',()=>{lockLandscape();if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart()});
canvas.addEventListener('mousedown',e=>{if(e.clientX<W/2)jumpWanted=true;else shootHeld=true});
canvas.addEventListener('mouseup',()=>{jumpWanted=false;shootHeld=false});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')jumpWanted=true;if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=true;if((e.key==='Enter'||e.key===' ')&&gameState==='intro'&&introT>30)start();if((e.key==='Enter'||e.key===' ')&&gameState==='dead')restart()});

  for(let bi=bullets.length-1;bi>=0;bi--){const b=bullets[bi];if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y+1<e.y+e.h&&b.y+b.h>e.y+1){e.hp--;bullets.splice(bi,1);sp(e.x+e.w/2,e.y+e.h/2,C.magenta,5);shakeT=4;shakeI=2;if(e.hp<=0){f.enemies=f.enemies.filter(x=>x!==e);score+=250;sp(e.x+e.w/2,e.y+e.h/2,C.red,10)}break}}

}

  const stX=fn.stairSide==='left'?fx+wallW:fx+platformW-wallW-24,stY=fy-42;ctx.fillStyle='#0d0028';ctx.fillRect(stX,stY,24,42);ctx.strokeStyle=C.cyan+'35';ctx.strokeRect(stX,stY,24,42);

 }
 if(gameState==='playing'||gameState==='dead'){const a=P.inv>0?.4+Math.sin(Date.now()*.3)*.3:1;ctx.globalAlpha=a;const py=P.y-cameraY;if(playerImg&&playerImg.complete&&playerImg.naturalWidth>0){ctx.drawImage(playerImg,P.x-6,py-4,36,40)}else{ctx.fillStyle=C.cyan;ctx.fillRect(P.x,py+8,P.w,P.h-10);ctx.fillRect(P.x+6,py,10,10);ctx.fillStyle=C.white;ctx.fillRect(P.x+8,py+2,6,3);}const lo=Math.sin(Date.now()*.015)*3;ctx.fillStyle=C.cyan+'80';ctx.fillRect(P.x+2,py+P.h-5,6,6+lo);ctx.fillRect(P.x+P.w-8,py+P.h-5,6,6-lo);ctx.fillStyle=C.magenta;if(P.dir>0)ctx.fillRect(P.x+P.w,py+12,8,3);else ctx.fillRect(P.x-8,py+12,8,3);ctx.globalAlpha=1}
