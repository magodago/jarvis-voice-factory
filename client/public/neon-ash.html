<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON ASH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060010;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
#game{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}
.btn{position:absolute;bottom:16px;border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;font:bold 11px monospace;color:#fff;border:2px solid;z-index:10;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
#btnJump{left:20px;background:rgba(0,212,255,0.2);border-color:rgba(0,212,255,0.5);color:#00d4ff}
#btnJump:active{background:rgba(0,212,255,0.5)}
#btnShoot{right:20px;background:rgba(255,21,208,0.2);border-color:rgba(255,21,208,0.5);color:#ff15d0}
#btnShoot:active{background:rgba(255,21,208,0.5)}
.debug{position:absolute;top:40px;left:10px;color:#0f0;font:9px monospace;z-index:20;pointer-events:none}
</style>
</head>
<body>
<div id="game">
<canvas id="c"></canvas>
<button id="btnJump" class="btn">SALTAR</button>
<button id="btnShoot" class="btn">DISPARO</button>
<div id="dbg" class="debug"></div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const btnJump=document.getElementById('btnJump'),btnShoot=document.getElementById('btnShoot');
const dbg=document.getElementById('dbg');

let W,H,gameState='intro',score=0,floorNum=0,highScore=parseInt(localStorage.getItem('neonash_hs')||0);
let cameraY=0,shakeTimer=0,shakeIntensity=0,introTimer=0;
let jumpWanted=false, shootHeld=false;
let climbDir=0, climbProgress=0; // 0=not climbing, 1/-1=climbing right/left, progress 0→1

const FW=340,FH=8,FG=92,WW=10,PLAYER_W=24,PLAYER_H=32;
const C={bg:'#060010',cyan:'#00d4ff',magenta:'#ff15d0',white:'#e8e0ff',green:'#00ff88',amber:'#ffb347',red:'#ff4466',dim:'#1a0030',panel:'#0a0020',purple:'#7b00ff',wall:'#0d0030'};

const P={x:0,y:0,w:PLAYER_W,h:PLAYER_H,dir:-1,vx:1.8,vy:0,onGround:false,hp:3,maxHp:3,shootCd:0,inv:0};
let bullets=[],eBullets=[],particles=[];

// Floor data: pre-gen 100 floors with alternating stair direction
let floors=[];
for(let n=0;n<=100;n++){
 floors.push({
  n, y:-(n*FG), stairSide:n%2===0?'left':'right',
  enemies:[], hasFire:Math.random()<0.35, fireX:0,
  ex:(400-FW)/2
 });
}

// Spawn enemies
for(const f of floors){
 if(f.n===0)continue; // no enemies on floor 0
 const cnt=Math.random()<0.3+f.n*0.01?2:Math.random()<0.4+f.n*0.015?1:0;
 for(let j=0;j<cnt;j++){
  f.enemies.push({
   x:f.ex+30+Math.random()*(FW-80),y:f.y-28,
   w:20,h:28,vx:(Math.random()>.5?1:-1)*0.7,
   type:Math.random()<0.3?'shooter':'walker',
   sTimer:Math.random()<0.3?100:999,hp:Math.random()<0.3?1:2
  });
 }
 if(f.hasFire)f.fireX=f.ex+40+Math.random()*(FW-80);
}

function cf(){return floors[floorNum]}

// ── INPUT ──
btnJump.addEventListener('pointerdown',e=>{e.preventDefault();jumpWanted=true});
btnShoot.addEventListener('pointerdown',e=>{e.preventDefault();shootHeld=true});
btnShoot.addEventListener('pointerup',e=>{e.preventDefault();shootHeld=false});
btnShoot.addEventListener('pointerleave',e=>{shootHeld=false});
btnJump.addEventListener('pointerleave',e=>{jumpWanted=false});
window.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft'||e.key==='a')jumpWanted=true;
 if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=true;
 if((e.key==='Enter'||e.key===' ')&&gameState==='intro'&&introTimer>30)start();
 if((e.key==='Enter'||e.key===' ')&&gameState==='dead')restart();
});
window.addEventListener('keyup',e=>{
 if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=false;
});
canvas.addEventListener('click',()=>{
 if(gameState==='intro'&&introTimer>30)start();
 if(gameState==='dead')restart();
});

function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H}
window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*3,vy:-2-Math.random()*3,life:10+Math.random()*15,c,size:1+Math.random()*2})}
function getFY(n){return -(n*FG)}

function start(){
 gameState='playing';score=0;floorNum=0;climbProgress=0;climbDir=0;
 P.hp=P.maxHp;P.inv=0;P.shootCd=0;P.dir=-1;P.vx=1.8;P.vy=0;P.onGround=true;
 bullets=[];eBullets=[];particles=[];
 const f=cf();
 // Start on RIGHT side, moving LEFT
 P.x=f.ex+FW-P.w-20; P.y=f.y-P.h;
 cameraY=f.y-H*0.4;
}
function restart(){gameState='intro';introTimer=0;P.hp=P.maxHp;floorNum=0;score=0;bullets=[];eBullets=[];particles=[];cameraY=0}
function die(){gameState='dead';if(score>highScore){highScore=score;localStorage.setItem('neonash_hs',highScore)}sp(P.x,P.y,C.magenta,30);shakeTimer=30;shakeIntensity=10}

function getStair(f){
 if(f.stairSide==='left')return{x:f.ex+10,y:f.y-36,w:30,h:36};
 return{x:f.ex+FW-40,y:f.y-36,w:30,h:36};
}

function update(){
 if(gameState==='intro'){introTimer++;if(introTimer>300)introTimer=300;return}
 if(gameState==='dead'){if(shakeTimer>0)shakeTimer--;return}

 const f=cf();
 const floorY=f.y, lWall=f.ex+WW, rWall=f.ex+FW-WW;

 // ── CLIMBING STAIRS ──
 if(climbDir!==0){
  climbProgress+=0.018; // climb speed
  if(climbProgress>=1){
   // Arrived at next floor
   floorNum++;score+=100;climbProgress=0;
   const nf=cf();
   // Place player on opposite side of new floor
   if(climbDir===1){
    // Was climbing right → arrive on right side, continue right
    P.x=nf.ex+FW-P.w-20; P.dir=-1;
   }else{
    // Was climbing left → arrive on left side, continue left
    P.x=nf.ex+20; P.dir=1;
   }
   P.y=nf.y-P.h; P.vy=0; P.onGround=true; P.vx=1.8;
   climbDir=0;
   sp(P.x+P.w/2,P.y,C.cyan,10);
  }else{
   // Move diagonally
   const fromF=floors[floorNum], toF=floors[floorNum+1];
   const fromSt=fromF.stairSide==='left'?fromF.ex+25:fromF.ex+FW-25;
   const toSt=toF.stairSide==='left'?toF.ex+FW-25:toF.ex+25;
   P.x=fromSt+(toSt-fromSt)*climbProgress;
   P.y=fromF.y+(toF.y-fromF.y)*climbProgress-P.h;
   P.onGround=false; P.vy=0;
  }
  cameraY+=(f.y-H*0.5-cameraY)*0.08;
  return;
 }

 // ── NORMAL MOVEMENT ──
 P.x+=P.vx*P.dir;
 if(P.x<=lWall){P.dir=1;P.x=lWall}
 if(P.x+P.w>=rWall){P.dir=-1;P.x=rWall-P.w}

 // Stair trigger — must be at the CORRECT edge for this floor's stair
 const st=getStair(f);
 const atStairEdge=(f.stairSide==='left'&&P.x<=lWall+15)||(f.stairSide==='right'&&P.x+P.w>=rWall-15);
 if(atStairEdge && P.onGround && P.y+P.h>=st.y && P.y<=st.y+st.h){
  // Start climbing in direction TOWARD the stair
  climbDir=f.stairSide==='left'?1:-1; // left stair → climb right, right stair → climb left
  climbProgress=0;
  P.vx=0;
  return;
 }

 // Gravity + floor
 P.onGround=false;
 if(P.y+P.h>=floorY-2&&P.y+P.h<=floorY+14){P.y=floorY-P.h;P.vy=0;P.onGround=true}
 // Can't fall through floor
 if(P.y+P.h>floorY+20){P.y=floorY-P.h;P.vy=0;P.onGround=true}
 // Ceiling collision (can't go above ceiling = next floor - gap)
 const ceilY=floorY-FG+FH;
 if(P.y<ceilY){P.y=ceilY;P.vy=0}
 if(!P.onGround){P.vy+=0.5;P.y+=P.vy}

 // Jump
 if(jumpWanted && P.onGround){P.vy=-9;jumpWanted=false;P.onGround=false}

 // Shoot
 if(shootHeld && P.shootCd<=0){
  bullets.push({x:P.x+P.w/2,y:P.y+P.h/2,vx:P.dir*7,vy:0,w:10,h:3});
  P.shootCd=14;sp(bullets[bullets.length-1].x,bullets[bullets.length-1].y,C.cyan,2);
 }
 if(P.shootCd>0)P.shootCd--;
 if(P.inv>0)P.inv--;

 // Bullets
 for(const b of bullets)b.x+=b.vx; bullets=bullets.filter(b=>b.x>-50&&b.x<450);
 for(const eb of eBullets)eb.x+=eb.vx; eBullets=eBullets.filter(eb=>eb.x>-50&&eb.x<450);

 // Enemies
 for(const e of f.enemies){
  e.x+=e.vx;if(e.x<lWall+5||e.x+e.w>rWall-5)e.vx*=-1;
  e.sTimer--;if(e.sTimer<=0&&e.type==='shooter'){eBullets.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(P.x>e.x?1:-1)*3,vy:0,w:7,h:3});e.sTimer=100+Math.random()*80}
  for(let bi=bullets.length-1;bi>=0;bi--){const b=bullets[bi];if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y+1<e.y+e.h&&b.y+b.h>e.y+1){e.hp--;bullets.splice(bi,1);sp(e.x+e.w/2,e.y+e.h/2,C.magenta,5);shakeTimer=4;shakeIntensity=2;if(e.hp<=0){f.enemies=f.enemies.filter(x=>x!==e);score+=250;sp(e.x+e.w/2,e.y+e.h/2,C.red,10)}break}}
  if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&e.y<P.y+P.h&&e.y+e.h>P.y){P.hp--;P.inv=50;sp(P.x+P.w/2,P.y+P.h/2,C.red,10);shakeTimer=12;shakeIntensity=7;if(P.hp<=0)die()}
 }

 // Enemy bullets
 for(let ei=eBullets.length-1;ei>=0;ei--){const eb=eBullets[ei];if(P.inv<=0&&eb.x<P.x+P.w&&eb.x+eb.w>P.x&&eb.y+1<P.y+P.h&&eb.y+eb.h>P.y+1){P.hp--;P.inv=50;eBullets.splice(ei,1);shakeTimer=10;shakeIntensity=6;sp(P.x+P.w/2,P.y+P.H/2,C.magenta,8);if(P.hp<=0)die()}}

 // Fire
 if(f.hasFire){const hx=f.fireX,hy=f.y-12;if(P.inv<=0&&P.x+P.w>hx&&P.x<hx+18&&P.y+P.h>hy&&P.y<hy+14){P.hp--;P.inv=35;sp(P.x+P.w/2,P.y+P.h/2,C.amber,10);if(P.hp<=0)die()}}

 // Particles
 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}particles=particles.filter(p=>p.life>0);
 if(shakeTimer>0)shakeTimer--;
 cameraY+=(f.y-H*0.5-cameraY)*0.1;

 // Debug
 dbg.textContent='PISO:'+floorNum+' ONG:'+P.onGround+' JMP:'+jumpWanted+' CLIMB:'+climbDir;
}

function draw(){
 ctx.save();
 const sx=shakeTimer>0?(Math.random()-.5)*shakeIntensity:0,sy=shakeTimer>0?(Math.random()-.5)*shakeIntensity:0;
 ctx.translate(sx,sy);ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
 const ox=(W-400)/2;
 const f=cf(),fNext=floors[floorNum+1];

 for(const fn of[f,fNext]){
  if(!fn)continue;const fy=fn.y-cameraY;if(fy<-140||fy>H+140)continue;
  const fx=ox+fn.ex;
  // Platform
  ctx.fillStyle=C.panel;ctx.fillRect(fx,fy,FW,FH);
  ctx.strokeStyle=C.cyan+'40';ctx.lineWidth=1;ctx.strokeRect(fx,fy,FW,FH);
  ctx.strokeStyle=C.cyan+'20';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+FW,fy);ctx.stroke();
  // Walls
  ctx.fillStyle=C.wall;ctx.fillRect(fx,fy-FG+8,WW,FG-8);ctx.fillRect(fx+FW-WW,fy-FG+8,WW,FG-8);
  // Stair (only one side per floor)
  const st=getStair(fn);const sy=st.y-cameraY;
  ctx.fillStyle=C.dim;ctx.fillRect(ox+st.x,sy,st.w,st.h);
  ctx.strokeStyle=C.cyan+'30';ctx.strokeRect(ox+st.x,sy,st.w,st.h);
  for(let i=0;i<4;i++){ctx.fillStyle=C.cyan+'12';ctx.fillRect(ox+st.x+3,sy+st.h-(i+1)*8,st.w-6,4)}
  // Fire
  if(fn.hasFire){const hx=ox+fn.fireX,hy=fn.y-12-cameraY,fl=Math.sin(Date.now()*0.02+fn.n)*3;ctx.globalAlpha=0.7+Math.random()*.3;for(let i=0;i<3;i++){ctx.fillStyle=C.amber;ctx.fillRect(hx+i*5,hy-fl-i*3,5,10+i*3)}ctx.globalAlpha=1}
  // Enemies
  for(const e of fn.enemies){const ey=e.y-cameraY,ec=e.type==='shooter'?C.magenta:C.purple;ctx.fillStyle=ec;ctx.fillRect(ox+e.x+2,ey+6,e.w-4,e.h-10);ctx.fillRect(ox+e.x+5,ey,10,9);ctx.fillStyle=e.type==='shooter'?C.red:C.amber;ctx.fillRect(ox+e.x+6,ey+2,3,3);ctx.fillRect(ox+e.x+11,ey+2,3,3);if(e.type==='shooter'){ctx.fillStyle=C.red;ctx.fillRect(ox+e.x+(e.vx>0?e.w:0),ey+13,7,2)}}
 }

 // Player
 if(gameState==='playing'||gameState==='dead'){const a=P.inv>0?.4+Math.sin(Date.now()*.3)*.3:1;ctx.globalAlpha=a;const px=ox+P.x,py=P.y-cameraY;ctx.fillStyle=C.cyan;ctx.fillRect(px,py+9,P.w,P.h-12);ctx.fillRect(px+7,py,10,10);ctx.fillStyle=C.white;ctx.fillRect(px+9,py+2,6,3);const lo=Math.sin(Date.now()*.015)*3;ctx.fillStyle=C.cyan+'80';ctx.fillRect(px+3,py+P.h-5,7,7+lo);ctx.fillRect(px+14,py+P.h-5,7,7-lo);ctx.fillStyle=C.magenta;if(P.dir>0)ctx.fillRect(px+P.w,py+14,9,3);else ctx.fillRect(px-9,py+14,9,3);ctx.globalAlpha=1}
 for(const b of bullets){ctx.fillStyle=C.cyan;ctx.fillRect(ox+b.x,b.y-cameraY,b.w,b.h)}
 for(const eb of eBullets){ctx.fillStyle=C.magenta;ctx.fillRect(ox+eb.x,eb.y-cameraY,eb.w,eb.h)}
 for(const p of particles){ctx.fillStyle=p.c;ctx.globalAlpha=p.life/30;ctx.fillRect(ox+p.x,p.y-cameraY,p.size,p.size)}ctx.globalAlpha=1;ctx.restore();

 // HUD
 ctx.fillStyle=C.panel+'CC';ctx.fillRect(0,0,W,38);ctx.strokeStyle=C.cyan+'25';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,38);ctx.lineTo(W,38);ctx.stroke();
 ctx.fillStyle=C.cyan;ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.fillText(`PISO ${Math.max(0,floorNum)}`,10,26);
 ctx.fillStyle=C.white;ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(`${score}`,W/2,26);
 ctx.textAlign='right';ctx.font='12px monospace';let h='';for(let i=0;i<P.maxHp;i++)h+=i<P.hp?'♥':'♡';ctx.fillStyle=C.red;ctx.fillText(h,W-10,26);
}

function drawIntro(){
 ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);const ox=(W-400)/2;
 ctx.fillStyle=C.dim;ctx.fillRect(ox+60,0,280,H);
 for(let i=0;i<12;i++){const y=H*.35-i*25+Math.sin(Date.now()*.002+i)*3;ctx.fillStyle=C.cyan+(10+i*2).toString(16);ctx.fillRect(ox+80,y,240,1)}
 ctx.fillStyle=C.cyan;ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('NEON ASH',W/2,H*.2);
 ctx.fillStyle=C.magenta;ctx.font='11px monospace';ctx.fillText('cyber tower',W/2,H*.2+20);
 if(introTimer>30){const p=Math.sin(Date.now()*.005)*3;ctx.fillStyle=C.cyan;ctx.font='bold 13px monospace';ctx.fillText('▶ TOCA PARA ENTRAR',W/2,H*.65+p)}
 if(highScore>0){ctx.fillStyle=C.amber;ctx.font='10px monospace';ctx.fillText('🏆 '+highScore,W/2,H-30)}
}

function drawDead(){
 ctx.fillStyle=C.bg+'DD';ctx.fillRect(0,0,W,H);ctx.fillStyle=C.red;ctx.font='bold 22px monospace';ctx.textAlign='center';ctx.fillText('MUERTO',W/2,H/2-45);
 ctx.fillStyle=C.cyan;ctx.font='14px monospace';ctx.fillText(`Piso ${floorNum}`,W/2,H/2-15);ctx.fillStyle=C.white;ctx.font='20px monospace';ctx.fillText(`${score}`,W/2,H/2+15);
 if(score>=highScore&&score>0){ctx.fillStyle=C.amber;ctx.font='9px monospace';ctx.fillText('🏆 NUEVO RÉCORD',W/2,H/2+35)}
 const a=.4+Math.sin(Date.now()*.004)*.3;ctx.fillStyle=C.white+Math.floor(a*255).toString(16).padStart(2,'0');ctx.font='9px monospace';ctx.fillText('toca para reiniciar',W/2,H/2+60);
}

function loop(){resize();update();ctx.clearRect(0,0,W,H);if(gameState==='intro')drawIntro();else if(gameState==='dead'){draw();drawDead()}else draw();requestAnimationFrame(loop)}
resize();loop();
</script>
</body>
</html>
