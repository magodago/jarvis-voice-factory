const C={bg:'#060010',cy:'#00d4ff',mg:'#ff15d0',wh:'#eee',am:'#ffb347',re:'#ff4466',pu:'#7b00ff',gn:'#00ff88',or:'#ff8800'};

// Audio
const AC=window.AudioContext||window.webkitAudioContext;let actx,musicGain,musicOsc=[];
function beep(f,d,t,v){v=v||0.08;if(!actx)try{actx=new AC()}catch(e){return}const o=actx.createOscillator(),g=actx.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d)}
function sfx(t){if(t==='shoot')beep(800,0.06,'square',0.04);if(t==='rail')beep(200,0.15,'sawtooth',0.06);if(t==='hit')beep(120,0.1,'sawtooth',0.05);if(t==='kill')beep(300,0.08,'square',0.04);if(t==='mine')beep(60,0.2,'sawtooth',0.07);if(t==='boss')beep(200,0.3,'triangle',0.1);if(t==='door')beep(600,0.1,'triangle',0.05);if(t==='dash')beep(1000,0.05,'square',0.03);if(t==='power')beep(500,0.1,'sine',0.05)}
function startMusic(){if(!actx)try{actx=new AC()}catch(e){return}if(musicOsc.length)return;musicGain=actx.createGain();musicGain.gain.value=0.02;musicGain.connect(actx.destination);
 let notes=[130.81,164.81,196,261.63];for(let i=0;i<4;i++){let o=actx.createOscillator();o.type='triangle';o.frequency.value=notes[i];o.connect(musicGain);o.start();musicOsc.push(o)}
}
function stopMusic(){musicOsc.forEach(o=>{try{o.stop()}catch(e){}});musicOsc=[]}

// Difficulty
function diff(){return 1+Math.floor(room/5)}
function spawnEnemies(){
 const n=1+Math.floor(Math.random()*2)+Math.floor(room/8);
 for(let i=0;i<Math.min(n,5);i++){
  let tp='walker';const rnd=Math.random();
  if(rnd<0.2+room*0.01)tp='shooter';
  else if(rnd<0.35+room*0.01)tp='heavy';
  else if(rnd<0.45&&room>10)tp='suicide';
  enemies.push({x:0,y:0,w:tp==='heavy'?80:56,h:tp==='heavy'?90:72,hp:tp==='heavy'?4:tp==='suicide'?1:2+Math.floor(room/15),
   type:tp,cd:tp==='shooter'?80:tp==='suicide'?30:99,speed:tp==='suicide'?0.8:tp==='heavy'?0.15:0.3});
 }
}

function newRoom(){
 enemies=[];eb=[];mines=[];powerUps=[];bossActive=false;
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2,l=px+lw,r=px+pw-lw,fl=H*.82;
 theme=room>0&&room%5===0?(Math.random()<.5?'alarm':'toxic'):'normal';
 if(room>0&&room%10===0){
  bossActive=true;
  enemies.push({x:r-80,y:fl-66,w:120,h:120,hp:15+Math.floor(room/5),type:'boss',cd:40,speed:0.15});
 }else{spawnEnemies()}
 for(const e of enemies){e.x=r-30-e.w-Math.random()*(r-l-200-e.w);e.y=fl-e.h}
 for(let i=0;i<1+Math.floor(Math.random()*2);i++){mines.push({x:l+60+Math.random()*(r-l-120),y:fl-2})}
}

// Touch
let touchL=false,touchR=false,lastTap=0;
cv.addEventListener('touchstart',e=>{e.preventDefault();if(state==='intro'){start();startMusic();return}if(state==='dead'){restart();return};
 for(const t of e.changedTouches){
  if(t.clientX<W/2){touchL=true;let now=Date.now();if(now-lastTap<300){P.dashCd=0;doubleTap=now}lastTap=now}
  else touchR=true
}});
cv.addEventListener('touchend',e=>{e.preventDefault();touchL=false;touchR=false;
 for(const t of e.touches){if(t.clientX>=W/2)touchR=true}
});
cv.addEventListener('touchcancel',e=>{touchL=false;touchR=false});
cv.addEventListener('mousedown',e=>{if(state==='intro'){start();startMusic();return}if(state==='dead'){restart();return}if(e.clientX<W/2){touchL=true;let now=Date.now();if(now-lastTap<300){P.dashCd=0;doubleTap=now}lastTap=now}else touchR=true});
cv.addEventListener('mouseup',e=>{touchL=false;touchR=false});
window.addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')jump=true;if(e.key==='d'||e.key===' '||e.key==='ArrowRight')shoot=true;if(e.key==='Enter'){if(state==='intro'){start();startMusic()}if(state==='dead')restart()}});
window.addEventListener('keyup',e=>{if(e.key==='d'||e.key===' '||e.key==='ArrowRight')shoot=false});
cv.addEventListener('click',()=>{if(state==='intro'){start();startMusic()}if(state==='dead')restart()});

function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W;cv.height=H}window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:-1-Math.random()*4,life:10+Math.random()*12,c,sz:1+Math.random()*3})}

function start(){
 state='play';room=0;kills=0;startTime=Date.now();
 P.hp=5;P.inv=0;P.shield=0;P.fireTimer=0;P.railAmmo=0;P.dashCd=0;
 P.cd=0;P.vx=1.1;P.vy=0;P.onGround=true;bullets=[];particles=[];
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2;P.x=px+lw+10;newRoom();P.y=H*.82-P.h;
}
function restart(){state='intro';room=0;bullets=[];eb=[];particles=[];enemies=[];stopMusic()}
function die(){state='dead';if(room>best){best=room;localStorage.setItem('na_best',best)}sp(P.x+P.w/2,P.y,C.mg,30);shake=30;beep(80,0.3,'sawtooth',0.08);stopMusic()}
function nextRoom(){trans=20;room++;const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2;P.x=px+lw+10;P.y=H*.82-P.h;newRoom();sp(P.x,P.y,C.cy,15);sfx('door')}

function update(){
 if(state!=='play')return;if(trans>0){trans--;return}
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2,fl=H*.82,l=px+lw,r=px+pw-lw;
 // Jump from touch
 if(touchL&&!jump&&P.onGround){jump=true;touchL=false}if(touchR)shoot=true;if(!touchR)shoot=false;

 // Dash on double tap
 if(P.dashCd<=0&&doubleTap>0&&Date.now()-doubleTap<500&&P.onGround){
  P.vx=3.5;P.dashCd=60;doubleTap=0;P.inv=15;sp(P.x,P.y,C.cy,10);sfx('dash');
 }
 if(P.dashCd>0){P.dashCd--;if(P.dashCd<40)P.vx=1.1}

 P.x+=P.vx;
 if(P.x<l)P.x=l;if(P.x+P.w>r){nextRoom();return}
 P.onGround=false;
 if(P.y+P.h>=fl-2&&P.vy>=0){P.y=fl-P.h;P.vy=0;P.onGround=true}
 if(!P.onGround){P.vy+=0.4;P.y+=P.vy}
 if(jump&&P.onGround){P.vy=-8;P.y-=2;jump=false;P.onGround=false;touchL=false}
 // Shoot
 if(shoot&&P.cd<=0){
  if(P.railAmmo>0){bullets.push({x:P.x+P.w,y:P.y+P.h/2-2,vx:12,w:16,h:4,rail:true});P.railAmmo--;P.cd=20;sfx('rail');sp(P.x+P.w,P.y+P.h/2,C.or,5)}
  else{let dmg=P.fireTimer>0?2:1;bullets.push({x:P.x+P.w,y:P.y+P.h/2-2,vx:7,w:10,h:3,dmg});P.cd=P.fireTimer>0?8:14;sfx('shoot');sp(P.x+P.w,P.y+P.h/2,C.fireTimer>0?C.or:C.cy,2)}
 }
 if(P.cd>0)P.cd--;if(P.inv>0)P.inv--;if(P.shield>0)P.shield--;if(P.fireTimer>0)P.fireTimer--;
 for(const b of bullets)b.x+=b.vx;bullets=bullets.filter(b=>b.x<W+20&&b.x>-20);
 for(const e of eb)e.x+=e.vx;eb=eb.filter(e=>e.x>-20);

 // Enemies
 for(const e of enemies){
  if(e.type==='boss'){e.x-=e.speed;e.cd--;if(e.cd<=0){eb.push({x:e.x,y:fl-30,vx:-3.5,w:8,h:4});e.cd=50-diff()*2}}
  else if(e.type==='suicide'){e.x-=e.speed;if(Math.abs(e.x-P.x)<30){e.hp=0;sp(e.x+e.w/2,fl-10,C.or,20);shake=18;sfx('mine');P.hp-=2;P.inv=50;if(P.hp<=0)die()}}
  else{e.x-=e.speed;if(e.x<l+10){e.x=r-10;e.patrolDir=1}e.cd--;if(e.cd<=0&&e.type==='shooter'){eb.push({x:e.x,y:fl-20,vx:-3,w:6,h:3});e.cd=90-diff()*3+Math.random()*40}}
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];
   if(b.x>e.x&&b.x<e.x+e.w&&Math.abs(b.y-(fl-e.h/2))<25){
    e.hp-=(b.dmg||1);if(!b.rail)bullets.splice(i,1);sp(e.x+e.w/2,fl-e.h/2,C.mg,4);shake=4;sfx('hit');
    if(e.hp<=0){enemies=enemies.filter(x=>x!==e);kills++;sp(e.x+e.w/2,fl-e.h/2,C.re,8);sfx('kill');
     if(e.type==='boss'){bossActive=false;sp(e.x+e.w/2,fl-e.h/2,C.cy,25);for(let i=0;i<3;i++)powerUps.push({x:e.x+20+i*30,y:fl-40,type:i===0?'heal':i===1?'fire':'shield',life:250})}
     else{
      if(Math.random()<.15)powerUps.push({x:e.x,y:fl-40,type:'heal',life:200});
      if(Math.random()<.08)powerUps.push({x:e.x+15,y:fl-40,type:'shield',life:200});
      if(Math.random()<.08)powerUps.push({x:e.x+30,y:fl-40,type:'fire',life:200});
      if(Math.random()<.05)powerUps.push({x:e.x+45,y:fl-40,type:'rail',life:200});
     }
    }break;
   }
  }
  if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(P.y-fl+P.h/2+e.h/2)<e.h/2+P.h/2){
   P.hp-=e.type==='boss'?2:e.type==='suicide'?2:1;
   if(P.shield>0){P.hp++;P.shield=0;sp(P.x,P.y,C.cy,15)}else{P.inv=e.type==='boss'?60:40;sp(P.x+P.w/2,P.y,C.re,8);shake=e.type==='boss'?20:10}
   sfx('hit');if(P.hp<=0)die()
  }
 }
 for(let i=eb.length-1;i>=0;i--){const e=eb[i];if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(e.y-P.y-P.h/2)<16){P.hp--;P.inv=40;eb.splice(i,1);shake=8;sp(P.x+P.w/2,P.y,C.mg,6);sfx('hit');if(P.hp<=0)die()}}
 for(const m of mines){const dx=P.x+P.w/2-m.x,dy=P.y+P.h/2-(fl-2);if(P.inv<=0&&Math.sqrt(dx*dx+dy*dy)<20){P.hp--;P.inv=35;sp(m.x,fl-2,C.mg,15);shake=14;sfx('mine');if(P.hp<=0)die()}}
 // Power-ups
 for(let i=powerUps.length-1;i>=0;i--){const pu=powerUps[i];pu.life--;if(pu.life<=0){powerUps.splice(i,1);continue}
  const dx=P.x+P.w/2-pu.x,dy=P.y+P.h/2-pu.y;
  if(Math.sqrt(dx*dx+dy*dy)<18){
   if(pu.type==='heal')P.hp=Math.min(5,P.hp+2);
   else if(pu.type==='shield')P.shield=180;
   else if(pu.type==='fire')P.fireTimer=300;
   else if(pu.type==='rail')P.railAmmo=Math.min(5,P.railAmmo+3);
   sp(pu.x,pu.y,pu.type==='fire'?C.or:pu.type==='shield'?C.cy:pu.type==='rail'?C.or:C.gn,8);powerUps.splice(i,1);sfx('power')
  }
 }
 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}particles=particles.filter(p=>p.life>0);
 if(shake>0)shake--;
 if(theme==='toxic'&&Math.random()<.005*Math.min(3,1+room/10)&&P.inv<=0){P.hp--;P.inv=20;sp(P.x+P.w/2,P.y,C.gn,5);if(P.hp<=0)die()}
}

function draw(){
 const s=(shake>0)?(Math.random()-.5)*shake*.5:0;cx.save();cx.translate(s,s);
 if(theme==='alarm')cx.fillStyle='#100000';else if(theme==='toxic')cx.fillStyle='#001008';else cx.fillStyle=C.bg;
 cx.fillRect(0,0,W,H);
 if(trans>0){cx.globalAlpha=trans/20;cx.fillStyle='#fff';cx.fillRect(0,0,W,H);cx.globalAlpha=1;cx.restore();return}

 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2,fl=H*.82,l=px,r=px+pw;
 // Rain
 if(Math.random()<.3){particles.push({x:Math.random()*W,y:-5,vx:-0.5,vy:3+Math.random()*4,life:60+Math.random()*40,c:C.cy,sz:.5})}
 // Room bg with cyberpunk effects
 cx.fillStyle=theme==='alarm'?'#1a0008':theme==='toxic'?'#001208':'#0d0025';cx.fillRect(px,0,pw,H);
 // Vertical neon strips
 for(let i=0;i<4;i++){
  let nx=px+pw*0.2*i+20;if(i===3)nx=px+pw-30;
  cx.fillStyle=C.cy+'15';cx.fillRect(nx,0,2,H);
 }
 // Horizontal accent lines
 cx.fillStyle=C.mg+'20';cx.fillRect(px,fl-50,pw,1);cx.fillRect(px,fl-100,pw,1);
 cx.fillStyle=C.cy+'20';cx.fillRect(px,fl-25,pw,1);cx.fillRect(px,fl-75,pw,1);
 // Sparks occasionally
 if(Math.random()<0.05){let sx=px+20+Math.random()*(pw-40);sp(sx,Math.random()*H,C.cy,1)}
 // Ceiling neon sign
 cx.fillStyle=C.cy+'25';cx.fillRect(px+20,8,pw-40,16);
 cx.strokeStyle=C.cy+'60';cx.lineWidth=1;cx.strokeRect(px+20,8,pw-40,16);
 cx.fillStyle=C.cy;cx.font='bold 9px monospace';cx.textAlign='center';cx.fillText('NEON ASH // CYBER TOWER',px+pw/2,20);

 cx.strokeStyle=C.cy+'06';for(let y=0;y<H;y+=30){cx.beginPath();cx.moveTo(px,y);cx.lineTo(px+pw,y);cx.stroke()}
 // Walls
 cx.fillStyle=theme==='alarm'?'#1a0008':theme==='toxic'?'#00100a':'#0d0020';cx.fillRect(px,0,lw,H);cx.fillRect(px+pw-lw,0,lw,H);
 // Wall neon lines
 cx.strokeStyle=C.cy+'80';cx.lineWidth=2;cx.shadowColor=C.cy;cx.shadowBlur=8;
 cx.beginPath();cx.moveTo(px+lw,0);cx.lineTo(px+lw,H);cx.stroke();
 cx.beginPath();cx.moveTo(px+pw-lw,0);cx.lineTo(px+pw-lw,H);cx.stroke();
 cx.shadowBlur=0;
 // Wall lamps
 for(let wy=40;wy<fl-20;wy+=60){
  cx.fillStyle=C.am+'50';cx.beginPath();cx.arc(px+lw/2,wy,6,0,Math.PI*2);cx.fill();
  cx.fillStyle=C.am+'50';cx.beginPath();cx.arc(px+pw-lw/2,wy,6,0,Math.PI*2);cx.fill();
 }

 // Floor glow
 let hb=(Math.sin(Date.now()*.002+room)+1)/2;
 cx.fillStyle=C.cy+(18+Math.floor(hb*12)).toString(16);cx.fillRect(px,fl-2,pw,8);
 cx.strokeStyle=C.cy+'40';cx.lineWidth=2;cx.beginPath();cx.moveTo(px,fl);cx.lineTo(px+pw,fl);cx.stroke();
 // Door
 // Tall neon door
 let doorH=H*.55,doorY=fl-doorH;
 let dGrd=cx.createLinearGradient(r-22,doorY,r-22,fl);
 dGrd.addColorStop(0,'transparent');dGrd.addColorStop(0.3,C.mg+'20');dGrd.addColorStop(0.7,C.mg+'50');dGrd.addColorStop(1,C.mg+'80');
 cx.fillStyle=dGrd;cx.fillRect(r-22,doorY,22,doorH);
 cx.strokeStyle=C.mg;cx.lineWidth=3;cx.strokeRect(r-22,doorY,22,doorH);
 // Door glow
 cx.shadowColor=C.mg;cx.shadowBlur=15;
 cx.strokeStyle=C.mg;cx.lineWidth=2;cx.strokeRect(r-22,doorY,22,doorH);
 cx.shadowBlur=0;
 // Arrow
 cx.fillStyle=C.wh;cx.font='bold 14px monospace';cx.textAlign='center';
 cx.fillText('▶',r-11,doorY+doorH/2+5);
 // Label
 cx.fillStyle=C.mg;cx.font='bold 7px monospace';cx.fillText('NEXT',r-11,doorY-8);

 // Mines
 for(const m of mines){
  const t=Date.now()*.003,hb=(Math.sin(t*3+m.x)+1)/2,hb2=Math.pow(hb,8);
  // Flat plate on floor
  cx.fillStyle=C.mg+'30';cx.fillRect(m.x-10,fl-4,20,4);
  // Explosive pulse
  let g=cx.createRadialGradient(m.x,fl-2,1,m.x,fl-2,16+hb2*20);
  g.addColorStop(0,C.mg);g.addColorStop(0.3,C.mg+'80');g.addColorStop(0.7,C.mg+'20');g.addColorStop(1,'transparent');
  cx.fillStyle=g;cx.fillRect(m.x-30,fl-30,60,30);
  // Core
  cx.fillStyle=C.wh;cx.beginPath();cx.arc(m.x,fl-2,2+hb2*4,0,Math.PI*2);cx.fill();
  cx.fillStyle=C.mg;cx.beginPath();cx.arc(m.x,fl-2,5+hb2*6,0,Math.PI*2);cx.fill();
  // Sparks on strong beat
  if(hb>0.8)sp(m.x,fl-2,C.mg,2);
 }
 // Power-ups
 for(const pu of powerUps){
  const a=0.6+Math.sin(Date.now()*.005)*0.3;
  cx.globalAlpha=a;
  const col=pu.type==='fire'?C.or:pu.type==='shield'?C.cy:pu.type==='rail'?C.or:C.gn;
  cx.fillStyle=col;cx.beginPath();cx.arc(pu.x,pu.y,8,0,Math.PI*2);cx.fill();
  cx.fillStyle=C.wh;cx.font='bold 8px monospace';cx.textAlign='center';
  cx.fillText(pu.type==='heal'?'♥':pu.type==='shield'?'◉':pu.type==='fire'?'🔥':'⚡',pu.x,pu.y+3);
  cx.globalAlpha=1;
 }
 // Enemies
 for(const e of enemies){
  const ey=e.y;
  let img=e.type==='shooter'?ES:e.type==='heavy'?EB:EW;if(e.type==='boss')img=EB;
  if(img.complete&&img.naturalWidth>0){
   cx.save();cx.translate(e.x+e.w/2,ey+e.h/2);cx.scale(-1,1);cx.drawImage(img,-e.w/2-3,-e.h/2-3,e.w+6,e.h+6);cx.restore()
   
  }else{cx.fillStyle=C.pu;cx.fillRect(e.x,ey,e.w,e.h)}
  // HP bar
  if(e.type==='boss'||e.type==='heavy'){
   cx.fillStyle='#400';cx.fillRect(e.x,ey-6,e.w,3);
   cx.fillStyle=C.re;cx.fillRect(e.x,ey-6,e.w*(e.hp/(e.type==='boss'?8+Math.floor(room/5):4+Math.floor(room/15))),3);
  }
  if(e.type==='suicide'){cx.fillStyle=C.or+'60';cx.beginPath();cx.arc(e.x+e.w/2,ey+e.h/2,e.w/2+4,0,Math.PI*2);cx.stroke()}
  // Enemy platform
  cx.fillStyle=e.type==='boss'?C.re+'20':e.type==='heavy'?C.am+'15':e.type==='suicide'?C.or+'15':C.pu+'10';
  cx.fillRect(e.x-4,fl-2,e.w+8,5);
  cx.strokeStyle=e.type==='boss'?C.re+'40':e.type==='shooter'?C.mg+'30':C.pu+'20';cx.lineWidth=1;
  cx.strokeRect(e.x-4,fl-2,e.w+8,5);
 }
 // Player
 if(state==='play'||state==='dead'){
  const a=P.inv>0?.4+Math.sin(Date.now()*.3)*.3:1;cx.globalAlpha=a;
  if(P.shield>0){cx.strokeStyle=C.cy+'60';cx.lineWidth=2;cx.beginPath();cx.arc(P.x+P.w/2,P.y+P.h/2,22,0,Math.PI*2);cx.stroke()}
  if(P.fireTimer>0){cx.fillStyle=C.or+'15';cx.fillRect(P.x-4,P.y-4,P.w+8,P.h+8)}
  if(P.dashCd>40){cx.globalAlpha=0.4}
  cx.save();cx.translate(P.x+P.w/2,P.y+P.h/2);cx.scale(-1,1);
  if(CHAR.complete&&CHAR.naturalWidth>0)cx.drawImage(CHAR,-28,-32,56,64);
  else{cx.fillStyle=C.cy;cx.fillRect(-11,-15,22,30)}
  cx.restore();
  // Player platform
  cx.fillStyle=C.cy+'10';cx.fillRect(P.x-4,fl-2,P.w+8,6);
  cx.strokeStyle=C.cy+'30';cx.lineWidth=1;cx.strokeRect(P.x-4,fl-2,P.w+8,6);
  cx.globalAlpha=1;
 }
 for(const b of bullets){cx.fillStyle=b.rail?C.or:C.cy;cx.fillRect(b.x,b.y,b.w,b.h);if(b.rail){cx.fillStyle=C.or+'40';cx.fillRect(b.x-4,b.y-2,b.w+8,b.h+4)}}
 for(const e of eb){cx.fillStyle=C.mg;cx.fillRect(e.x,e.y,e.w,e.h)}
 for(const p of particles){cx.fillStyle=p.c;cx.globalAlpha=p.life/40;cx.fillRect(p.x,p.y,p.sz,p.sz)}cx.globalAlpha=1;cx.restore();
 // HUD
 cx.fillStyle='#0a0020cc';cx.fillRect(0,0,W,44);
 // Room neon
 let rn='ROOM '+room;
 cx.shadowColor=C.cy;cx.shadowBlur=10+Math.sin(Date.now()*.004)*5;
 cx.fillStyle=C.cy;cx.font='bold 16px monospace';cx.textAlign='left';cx.fillText(rn,10,20);
 cx.shadowBlur=0;
 // HP
 let h='';for(let i=0;i<5;i++)h+=i<P.hp?'♥':'♡';cx.fillStyle=C.re;cx.font='14px monospace';cx.textAlign='right';cx.fillText(h,W-10,20);
 // Boss
 if(bossActive){cx.fillStyle=C.re;cx.font='bold 11px monospace';cx.textAlign='center';cx.fillText('⚠ BOSS ⚠',W/2,20)}
 // Theme line
 if(theme==='alarm'){cx.fillStyle=C.re+'40';cx.fillRect(0,44,W,2)}
 if(theme==='toxic'){cx.fillStyle=C.gn+'30';cx.fillRect(0,44,W,2)}
 // Power indicators
 let pind='';if(P.fireTimer>0)pind+='🔥';if(P.shield>0)pind+='◉';if(P.railAmmo>0)pind+=' ⚡'+P.railAmmo;
 if(pind){cx.fillStyle=C.wh;cx.font='9px monospace';cx.textAlign='left';cx.fillText(pind,10,40)}
 // Best
 cx.fillStyle=C.wh+'12';cx.font='8px monospace';cx.textAlign='right';cx.fillText('BEST '+best,W-10,40);
 // Touch zone hints
 cx.fillStyle=C.cy+'08';cx.font='8px monospace';cx.textAlign='center';cx.fillText('◄ SALTO',W*.2,H-2);
 cx.fillStyle=C.mg+'08';cx.fillText('DISPARO ►',W*.8,H-2);
}

function drawIntro(){
 cx.fillStyle=C.bg;cx.fillRect(0,0,W,H);
 const bx=W*.12,by=H*.25,bw=W*.76,bh=H*.5;
 cx.fillStyle='#0a0020';cx.fillRect(bx,by,bw,bh);
 for(let i=0;i<6;i++){cx.fillStyle=C.cy+(4+i*3).toString(16);cx.fillRect(bx+8,by+i*22+10,bw-16,1)}
 cx.fillStyle=C.mg+'30';cx.fillRect(bx+bw-28,by+bh-60,18,60);
 cx.strokeStyle=C.mg;cx.lineWidth=2;cx.strokeRect(bx+bw-28,by+bh-60,18,60);
 cx.textAlign='center';cx.fillStyle=C.cy;cx.font='bold 42px monospace';cx.shadowColor=C.cy;cx.shadowBlur=20;cx.fillText('NEON',W/2,H*.12);
 cx.fillStyle=C.mg;cx.font='bold 42px monospace';cx.shadowColor=C.mg;cx.shadowBlur=20;cx.fillText('ASH',W/2,H*.21);cx.shadowBlur=0;
 cx.fillStyle=C.wh+'20';cx.font='10px monospace';cx.fillText('CYBER TOWER ARENA',W/2,H*.27);
 if(best>0){cx.fillStyle='#0a0020cc';cx.fillRect(W/2-70,H*.69,140,24);cx.fillStyle=C.am;cx.font='12px monospace';cx.fillText('🏆 BEST '+best,W/2,H*.69+17)}
 const t=Date.now()*.003;
 const bx2=W/2-70,by2=H*.78;
 cx.strokeStyle=C.cy;cx.lineWidth=2;cx.strokeRect(bx2+Math.sin(t*2)*3,by2,140,45);
 cx.fillStyle=C.cy+'10';cx.fillRect(bx2,by2,140,45);
 cx.fillStyle=C.cy;cx.font='bold 18px monospace';cx.fillText('ENTRAR',W/2,by2+30);
 cx.fillStyle=C.wh+'15';cx.font='8px monospace';cx.fillText('IZQ=SALTO | DER=DISPARO | DOBLE TAP=DASH',W/2,H*.89);
}
function drawDead(){
 cx.fillStyle=C.bg+'EE';cx.fillRect(0,0,W,H);
 cx.fillStyle=C.re;cx.font='bold 24px monospace';cx.textAlign='center';cx.fillText('MUERTO',W/2,H/2-55);
 cx.fillStyle=C.cy;cx.font='13px monospace';cx.fillText('ROOM '+room,W/2,H/2-30);
 cx.fillStyle=C.wh;cx.font='20px monospace';cx.fillText('SALAS: '+room,W/2,H/2-5);
 // Stats
 cx.fillStyle=C.wh+'50';cx.font='10px monospace';
 cx.fillText('Enemigos: '+kills,W/2,H/2+18);
 let t=Math.floor((Date.now()-startTime)/1000);
 cx.fillText('Tiempo: '+Math.floor(t/60)+'m'+(t%60)+'s',W/2,H/2+32);
 if(room>=best&&room>0){cx.fillStyle=C.am;cx.font='10px monospace';cx.fillText('🏆 NUEVO RECORD',W/2,H/2+46)}
 cx.fillStyle=C.wh+'30';cx.font='10px monospace';cx.fillText('toca para reiniciar',W/2,H/2+62)
}
function loop(){resize();update();cx.clearRect(0,0,W,H);if(state==='intro')drawIntro();else if(state==='dead'){draw();drawDead()}else draw();requestAnimationFrame(loop)}
resize();loop();
</script></body></html>
