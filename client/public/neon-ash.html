function startMusic(){if(!actx)try{actx=new AC()}catch(e){return}if(musicOsc.length)return;musicGain=actx.createGain();musicGain.gain.value=0.015;musicGain.connect(actx.destination);let notes=[130.81,164.81,196,261.63];for(let i=0;i<4;i++){let o=actx.createOscillator();o.type='triangle';o.frequency.value=notes[i];o.connect(musicGain);o.start();musicOsc.push(o)}}

 }
 // LANDSCAPE - Premium menu

 for(let i=0;i<25;i++){let rx=Math.random()*W,ry=Math.random()*H;cx.fillStyle=C.gn+(10+Math.random()*25).toString(16);cx.fillRect(rx,ry,1,5+Math.random()*6);cx.fillStyle=C.gn+'08';cx.fillRect(rx-1,ry-1,3,8+Math.random()*8)}

 cx.fillStyle=C.wh+'25';cx.font='bold 13px monospace';cx.fillText('CYBER TOWER ARENA',W/2,H*.47);

 for(let i=0;i<bh;i+=4){cx.fillStyle=C.cy+(2+i%8).toString(16);cx.fillRect(bx+4,by+i,bw-8,1)}

 cx.shadowColor=C.cy;cx.shadowBlur=12+Math.sin(t*3)*5;
 cx.fillText('▶ ENTRAR',W/2,by+40);

 cx.fillRect(bx+bw-6,by-2,8,2);cx.fillRect(bx+bw+2,by-2,2,8);

 // Sub-text

 cx.fillText('TOCA DERECHA = DISPARAR',W*.75,H*.84);

 cx.beginPath();cx.moveTo(W*.05,H*.89);cx.lineTo(W*.95,H*.89);cx.stroke();

}
