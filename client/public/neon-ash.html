document.getElementById('bJ').addEventListener('pointerdown',e=>{e.preventDefault();jump=true});
document.getElementById('bS').addEventListener('pointerdown',e=>{e.preventDefault();shoot=true});
document.getElementById('bS').addEventListener('pointerup',e=>{shoot=false});
document.getElementById('bS').addEventListener('pointerleave',e=>{shoot=false});
window.addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')jump=true;if(e.key==='d'||e.key===' '||e.key==='ArrowRight')shoot=true;if(e.key==='Enter'){if(state==='intro')start();if(state==='dead')restart()}});
window.addEventListener('keyup',e=>{if(e.key==='d'||e.key===' '||e.key==='ArrowRight')shoot=false});
cv.addEventListener('click',()=>{if(state==='intro')start();if(state==='dead')restart()});

function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W;cv.height=H}window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*3,vy:-1-Math.random()*3,life:10+Math.random()*10,c,sz:1+Math.random()*2})}

function start(){
 state='play';room=0;score=0;P.hp=5;P.inv=0;P.cd=0;P.vx=1.0;P.vy=0;P.onGround=true;
 const lw=14,px=(W-520)/2;P.x=px+lw+10;newRoom();P.y=H*.82-P.h;bullets=[];particles=[];
}
function restart(){state='intro';room=0;score=0;bullets=[];eb=[];particles=[]}
function die(){state='dead';if(score>hs){hs=score;localStorage.setItem('na_hs',hs)}sp(P.x+P.w/2,P.y,C.mg,30);shake=30}
function nextRoom(){trans=20;room++;score+=200;const lw=14,px=(W-520)/2;P.x=px+lw+10;P.y=H*.82-P.h;newRoom();sp(P.x,P.y,C.cy,15)}

function update(){
 if(state!=='play')return;if(trans>0){trans--;return}
 const fl=H*.82,lw=14,px=(W-520)/2,l=px+lw,r=px+520-lw;
 P.x+=P.vx;
 if(P.x<l)P.x=l;if(P.x+P.w>r){nextRoom();return}
 // Gravity
 P.onGround=false;
 if(P.y+P.h>=fl-2&&P.vy>=0){P.y=fl-P.h;P.vy=0;P.onGround=true}
 if(!P.onGround){P.vy+=0.4;P.y+=P.vy}
 // Jump
 if(jump&&P.onGround){P.vy=-8;P.y-=2;jump=false;P.onGround=false}
 // Shoot
 if(shoot&&P.cd<=0){bullets.push({x:P.x+P.w,y:P.y+P.h/2-2,vx:7,w:10,h:3});P.cd=14;sp(P.x+P.w,P.y+P.h/2,C.cy,2)}
 if(P.cd>0)P.cd--;if(P.inv>0)P.inv--;
 for(const b of bullets)b.x+=b.vx;bullets=bullets.filter(b=>b.x<W+20);
 for(const e of eb)e.x+=e.vx;eb=eb.filter(e=>e.x>-20);
 // Enemies
 for(const e of enemies){
  e.x-=0.3;if(e.x<l+10)e.x=r-10;
  e.cd--;if(e.cd<=0&&e.type==='shooter'){eb.push({x:e.x,y:fl-20,vx:-3,w:6,h:3});e.cd=90+Math.random()*60}
  // Hit
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];if(b.x>e.x&&b.x<e.x+e.w&&Math.abs(b.y-(fl-20))<20){e.hp--;bullets.splice(i,1);sp(e.x+e.w/2,fl-20,C.mg,4);shake=4;if(e.hp<=0){enemies=enemies.filter(x=>x!==e);score+=250;sp(e.x+e.w/2,fl-20,C.re,8)}break}}
  if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(P.y-fl+18)<32){P.hp--;P.inv=40;sp(P.x+P.w/2,P.y,C.re,8);shake=10;if(P.hp<=0)die()}
 }
 for(let i=eb.length-1;i>=0;i--){const e=eb[i];if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(e.y-P.y-P.h/2)<16){P.hp--;P.inv=40;eb.splice(i,1);shake=8;sp(P.x+P.w/2,P.y,C.mg,6);if(P.hp<=0)die()}}
 // Mines
 for(const m of mines){const dx=P.x+P.w/2-m.x,dy=P.y+P.h/2-m.y;if(P.inv<=0&&Math.sqrt(dx*dx+dy*dy)<16){P.hp--;P.inv=35;sp(m.x,m.y,C.mg,12);shake=14;if(P.hp<=0)die()}}
 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}particles=particles.filter(p=>p.life>0);
 if(shake>0)shake--;
}

function draw(){
 const s=(shake>0)?(Math.random()-.5)*8:0;cx.save();cx.translate(s,s);
 cx.fillStyle=C.bg;cx.fillRect(0,0,W,H);
 if(trans>0){cx.globalAlpha=trans/20;cx.fillStyle='#fff';cx.fillRect(0,0,W,H);cx.globalAlpha=1;cx.restore();return}

 const fl=H*.82,lw=14,px=(W-520)/2,l=px,r=px+520;
 // Room bg
 cx.fillStyle='#0a0018';cx.fillRect(px,0,520,H);
 // Grid
 cx.strokeStyle=C.cy+'04';for(let y=0;y<H;y+=36){cx.beginPath();cx.moveTo(px,y);cx.lineTo(px+520,y);cx.stroke()}
 // Walls
 cx.fillStyle='#0d0020';cx.fillRect(px,0,lw,H);cx.fillRect(px+520-lw,0,lw,H);
 // Floor
 cx.fillStyle=C.cy+'25';cx.fillRect(px,fl-3,520,10);
 cx.strokeStyle=C.cy+'50';cx.lineWidth=2;cx.beginPath();cx.moveTo(px,fl);cx.lineTo(px+520,fl);cx.stroke();
 // Door arrow
 cx.fillStyle=C.mg+'40';cx.fillRect(r-18,fl-50,14,50);
 cx.strokeStyle=C.mg;cx.lineWidth=2;cx.strokeRect(r-18,fl-50,14,50);
 // Mines
 for(const m of mines){
  const t=Date.now()*.003,hb=(Math.sin(t+m.x)+1)/2;
  let g=cx.createRadialGradient(m.x,m.y,2,m.x,m.y,12+hb*4);
  g.addColorStop(0,C.mg);g.addColorStop(0.5,C.mg+'40');g.addColorStop(1,'transparent');
  cx.fillStyle=g;cx.fillRect(m.x-16,m.y-16,32,32);
  cx.fillStyle=C.mg;cx.beginPath();cx.arc(m.x,m.y,5+hb*2,0,Math.PI*2);cx.fill();
 }
 // Enemies
 for(const e of enemies){
  const ey=e.y,img=e.type==='shooter'?ES:EW;
  if(img.complete&&img.naturalWidth>0){
 if(e.type==='shooter'){cx.save();cx.translate(e.x+e.w/2,ey+e.h/2);cx.scale(-1,1);cx.drawImage(img,-e.w/2-2,-e.h/2-2,e.w+4,e.h+4);cx.restore()}
 else{cx.drawImage(img,e.x-2,ey-2,e.w+4,e.h+4)}
}
  else{cx.fillStyle=e.type==='shooter'?C.mg:C.pu;cx.fillRect(e.x,ey,e.w,e.h)}
 }
 // Player
 if(state==='play'||state==='dead'){
  const a=P.inv>0?.4+Math.sin(Date.now()*.3)*.3:1;cx.globalAlpha=a;
  cx.save();cx.translate(P.x+P.w/2,P.y+P.h/2);cx.scale(-1,1);
  if(CHAR.complete&&CHAR.naturalWidth>0)cx.drawImage(CHAR,-18,-22,36,44);
  else{cx.fillStyle=C.cy;cx.fillRect(-11,-15,22,30)}
  cx.restore();cx.globalAlpha=1;
 }
 // Bullets
 for(const b of bullets){cx.fillStyle=C.cy;cx.fillRect(b.x,b.y,b.w,b.h)}
 for(const e of eb){cx.fillStyle=C.mg;cx.fillRect(e.x,e.y,e.w,e.h)}
 for(const p of particles){cx.fillStyle=p.c;cx.globalAlpha=p.life/20;cx.fillRect(p.x,p.y,p.sz,p.sz)}cx.globalAlpha=1;
 cx.restore();
 // HUD
 cx.fillStyle='#0a0020cc';cx.fillRect(0,0,W,36);
 cx.fillStyle=C.cy;cx.font='bold 13px monospace';cx.textAlign='left';cx.fillText('ROOM '+room,10,25);
 cx.fillStyle=C.wh;cx.font='11px monospace';cx.textAlign='center';cx.fillText(score,W/2,25);
 let h='';for(let i=0;i<5;i++)h+=i<P.hp?'♥':'♡';cx.fillStyle=C.re;cx.font='13px monospace';cx.textAlign='right';cx.fillText(h,W-10,25);
}

function drawIntro(){
 cx.fillStyle=C.bg;cx.fillRect(0,0,W,H);
 // Tower
 const bx=W*.15,by=H*.25,bw=W*.7,bh=H*.5;
 cx.fillStyle='#0a0020';cx.fillRect(bx,by,bw,bh);
 for(let i=0;i<6;i++){cx.fillStyle=C.cy+(4+i*3).toString(16);cx.fillRect(bx+8,by+i*22+8,bw-16,1)}
 // Door glow
 cx.fillStyle=C.mg+'30';cx.fillRect(bx+bw-28,by+bh-60,18,60);
 cx.strokeStyle=C.mg;cx.lineWidth=2;cx.strokeRect(bx+bw-28,by+bh-60,18,60);
 // Title
 cx.textAlign='center';cx.fillStyle=C.cy;cx.font='bold 40px monospace';cx.shadowColor=C.cy;cx.shadowBlur=20;cx.fillText('NEON',W/2,H*.14);
 cx.fillStyle=C.mg;cx.font='bold 40px monospace';cx.shadowColor=C.mg;cx.shadowBlur=20;cx.fillText('ASH',W/2,H*.22);cx.shadowBlur=0;
 cx.fillStyle=C.wh+'20';cx.font='10px monospace';cx.fillText('CYBER TOWER ARENA',W/2,H*.28);
 const t=Date.now()*.003;
 const bx2=W/2-70,by2=H*.72;
 cx.strokeStyle=C.cy;cx.lineWidth=2;cx.strokeRect(bx2+Math.sin(t*2)*3,by2,140,50);
 cx.fillStyle=C.cy+'10';cx.fillRect(bx2,by2,140,50);
 cx.fillStyle=C.cy;cx.font='bold 18px monospace';cx.fillText('ENTRAR',W/2,by2+33);
 if(hs>0){cx.fillStyle=C.am;cx.font='10px monospace';cx.fillText('HI '+hs,W/2,by2+70)}
}
function drawDead(){
 cx.fillStyle=C.bg+'EE';cx.fillRect(0,0,W,H);
 cx.fillStyle=C.re;cx.font='bold 24px monospace';cx.textAlign='center';cx.fillText('MUERTO',W/2,H/2-35);
 cx.fillStyle=C.cy;cx.font='14px monospace';cx.fillText('ROOM '+room,W/2,H/2-10);
 cx.fillStyle=C.wh;cx.font='22px monospace';cx.fillText(''+score,W/2,H/2+18);
 if(score>=hs&&score>0){cx.fillStyle=C.am;cx.font='10px monospace';cx.fillText('RECORD',W/2,H/2+36)}
 cx.fillStyle=C.wh+'30';cx.font='10px monospace';cx.fillText('toca para reiniciar',W/2,H/2+56)
}
function loop(){resize();update();cx.clearRect(0,0,W,H);if(state==='intro')drawIntro();else if(state==='dead'){draw();drawDead()}else draw();requestAnimationFrame(loop)}
resize();loop();
</script></body></html>
