<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEON ASH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060010;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;position:fixed}
#game{width:100%;height:100%;position:relative}
canvas{display:block;width:100%;height:100%}
#rotate{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#00d4ff;font:bold 18px monospace;text-align:center;z-index:100;background:#060010;padding:30px;border:2px solid #00d4ff;border-radius:16px}
@media(orientation:portrait){#rotate{display:block}}
@media(orientation:landscape){#rotate{display:none}}
</style>
</head>
<body>
<div id="game"><canvas id="c"></canvas></div>
<div id="rotate">📱 GIRA EL MÓVIL<br><span style="font-size:12px;color:#ff15d0">modo horizontal</span></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,gameState='intro',score=0,floorNum=0,highScore=parseInt(localStorage.getItem('neonash_hs')||0);
let cameraY=0,shakeT=0,shakeI=0,introT=0,jumpWanted=false,shootHeld=false;
let climbing=false,climbT=0,climbFX=0,climbFY=0,climbTX=0,climbTY=0,climbNDir=0;
const FG=114,PH=10;
const C={bg:'#060010',cyan:'#00d4ff',magenta:'#ff15d0',white:'#e8e0ff',amber:'#ffb347',red:'#ff4466',dim:'#1a0030',panel:'#0a0020',purple:'#7b00ff',wall:'#0d0030'};
const P={x:0,y:0,w:22,h:30,vx:1.2,vy:0,dir:-1,onGround:false,hp:3,maxHp:3,shootCd:0,inv:0};
let bullets=[],eBullets=[],particles=[],platformW=0,wallW=14,touchL=false,touchR=false;

let floors=[];
for(let n=0;n<=100;n++)floors.push({n,y:-(n*FG),stairSide:n%2===0?'left':'right',enemies:[],hasFire:Math.random()<0.3,fireX:0});
function initFloors(){platformW=W-20;wallW=14;for(const f of floors){if(f.n===0)continue;const sz=f.stairSide==='left'?90:platformW-90;const smin=f.stairSide==='left'?sz:40,smax=f.stairSide==='left'?platformW-40:sz;f.enemies=[];f.fireX=0;if(f.hasFire)f.fireX=smin+45+Math.random()*(smax-smin-50);const cnt=Math.random()<0.2+f.n*0.01?2:Math.random()<0.3+f.n*0.015?1:0;for(let j=0;j<cnt;j++)f.enemies.push({x:smin+Math.random()*(smax-smin-50),y:f.y-26,w:18,h:26,vx:0,type:Math.random()<0.3?'shooter':'walker',sTimer:Math.random()<0.3?90:999,hp:Math.random()<0.3?1:2});if(f.enemies.length>1)for(let i=1;i<f.enemies.length;i++)f.enemies[i].x=Math.max(smin+10,Math.min(smax-f.enemies[i].w-10,f.enemies[i-1].x+40+Math.random()*40))}}
function cf(){return floors[floorNum]}

function lockLandscape(){
 if(document.fullscreenElement)return;
 const el=document.documentElement;
 if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
 if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();lockLandscape();for(const t of e.changedTouches){if(t.clientX<W/2)touchL=true;else touchR=true}if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart()});
canvas.addEventListener('touchend',e=>{e.preventDefault();touchL=false;touchR=false;for(const t of e.touches){if(t.clientX<W/2)touchL=true;else touchR=true}});
canvas.addEventListener('touchcancel',()=>{touchL=false;touchR=false});
canvas.addEventListener('click',()=>{lockLandscape();if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart()});
canvas.addEventListener('mousedown',e=>{if(e.clientX<W/2)jumpWanted=true;else shootHeld=true});
canvas.addEventListener('mouseup',()=>{jumpWanted=false;shootHeld=false});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')jumpWanted=true;if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=true;if((e.key==='Enter'||e.key===' ')&&gameState==='intro'&&introT>30)start();if((e.key==='Enter'||e.key===' ')&&gameState==='dead')restart()});
window.addEventListener('keyup',e=>{if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=false});
function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;if(platformW===0||Math.abs(platformW-(W-20))>40)initFloors()}window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*3,vy:-2-Math.random()*3,life:10+Math.random()*15,c,size:1+Math.random()*2})}

function start(){gameState='playing';score=0;floorNum=0;climbing=false;climbT=0;P.hp=P.maxHp;P.inv=0;P.shootCd=0;P.dir=-1;P.vx=1.2;P.vy=0;P.onGround=true;bullets=[];eBullets=[];particles=[];const f=cf();P.x=platformW-wallW-P.w-12;P.y=f.y-P.h;cameraY=f.y-H*0.65}
function restart(){gameState='intro';introT=0;P.hp=P.maxHp;floorNum=0;score=0;bullets=[];eBullets=[];particles=[];cameraY=0}
function die(){gameState='dead';if(score>highScore){highScore=score;localStorage.setItem('neonash_hs',highScore)}sp(P.x,P.y,C.magenta,30);shakeT=40;shakeI=12}

function update(){
 if(gameState==='intro'){introT++;return}if(gameState==='dead'){if(shakeT>0)shakeT--;return}
 if(touchL&&!jumpWanted)jumpWanted=true;if(touchR)shootHeld=true;if(!touchR)shootHeld=false;
 const f=cf(),fy=f.y,lW=wallW,rW=platformW-wallW;
 if(climbing){climbT++;const t=Math.min(climbT/80,1);P.x=climbFX+(climbTX-climbFX)*t;P.y=climbFY+(climbTY-climbFY)*t;P.onGround=false;P.vy=0;if(t>=1){climbT=0;climbing=false;floorNum++;score+=100;const nf=cf();P.x=climbTX;P.y=nf.y-P.h;P.dir=climbNDir;P.vx=1.2;P.vy=0;P.onGround=true;sp(P.x+P.w/2,P.y,C.cyan,10)}cameraY+=(P.y-H*0.4-cameraY)*0.07;return}
 P.x+=P.vx*P.dir;if(P.x<=lW){P.dir=1;P.x=lW}if(P.x+P.w>=rW){P.dir=-1;P.x=rW-P.w}
 if(P.onGround&&((f.stairSide==='left'&&P.x<=lW+14)||(f.stairSide==='right'&&P.x+P.w>=rW-14))){
  const nf=floors[floorNum+1];if(!nf)return;climbing=true;climbT=0;climbFX=P.x;climbFY=P.y;climbTX=nf.stairSide==='left'?platformW-wallW-P.w-12:wallW+12;climbTY=nf.y-P.h;climbNDir=nf.stairSide==='left'?-1:1;P.vx=0;return}
 P.onGround=false;if(P.y+P.h>=fy-2&&P.y+P.h<=fy+16&&P.vy>=0){P.y=fy-P.h;P.vy=0;P.onGround=true}
 if(P.y+P.h>fy+24){P.y=fy-P.h;P.vy=0;P.onGround=true}if(P.y<fy-FG+PH){P.y=fy-FG+PH;P.vy=0}
 if(!P.onGround){P.vy+=0.4;P.y+=P.vy}if(jumpWanted&&P.onGround){P.vy=-9;P.y-=2;jumpWanted=false;P.onGround=false}
 if(shootHeld&&P.shootCd<=0){bullets.push({x:P.x+P.w/2,y:P.y+P.h/2,vx:P.dir*6,vy:0,w:9,h:3});P.shootCd=14;sp(bullets[bullets.length-1].x,bullets[bullets.length-1].y,C.cyan,2)}
 if(P.shootCd>0)P.shootCd--;if(P.inv>0)P.inv--;
 for(const b of bullets)b.x+=b.vx;bullets=bullets.filter(b=>b.x>-30&&b.x<W+30);
 for(const eb of eBullets)eb.x+=eb.vx;eBullets=eBullets.filter(eb=>eb.x>-30&&eb.x<W+30);
 for(const e of f.enemies){e.vx=-P.dir*0.4;e.x+=e.vx;e.sTimer--;if(e.sTimer<=0&&e.type==='shooter'){eBullets.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(P.x>e.x?1:-1)*2.5,vy:0,w:6,h:3});e.sTimer=100+Math.random()*80}
  for(let bi=bullets.length-1;bi>=0;bi--){const b=bullets[bi];if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y+1<e.y+e.h&&b.y+b.h>e.y+1){e.hp--;bullets.splice(bi,1);sp(e.x+e.w/2,e.y+e.h/2,C.magenta,5);shakeT=4;shakeI=2;if(e.hp<=0){f.enemies=f.enemies.filter(x=>x!==e);score+=250;sp(e.x+e.w/2,e.y+e.h/2,C.red,10)}break}}
  if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&e.y<P.y+P.h&&e.y+e.h>P.y){P.hp--;P.inv=50;sp(P.x+P.w/2,P.y+P.h/2,C.red,10);shakeT=12;shakeI=7;if(P.hp<=0)die()}}
 for(let ei=eBullets.length-1;ei>=0;ei--){const eb=eBullets[ei];if(P.inv<=0&&eb.x<P.x+P.w&&eb.x+eb.w>P.x&&eb.y+1<P.y+P.h&&eb.y+eb.h>P.y+1){P.hp--;P.inv=50;eBullets.splice(ei,1);shakeT=10;shakeI=6;sp(P.x+P.w/2,P.y+P.h/2,C.magenta,8);if(P.hp<=0)die()}}
 if(f.hasFire){const hx=f.fireX,hy=f.y-14;if(P.inv<=0&&P.x+P.w>hx&&P.x<hx+16&&P.y+P.h>hy&&P.y<hy+14){P.hp--;P.inv=35;sp(P.x+P.w/2,P.y+P.h/2,C.amber,10);if(P.hp<=0)die()}}
 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}particles=particles.filter(p=>p.life>0);
 if(shakeT>0)shakeT--;cameraY+=(P.y-H*0.45-cameraY)*0.06;
}

function draw(){
 ctx.save();const sx=shakeT>0?(Math.random()-.5)*shakeI:0,sy=shakeT>0?(Math.random()-.5)*shakeI:0;ctx.translate(sx,sy);
 ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);const bgl=8,bgw=W-16;
 ctx.fillStyle='#0a0018';ctx.fillRect(bgl,0,bgw,H);
 ctx.strokeStyle=C.cyan+'03';for(let yy=(-cameraY%36);yy<H+36;yy+=36){ctx.beginPath();ctx.moveTo(bgl,yy);ctx.lineTo(bgl+bgw,yy);ctx.stroke()}
 // 3 visible floors
 for(let fn of[floors[floorNum],floors[floorNum+1],floors[floorNum+2]]){
  if(!fn)continue;const fy=fn.y-cameraY,fx=bgl+2;if(fy<-90||fy>H+90)continue;
  let grd=ctx.createLinearGradient(0,fy,0,fy+PH);grd.addColorStop(0,'#1a0040');grd.addColorStop(1,'#0d0028');ctx.fillStyle=grd;ctx.fillRect(fx,fy,platformW,PH);
  ctx.strokeStyle=C.cyan+'45';ctx.lineWidth=1;ctx.strokeRect(fx,fy,platformW,PH);
  ctx.strokeStyle=C.cyan+'25';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+platformW,fy);ctx.stroke();
  ctx.fillStyle=C.wall;ctx.fillRect(fx,fy-FG+PH,wallW,FG-PH);ctx.fillRect(fx+platformW-wallW,fy-FG+PH,wallW,FG-PH);
  ctx.strokeStyle=C.cyan+'06';for(let wy=fy-FG+PH+16;wy<fy;wy+=24){ctx.beginPath();ctx.moveTo(fx,wy);ctx.lineTo(fx+wallW,wy);ctx.stroke();ctx.beginPath();ctx.moveTo(fx+platformW-wallW,wy);ctx.lineTo(fx+platformW,wy);ctx.stroke()}
  ctx.strokeStyle=C.purple+'12';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(fx,fy-FG+PH);ctx.lineTo(fx+wallW,fy-FG+PH);ctx.stroke();ctx.beginPath();ctx.moveTo(fx+platformW-wallW,fy-FG+PH);ctx.lineTo(fx+platformW,fy-FG+PH);ctx.stroke();
  const stX=fn.stairSide==='left'?fx+wallW:fx+platformW-wallW-24,stY=fy-42;ctx.fillStyle='#0d0028';ctx.fillRect(stX,stY,24,42);ctx.strokeStyle=C.cyan+'35';ctx.strokeRect(stX,stY,24,42);
  for(let i=0;i<5;i++){ctx.fillStyle=C.cyan+'10';ctx.fillRect(stX+2,stY+42-(i+1)*7,20,3.5)}ctx.fillStyle=C.cyan+'40';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('▲',stX+12,stY-4);
  if(fn.hasFire){const hx=fx+fn.fireX,hy=fn.y-16-cameraY,fl=Math.sin(Date.now()*0.015+fn.n)*4;ctx.globalAlpha=0.6+Math.random()*.4;for(let i=0;i<3;i++){ctx.fillStyle=C.amber;ctx.fillRect(hx+i*5,hy-fl-i*3,5,14+i*3)}ctx.globalAlpha=1}
  for(const e of fn.enemies){const ey=e.y-cameraY;ctx.fillStyle=e.type==='shooter'?C.magenta:C.purple;ctx.fillRect(fx+e.x+2,ey+5,e.w-4,e.h-8);ctx.fillRect(fx+e.x+4,ey,10,8);ctx.fillStyle=e.type==='shooter'?C.red:C.amber;ctx.fillRect(fx+e.x+5,ey+2,3,3);ctx.fillRect(fx+e.x+10,ey+2,3,3);if(e.type==='shooter'){ctx.fillStyle=C.red;ctx.fillRect(fx+e.x+(e.vx>0?e.w:0),ey+11,6,2)}}
 }
 if(gameState==='playing'||gameState==='dead'){const a=P.inv>0?.4+Math.sin(Date.now()*.3)*.3:1;ctx.globalAlpha=a;const py=P.y-cameraY;ctx.fillStyle=C.cyan;ctx.fillRect(P.x,py+8,P.w,P.h-10);ctx.fillRect(P.x+6,py,10,10);ctx.fillStyle=C.white;ctx.fillRect(P.x+8,py+2,6,3);const lo=Math.sin(Date.now()*.015)*3;ctx.fillStyle=C.cyan+'80';ctx.fillRect(P.x+2,py+P.h-5,6,6+lo);ctx.fillRect(P.x+P.w-8,py+P.h-5,6,6-lo);ctx.fillStyle=C.magenta;if(P.dir>0)ctx.fillRect(P.x+P.w,py+12,8,3);else ctx.fillRect(P.x-8,py+12,8,3);ctx.globalAlpha=1}
 for(const b of bullets){ctx.fillStyle=C.cyan;ctx.fillRect(b.x,b.y-cameraY,b.w,b.h)}for(const eb of eBullets){ctx.fillStyle=C.magenta;ctx.fillRect(eb.x,eb.y-cameraY,eb.w,eb.h)}
 for(const p of particles){ctx.fillStyle=p.c;ctx.globalAlpha=p.life/30;ctx.fillRect(p.x,p.y-cameraY,p.size,p.size)}ctx.globalAlpha=1;ctx.restore();
 ctx.fillStyle='#0a0020ee';ctx.fillRect(0,0,W,40);ctx.strokeStyle=C.cyan+'20';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,40);ctx.lineTo(W,40);ctx.stroke();
 ctx.fillStyle=C.cyan;ctx.font='bold 14px monospace';ctx.textAlign='left';ctx.fillText(`PISO ${Math.max(0,floorNum)}`,10,27);
 ctx.fillStyle=C.white;ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText(`⚡${score}`,W/2,27);
 ctx.textAlign='right';let h='';ctx.font='13px monospace';for(let i=0;i<P.maxHp;i++)h+=i<P.hp?'♥':'♡';ctx.fillStyle=C.red;ctx.fillText(h,W-10,27);
 ctx.fillStyle=C.cyan+'12';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('◄ SALTAR',W*.2,H-5);ctx.fillStyle=C.magenta+'12';ctx.fillText('DISPARO ►',W*.8,H-5);
}
function drawIntro(){
 ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);ctx.fillStyle='#080018';ctx.fillRect(W*.06,0,W*.88,H);
 const t=Date.now()*.001;
 for(let i=0;i<20;i++){const y=H*.25-i*30+Math.sin(t+i*.5)*4;ctx.fillStyle=C.cyan+(5+i*2).toString(16);ctx.fillRect(W*.1,y,W*.8,1);ctx.fillStyle=C.magenta+(3+i).toString(16);ctx.fillRect(W*.1,y+15,W*.8,.7)}
 ctx.textAlign='center';
 ctx.fillStyle=C.cyan;ctx.font='bold 42px monospace';ctx.shadowColor=C.cyan;ctx.shadowBlur=26;ctx.fillText('NEON',W/2,H*.18);
 ctx.fillStyle=C.magenta;ctx.font='bold 42px monospace';ctx.shadowColor=C.magenta;ctx.shadowBlur=26;ctx.fillText('ASH',W/2,H*.3);
 ctx.shadowBlur=0;ctx.fillStyle=C.white+'30';ctx.font='11px monospace';ctx.fillText('CYBER TOWER ARCADE',W/2,H*.37);
 const bx=W/2-78,by=H*.48,bw=156,bh=58,pulse=Math.sin(t*2.5)*3;
 ctx.strokeStyle=C.cyan;ctx.lineWidth=2.5;ctx.strokeRect(bx+pulse,by,bw,bh);
 ctx.fillStyle=C.cyan+'08';ctx.fillRect(bx,by,bw,bh);
 ctx.fillStyle=C.cyan;ctx.font='bold 20px monospace';ctx.fillText('▶ JUGAR',W/2,by+38);
 if(highScore>0){ctx.fillStyle=C.amber;ctx.font='11px monospace';ctx.fillText('🏆 '+highScore,W/2,by+80)}
 ctx.fillStyle=C.white+'10';ctx.font='8px monospace';ctx.fillText('David OS • v1.0',W/2,H-12);
 ctx.fillStyle=C.white+'20';ctx.font='9px monospace';ctx.fillText('TOCA IZQUIERDA = SALTAR  |  TOCA DERECHA = DISPARAR',W/2,H-28);
}
function drawDead(){ctx.fillStyle=C.bg+'DD';ctx.fillRect(0,0,W,H);ctx.fillStyle=C.red;ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('MUERTO',W/2,H/2-48);ctx.fillStyle=C.cyan;ctx.font='15px monospace';ctx.fillText('Piso '+floorNum,W/2,H/2-20);ctx.fillStyle=C.white;ctx.font='24px monospace';ctx.fillText(''+score,W/2,H/2+10);if(score>=highScore&&score>0){ctx.fillStyle=C.amber;ctx.font='10px monospace';ctx.fillText('🏆 NUEVO RÉCORD',W/2,H/2+32)}const a=.4+Math.sin(Date.now()*.004)*.3;ctx.fillStyle=C.white+Math.floor(a*255).toString(16).padStart(2,'0');ctx.font='10px monospace';ctx.fillText('toca para reiniciar',W/2,H/2+56)}
function loop(){resize();update();ctx.clearRect(0,0,W,H);if(gameState==='intro')drawIntro();else if(gameState==='dead'){draw();drawDead()}else draw();requestAnimationFrame(loop)}
resize();loop();
</script></body></html>
