let BOSS_SPRITES={},FIRE_SPRITE=null;

// Power-up types
const POWER_TYPES=['heal','shield','speed','ammo'];

// Floor system with themes
let floors=[];
for(let n=0;n<=100;n++){
 floors.push({n,y:-(n*FG),stairSide:n%2===0?'left':'right',enemies:[],hasFire:Math.random()<0.25,fireX:0,
  theme:FLOOR_THEMES[n%FLOOR_THEMES.length],decorations:[]});
}
function initFloors(){
 platformW=W-64;wallW=14;
 for(const f of floors){
  if(f.n===0)continue;
  const sz=f.stairSide==='left'?90:platformW-90;
  const smin=f.stairSide==='left'?sz:40,smax=f.stairSide==='left'?platformW-40:sz;
  f.enemies=[];f.fireX=0;f.decorations=[];
  // Theme decorations
  if(f.theme==='neon'){for(let d=0;d<3;d++)f.decorations.push({x:smin+30+Math.random()*(smax-smin-60),y:f.y-30-Math.random()*40,type:'neon_sign'})}
  else if(f.theme==='industrial'){for(let d=0;d<2;d++)f.decorations.push({x:smin+40+Math.random()*(smax-smin-80),y:f.y-20,type:'pipe'})}
  else if(f.theme==='hacker'){for(let d=0;d<3;d++)f.decorations.push({x:smin+30+Math.random()*(smax-smin-60),y:f.y-40-Math.random()*30,type:'code'})}
  if(f.hasFire)f.fireX=smin+15+Math.random()*(smax-smin-50);
  const cnt=1+Math.floor(Math.random()*2);
  for(let j=0;j<cnt;j++){
   const typeRand=Math.random();
   const type=typeRand<0.4?'walker':typeRand<0.75?'shooter':'heavy';
   const hp=type==='heavy'?3:type==='shooter'?1:2;
   const spd=type==='heavy'?0.1:type==='walker'?0.15:0.12;
   f.enemies.push({x:smin+Math.random()*(smax-smin-50),y:f.y-76,w:type==='heavy'?68:56,h:type==='heavy'?88:76,vx:0,
    type,hp,maxHp:hp,sTimer:type==='shooter'?80+Math.random()*100:999,speed:spd,damage:type==='heavy'?2:1});
  }
  if(f.enemies.length>1)for(let i=1;i<f.enemies.length;i++)f.enemies[i].x=Math.max(smin+10,Math.min(smax-f.enemies[i].w-10,f.enemies[i-1].x+40+Math.random()*40));
 }
}
function cf(){return floors[floorNum]}

// Touch
canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.clientX<W/2)touchL=true;else touchR=true}if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart();lockLandscape()});
canvas.addEventListener('touchend',e=>{e.preventDefault();touchL=false;touchR=false;for(const t of e.touches){if(t.clientX<W/2)touchL=true;else touchR=true}});
canvas.addEventListener('touchcancel',()=>{touchL=false;touchR=false});
canvas.addEventListener('click',()=>{if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart();lockLandscape()});
function lockLandscape(){if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{})}
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')jumpWanted=true;if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=true;if((e.key==='Enter'||e.key===' ')&&gameState==='intro'&&introT>30)start();if((e.key==='Enter'||e.key===' ')&&gameState==='dead')restart()});
window.addEventListener('keyup',e=>{if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=false});
function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;if(platformW===0||Math.abs(platformW-(W-20))>40)initFloors()}window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:-2-Math.random()*4,life:10+Math.random()*20,c,size:1+Math.random()*3})}

function start(){
 gameState='playing';score=0;floorNum=0;climbing=false;climbT=0;bossActive=false;
 P.hp=P.maxHp;P.inv=0;P.shootCd=0;P.dir=-1;P.vx=1.2;P.vy=0;P.onGround=true;P.weapon='pistol';P.ammo=99;
 bullets=[];eBullets=[];particles=[];powerUps=[];
 const f=cf();P.x=platformW-wallW-P.w-12;P.y=f.y-P.h;cameraY=f.y-H*0.85;
}
function restart(){gameState='intro';introT=0;P.hp=P.maxHp;floorNum=0;score=0;bullets=[];eBullets=[];particles=[];powerUps=[];cameraY=0}
function die(){gameState='dead';if(score>highScore){highScore=score;localStorage.setItem('neonash_hs',highScore)}sp(P.x,P.y,C.magenta,40);shakeT=50;shakeI=15}

function shoot(){
 if(P.ammo<=0)return;
 const bSpeed=P.weapon==='laser'?10:P.weapon==='rail'?12:6;
 const bW=P.weapon==='shotgun'?14:9;
 const bullets_count=P.weapon==='shotgun'?3:1;
 for(let i=0;i<bullets_count;i++){
  const spread=(i-1)*0.3;
  bullets.push({x:P.x+P.w/2,y:P.y+P.h/2-8,vx:P.dir*bSpeed+spread,vy:spread*2,w:bW,h:3,damage:P.weapon==='rail'?3:1});
  sp(P.x+P.w/2,P.y+P.h/2-8,C.cyan,2);
 }
 P.ammo--;P.shootCd=P.weapon==='laser'?6:P.weapon==='shotgun'?22:14;
}

function update(){
 if(gameState==='intro'){introT++;return}
 if(gameState==='dead'){if(shakeT>0)shakeT--;return}

function drawDead(){ctx.fillStyle=C.bg+'DD';ctx.fillRect(0,0,W,H);ctx.fillStyle=C.red;ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('MUERTO',W/2,H/2-48);ctx.fillStyle=C.cyan;ctx.font='15px monospace';ctx.fillText('Piso '+floorNum,W/2,H/2-20);ctx.fillStyle=C.white;ctx.font='24px monospace';ctx.fillText(''+score,W/2,H/2+10);if(score>=highScore&&score>0){ctx.fillStyle=C.amber;ctx.font='10px monospace';ctx.fillText('🏆 NUEVO RÉCORD',W/2,H/2+32)}const a=.4+Math.sin(Date.now()*.004)*.3;ctx.fillStyle=C.white+Math.floor(a*255).toString(16).padStart(2,'0');ctx.font='10px monospace';ctx.fillText('toca para reiniciar',W/2,H/2+56)}
function loop(){resize();update();ctx.clearRect(0,0,W,H);if(gameState==='intro')drawIntro();else if(gameState==='dead'){draw();drawDead()}else draw();requestAnimationFrame(loop)}
resize();loop();</script></body></html>
