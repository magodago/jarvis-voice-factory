function stopMusic(){musicOsc.forEach(o=>{try{o.stop()}catch(e){}});musicOsc=[]}

function spawnEnemies(){
 const n=1+Math.floor(Math.random()*2)+Math.floor(room/8);
 for(let i=0;i<Math.min(n,5);i++){
  let tp='walker';const rnd=Math.random();
  if(rnd<0.2+room*0.01)tp='shooter';
  else if(rnd<0.35+room*0.01)tp='heavy';
  else if(rnd<0.45&&room>10)tp='suicide';
  enemies.push({x:0,y:0,w:tp==='heavy'?80:56,h:tp==='heavy'?90:72,hp:tp==='heavy'?4:tp==='suicide'?1:2+Math.floor(room/15),type:tp,cd:tp==='shooter'?80:tp==='suicide'?30:99,speed:tp==='suicide'?0.8:tp==='heavy'?0.15:0.3});
 }
}

function newRoom(){
 enemies=[];eb=[];mines=[];powerUps=[];platforms=[];xpOrbs=[];bossActive=false;
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2,l=px+lw,r=px+pw-lw,fl=H*.82;
 const themes=['normal','alarm','toxic','void','neon'];theme=room%5===0?themes[Math.floor(Math.random()*5)]:'normal';
 if(room>0&&room%15===0){for(let i=0;i<6;i++)powerUps.push({x:l+30+i*80,y:fl-30-Math.random()*30,type:['heal','fire','shield','rail','barrier'][i%5],life:400});return}
 if(room>0&&room%10===0){bossActive=true;enemies.push({x:r-200,y:fl-66,w:120,h:120,hp:15+playerLvl*3,type:'boss',cd:40,speed:0.15})}
 else if(room>0&&room%5===0){enemies.push({x:r-160,y:fl-80,w:90,h:90,hp:6+playerLvl*2,type:'boss',cd:50,speed:0.12})}
 else if(Math.random()<0.1+room*0.005){for(let i=0;i<6;i++)enemies.push({x:r-30-i*40,y:fl-48,w:36,h:48,hp:1,type:'walker',cd:999,speed:0.25})}
 else{spawnEnemies()}
 for(const e of enemies){e.x=r-30-e.w-Math.random()*(r-l-200-e.w);e.y=fl-e.h}
 // Platforms (always 2)
 let plX1=l+30+Math.random()*((r-l-200)/2);platforms.push({x:plX1,y:fl-60-Math.random()*40,w:60+Math.random()*35,h:12});let plX2=plX1+100+Math.random()*((r-l-200)/2);if(plX2<r-90)platforms.push({x:plX2,y:fl-65-Math.random()*45,w:60+Math.random()*35,h:12})
 // Mines
 if(!bossActive&&!(room%15===0)){
  let mx1=l+80+Math.random()*((r-l-160)/2);mines.push({x:mx1,y:fl-12});
  if(Math.random()<.3){let mx2=mx1+120+Math.random()*((r-l-160)/2);if(mx2<r-80)mines.push({x:mx2,y:fl-12})}
 }
 for(let i=0;i<1+Math.floor(Math.random()*2);i++){xpOrbs.push({x:l+60+Math.random()*(r-l-120),y:fl-30-Math.random()*40,life:500})}
}

// Touch
let touchL=false,touchR=false,lastTap=0;
cv.addEventListener('touchstart',e=>{e.preventDefault();if(state==='intro'){start();startMusic();return}if(state==='dead'){restart();return}for(const t of e.changedTouches){if(t.clientX<W/2){touchL=true;let n=Date.now();if(n-lastTap<300){P.dashCd=0;doubleTap=n}lastTap=n}else touchR=true}});
cv.addEventListener('touchend',e=>{e.preventDefault();touchL=false;touchR=false;for(const t of e.touches){if(t.clientX>=W/2)touchR=true}});
cv.addEventListener('touchcancel',e=>{touchL=false;touchR=false});
cv.addEventListener('mousedown',e=>{if(state==='intro'){start();startMusic();return}if(state==='dead'){restart();return}if(e.clientX<W/2){touchL=true;let n=Date.now();if(n-lastTap<300){P.dashCd=0;doubleTap=n}lastTap=n}else touchR=true});
cv.addEventListener('mouseup',e=>{touchL=false;touchR=false});
window.addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')jump=true;if(e.key==='d'||e.key===' '||e.key==='ArrowRight')shoot=true;if(e.key==='Enter'){if(state==='intro'){start();startMusic()}if(state==='dead')restart()}});
window.addEventListener('keyup',e=>{if(e.key==='d'||e.key===' '||e.key==='ArrowRight')shoot=false});

function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W;cv.height=H}window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:-1-Math.random()*4,life:10+Math.random()*12,c,sz:1+Math.random()*3})}
function start(){
 state='play';room=0;kills=0;startTime=Date.now();playerLvl=1;playerXP=0;
 P.hp=5;P.inv=0;P.shield=0;P.barrier=false;P.fireTimer=0;P.railAmmo=0;P.dashCd=0;
 P.cd=0;P.vx=1.55;P.vy=0;P.onGround=true;bullets=[];particles=[];
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2;P.x=px+lw+10;newRoom();P.y=H*.82-P.h;
}
function restart(){state='intro';room=0;bullets=[];eb=[];particles=[];enemies=[];stopMusic()}
function die(){state='dead';if(room>best){best=room;localStorage.setItem('na_best',best)}sp(P.x+P.w/2,P.y,C.mg,30);shake=30;beep(80,0.3,'sawtooth',0.08);stopMusic()}
function nextRoom(){trans=20;room++;const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2;P.x=px+lw+10;P.y=H*.82-P.h;newRoom();sp(P.x,P.y,C.cy,15);sfx('door')}

function update(){
 if(state!=='play')return;if(trans>0){trans--;return}
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2,fl=H*.82,l=px+lw,r=px+pw-lw;
 if(touchL)jump=true;if(touchR)shoot=true;if(!touchR)shoot=false;
 if(P.dashCd<=0&&doubleTap>0&&Date.now()-doubleTap<500&&P.onGround){P.vx=3.5;P.dashCd=60;doubleTap=0;P.inv=15;sp(P.x,P.y,C.cy,10);sfx('dash')}
 if(P.dashCd>0){P.dashCd--;if(P.dashCd<40)P.vx=1.55}
 P.x+=P.vx;
 if(P.x<l)P.x=l;if(P.x+P.w>r){nextRoom();return}
 P.onGround=false;
 // Platform collision first
 let onPlat=false;
 for(const pl of platforms){if(P.x+P.w>pl.x&&P.x<pl.x+pl.w&&P.y+P.h>=pl.y-3&&P.y+P.h<=pl.y+8&&P.vy>=0){P.y=pl.y-P.h;P.vy=0;P.onGround=true;onPlat=true;break}}
 if(!onPlat&&P.y+P.h>=fl-2&&P.vy>=0){P.y=fl-P.h;P.vy=0;P.onGround=true}
 if(!P.onGround){P.vy+=0.4;P.y+=P.vy}
 if(jump&&P.onGround){P.vy=-8;P.y-=2;jump=false;P.onGround=false;touchL=false}
 // Shoot
 if(shoot&&P.cd<=0){
  let dmg=(P.fireTimer>0?2:1)+Math.floor(playerLvl/3);
  if(P.railAmmo>0){bullets.push({x:P.x+P.w,y:P.y+P.h*0.15,vx:12,w:16,h:4,rail:true});P.railAmmo--;P.cd=20;sfx('rail');sp(P.x+P.w,P.y+P.h*0.15,C.or,5)}
  else if(P.weapon==='shotgun'){
   for(let s=0;s<3;s++){bullets.push({x:P.x+P.w,y:P.y+P.h*0.15-2+s*4,vx:7+Math.random()*2,w:8,h:3,dmg});}
   P.cd=22;sfx('shoot');sp(P.x+P.w,P.y+P.h*0.15,C.cy,5);
  }
  else if(P.weapon==='laser'){
   bullets.push({x:P.x+P.w,y:P.y+P.h*0.15,vx:10,w:6,h:2,dmg:dmg*0.7});P.cd=6;sfx('shoot');
  }
  else{bullets.push({x:P.x+P.w,y:P.y+P.h*0.15,vx:7,w:10,h:3,dmg});P.cd=14;sfx('shoot')}
 }
 if(P.cd>0)P.cd--;if(P.inv>0)P.inv--;if(P.shield>0)P.shield--;if(P.fireTimer>0)P.fireTimer--;
 for(const b of bullets)b.x+=b.vx;bullets=bullets.filter(b=>b.x<W+20&&b.x>-20);
 for(const e of eb)e.x+=e.vx;eb=eb.filter(e=>e.x>-20);

 // Enemies
 for(const e of enemies){
  if(e.type==='boss'){e.x-=e.speed;e.cd--;if(e.cd<=0){eb.push({x:e.x,y:fl-e.h+24,vx:-3.5,w:8,h:4});e.cd=50}}
  else if(e.type==='suicide'){e.x-=e.speed;if(Math.abs(e.x-P.x)<30){e.hp=0;sp(e.x+e.w/2,fl-10,C.or,20);shake=18;sfx('mine');P.hp-=2;P.inv=50;if(P.hp<=0)die()}}
  else{e.x-=e.speed;if(e.type==='walker'){
  e.y=fl-e.h;
  e.blinkTimer=(e.blinkTimer||0)+1;
  if(e.blinkTimer>120){e.blinkTimer=0;e.alpha=0.3;setTimeout(()=>{e.alpha=1},400);
   // Teleport to random X nearby
   let nx=P.x+(Math.random()-.5)*200;
   if(nx>l+10&&nx<r-e.w-10)e.x=nx;
  }
  if(e.alpha<1)e.alpha=Math.min(1,e.alpha+0.05);
}else if(e.type==='heavy'&&Math.abs(e.x-P.x)<100){e.x-=e.speed*2}else{e.y=fl-e.h}if(e.x<l+10){e.x=r-10}e.cd--;if(e.cd<=0&&e.type==='shooter'){for(const pl of platforms){if(Math.abs(e.x-pl.x-pl.w/2)<50){e.x=pl.x+pl.w;break}}eb.push({x:e.x,y:fl-e.h+26,vx:-3,w:6,h:3});e.cd=90+Math.random()*40}}
  // Hit by bullet
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];if(b.x>e.x&&b.x<e.x+e.w&&Math.abs(b.y-(fl-e.h/2))<40){e.hp-=(b.dmg||1);if(!b.rail)bullets.splice(i,1);sp(e.x+e.w/2,fl-e.h/2,C.mg,4);shake=4;sfx('hit');if(e.hp<=0){enemies=enemies.filter(x=>x!==e);kills++;sp(e.x+e.w/2,fl-e.h/2,C.re,8);sfx('kill');
    if(e.type==='boss'){bossActive=false;for(let x=0;x<40;x++)particles.push({x:e.x+e.w/2,y:fl-e.h/2,vx:(Math.random()-.5)*8,vy:-4-Math.random()*8,life:20+Math.random()*30,c:C.re,sz:2+Math.random()*6});sp(e.x+e.w/2,fl-e.h/2,C.cy,30);shake=30;sfx('boss');for(let i=0;i<3;i++)powerUps.push({x:e.x+20+i*35,y:fl-40,type:i===0?'heal':i===1?'fire':'shield',life:300})}
    else{if(Math.random()<.15)powerUps.push({x:e.x,y:fl-40,type:'heal',life:200});if(Math.random()<.08)powerUps.push({x:e.x+15,y:fl-40,type:'shield',life:200});if(Math.random()<.08)powerUps.push({x:e.x+30,y:fl-40,type:'fire',life:200});if(Math.random()<.05)powerUps.push({x:e.x+45,y:fl-40,type:'rail',life:200});if(Math.random()<.04)powerUps.push({x:e.x+60,y:fl-40,type:'barrier',life:200});if(Math.random()<.06)powerUps.push({x:e.x+75,y:fl-40,type:'shotgun',life:250});if(Math.random()<.04)powerUps.push({x:e.x+90,y:fl-40,type:'laser',life:250})}}break}}
  // Hit player
  if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(P.y-fl+P.h/2+e.h/2)<e.h/2+P.h/2){
   P.hp-=e.type==='boss'?2:e.type==='suicide'?2:1;
   if(P.barrier){P.barrier=false;sp(P.x,P.y,C.am,20);P.inv=30}else if(P.shield>0){P.hp++;P.shield=0;sp(P.x,P.y,C.cy,15)}else{P.inv=e.type==='boss'?60:40;sp(P.x+P.w/2,P.y,C.re,8);shake=e.type==='boss'?20:10}
   sfx('hit');if(P.hp<=0)die()
  }
 }
 // Enemy bullets hit player
 for(let i=eb.length-1;i>=0;i--){const e=eb[i];if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(e.y-P.y-P.h/2)<22){
  P.hp--;if(P.barrier){P.barrier=false;P.hp++;sp(P.x,P.y,C.am,15);P.inv=25}else if(P.shield>0){P.hp++;P.shield=0;sp(P.x,P.y,C.cy,10)}else{P.inv=40;sp(P.x+P.w/2,P.y,C.mg,6)}
  eb.splice(i,1);shake=8;sfx('hit');if(P.hp<=0)die()}}
 // Mines
 for(const m of mines){const dx=P.x+P.w/2-m.x,dy=P.y+P.h-m.y;if(P.inv<=0&&Math.sqrt(dx*dx+dy*dy)<16){P.hp--;P.inv=35;sp(m.x,m.y,C.mg,15);shake=14;sfx('mine');if(P.hp<=0)die()}}
 // Power-ups
 for(let i=powerUps.length-1;i>=0;i--){const pu=powerUps[i];pu.life--;if(pu.life<=0){powerUps.splice(i,1);continue}
  if(Math.abs(P.x+P.w/2-pu.x)<22&&Math.abs(P.y+P.h/2-pu.y)<22){
   if(pu.type==='heal')P.hp=Math.min(5,P.hp+2);else if(pu.type==='shield')P.shield=180;else if(pu.type==='fire'){P.fireTimer=300;for(let f=0;f<12;f++)particles.push({x:pu.x+(Math.random()-.5)*30,y:pu.y-10-Math.random()*30,vx:(Math.random()-.5)*2,vy:-2-Math.random()*3,life:25+Math.random()*15,c:C.or,sz:2+Math.random()*4})}else if(pu.type==='rail')P.railAmmo=Math.min(5,P.railAmmo+3);else if(pu.type==='barrier')P.barrier=true;else if(pu.type==='shotgun'){P.weapon='shotgun';sp(pu.x,pu.y,C.or,10)}else if(pu.type==='laser'){P.weapon='laser';sp(pu.x,pu.y,C.mg,10)}
   sp(pu.x,pu.y,pu.type==='fire'?C.or:pu.type==='shield'?C.cy:C.gn,8);powerUps.splice(i,1);sfx('power')
  }
 }
 // XP orbs
 for(let i=xpOrbs.length-1;i>=0;i--){const xo=xpOrbs[i];xo.life--;if(xo.life<=0){xpOrbs.splice(i,1);continue}if(Math.abs(P.x+P.w/2-xo.x)<14&&Math.abs(P.y+P.h/2-xo.y)<14){playerXP+=10+Math.floor(playerLvl/2);xpOrbs.splice(i,1);sp(xo.x,xo.y,C.cy,4);if(playerXP>=playerLvl*50){playerLvl++;playerXP=0;sp(P.x+P.w/2,P.y,C.cy,20);sfx('power');P.hp=Math.min(5,P.hp+1)}}}
 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}particles=particles.filter(p=>p.life>0);
 if(shake>0)shake--;
 if(theme==='toxic'&&Math.random()<.005*Math.min(3,1+room/10)&&P.inv<=0){P.hp--;P.inv=20;sp(P.x+P.w/2,P.y,C.gn,5);if(P.hp<=0)die()}
}

function draw(){
 const s=(shake>0)?(Math.random()-.5)*shake*.5:0;cx.save();cx.translate(s,s);
 cx.fillStyle=C.bg;cx.fillRect(0,0,W,H);
 if(trans>0){cx.globalAlpha=trans/20;cx.fillStyle='#fff';cx.fillRect(0,0,W,H);cx.globalAlpha=1;cx.restore();return}
 const pw=Math.min(W-40,700),lw=14,px=(W-pw)/2,fl=H*.82,l=px,r=px+pw;

 // BG image
 const bgImg=BGS[room%3];
 if(bgImg&&bgImg.complete&&bgImg.naturalWidth>0){cx.globalAlpha=0.4;cx.drawImage(bgImg,px,0,pw,H);cx.globalAlpha=1}
 // Color overlay + theme
 cx.globalAlpha=0.4;cx.fillStyle=theme==='alarm'?'#2a0010':theme==='toxic'?'#002015':theme==='void'?'#100030':theme==='neon'?'#150030':'#180040';cx.fillRect(px,0,pw,H);cx.globalAlpha=1;
 // Light rays
 for(let i=0;i<3;i++){let lx=px+pw*0.2+i*pw*0.3;let lGrd=cx.createLinearGradient(lx,0,lx,fl);lGrd.addColorStop(0,C.cy+'06');lGrd.addColorStop(1,'transparent');cx.fillStyle=lGrd;cx.fillRect(lx-20,0,40,fl)}
 // Grid
 cx.strokeStyle=C.cy+'08';cx.lineWidth=0.5;for(let y=0;y<H;y+=24){cx.beginPath();cx.moveTo(px,y);cx.lineTo(px+pw,y);cx.stroke()}for(let x=px;x<px+pw;x+=24){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}
 // Walls
 cx.fillStyle=theme==='alarm'?'#2a0010':theme==='toxic'?'#002015':theme==='void'?'#0a0030':theme==='neon'?'#150030':'#120030';cx.fillRect(px,0,lw,H);cx.fillRect(px+pw-lw,0,lw,H);
 for(let wy=20;wy<fl;wy+=40){cx.fillStyle=C.cy+'25';cx.fillRect(px+3,wy,lw-6,3);cx.fillRect(px+pw-lw+3,wy,lw-6,3)}
 cx.strokeStyle=C.cy;cx.lineWidth=2;cx.shadowColor=C.cy;cx.shadowBlur=8;cx.beginPath();cx.moveTo(px+lw,0);cx.lineTo(px+lw,H);cx.stroke();cx.beginPath();cx.moveTo(px+pw-lw,0);cx.lineTo(px+pw-lw,H);cx.stroke();cx.shadowBlur=0;
 for(let wy=40;wy<fl-20;wy+=60){cx.fillStyle=C.am+'60';cx.beginPath();cx.arc(px+lw/2,wy,6,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(px+pw-lw/2,wy,6,0,Math.PI*2);cx.fill()}
 // Floor
 let hb=(Math.sin(Date.now()*.002+room)+1)/2;cx.fillStyle=C.cy+(30+Math.floor(hb*20)).toString(16);cx.fillRect(px,fl-2,pw,8);
 cx.strokeStyle=C.cy+'40';cx.lineWidth=2;cx.beginPath();cx.moveTo(px,fl);cx.lineTo(px+pw,fl);cx.stroke();
 // Portal
 const pt=Date.now()*0.002;let dcx=r-20,dh=H*.65,dy2=fl-dh;
 for(let i=4;i>0;i--){cx.globalAlpha=0.08+Math.sin(pt+i)*0.05;cx.strokeStyle=C.mg;cx.lineWidth=1+i;cx.beginPath();cx.ellipse(dcx+9,dy2+dh/2,18+i*5,dh/2+i*4,0,0,Math.PI*2);cx.stroke()}
 let pGrd=cx.createLinearGradient(dcx,dy2,dcx,fl);pGrd.addColorStop(0,C.cy+'20');pGrd.addColorStop(0.3,C.mg+'40');pGrd.addColorStop(0.5,C.cy+'30');pGrd.addColorStop(0.7,C.mg+'50');pGrd.addColorStop(1,'transparent');
 cx.globalAlpha=0.8;cx.fillStyle=pGrd;cx.fillRect(dcx-6,dy2,30,dh);cx.globalAlpha=1;
 cx.strokeStyle=C.cy;cx.lineWidth=2;cx.shadowColor=C.cy;cx.shadowBlur=12;cx.beginPath();cx.ellipse(dcx+9,dy2+dh/2,17,dh/2,0,0,Math.PI*2);cx.stroke();cx.shadowBlur=0;
 cx.fillStyle=C.cy;cx.font='bold 9px monospace';cx.textAlign='center';cx.fillText('WARP',dcx+9,dy2-10);
 // PLATFORMS - solid neon with heartbeat
 for(const pl of platforms){
  const phb=(Math.sin(Date.now()*0.005+pl.x)+1)/2;
  // Body
  cx.fillStyle=C.cy+(20+Math.floor(phb*35)).toString(16);
  cx.fillRect(pl.x,pl.y,pl.w,pl.h);
  // Top glow line
  cx.fillStyle=C.cy+(40+Math.floor(phb*50)).toString(16);
  cx.fillRect(pl.x+2,pl.y-1,pl.w-4,3);
  // Border pulse
  cx.strokeStyle=C.cy+(40+Math.floor(phb*40)).toString(16);
  cx.lineWidth=2+phb;cx.strokeRect(pl.x,pl.y,pl.w,pl.h);
  // Bottom glow
  let bglow=cx.createLinearGradient(0,pl.y+pl.h,0,pl.y+pl.h+15);
  bglow.addColorStop(0,C.cy+'30');bglow.addColorStop(1,'transparent');
  cx.fillStyle=bglow;cx.fillRect(pl.x-5,pl.y+pl.h,pl.w+10,15);
  // Side dots
  cx.fillStyle=C.cy+(30+Math.floor(phb*50)).toString(16);
  cx.beginPath();cx.arc(pl.x+4,pl.y+pl.h/2,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(pl.x+pl.w-4,pl.y+pl.h/2,2,0,Math.PI*2);cx.fill();
 }
 // Mines
