<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>NEON ASH</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#060010;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;position:fixed}
#game{width:100%;height:100%;position:relative}canvas{display:block;width:100%;height:100%}
.btns{position:absolute;bottom:16px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;z-index:20;pointer-events:auto}
.btns button{width:80px;height:80px;border-radius:50%;border:3px solid;font:bold 13px monospace;color:#fff;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#btnJump{background:rgba(0,212,255,0.2);border-color:#00d4ff;color:#00d4ff}
#btnJump:active{background:rgba(0,212,255,0.5)}
#btnShoot{background:rgba(255,21,208,0.2);border-color:#ff15d0;color:#ff15d0}
#btnShoot:active{background:rgba(255,21,208,0.5)}
</style></head><body><div id="game"><canvas id="c"></canvas>
<div class="btns"><button id="btnJump">SALTAR</button><button id="btnShoot">DISPARO</button></div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const btnJ=document.getElementById('btnJump'),btnS=document.getElementById('btnShoot');
let W,H,gameState='intro',score=0,roomNum=0,highScore=parseInt(localStorage.getItem('neonash_hs')||0);
let shakeT=0,shakeI=0,introT=0,transitionTimer=0,jumpWanted=false,shootHeld=false;
const C={bg:'#060010',cyan:'#00d4ff',magenta:'#ff15d0',white:'#e8e0ff',amber:'#ffb347',red:'#ff4466',purple:'#7b00ff',panel:'#0a0020',wall:'#0d0030',green:'#00ff88'};
const P={x:0,y:0,w:22,h:30,vx:1.5,vy:0,dir:-1,onGround:false,hp:5,maxHp:5,shootCd:0,inv:0};
let bullets=[],eBullets=[],enemies=[],particles=[],powerUps=[],plates=[];

function newRoom(n){
 enemies=[];eBullets=[];plates=[];
 const pw=W-60,px=(W-pw)/2,ww=14;
 const left=px+ww,right=px+pw-ww;
 const doorSide=n%2===0?'right':'left';
 // Enemies: 2-3 in the room, away from door
 for(let i=0;i<2+Math.floor(Math.random()*2);i++){
  let ex,edir;
  if(doorSide==='right'){ex=left+30+Math.random()*(pw-120)}else{ex=left+60+Math.random()*(pw-120)}
  enemies.push({x:ex,y:0,w:18,h:26,patrolDir:Math.random()>.5?1:-1,hp:2,type:Math.random()<.3?'shooter':'walker',sTimer:99});
 }
 // Plates: 1-2 in safe area 
 for(let i=0;i<1+Math.floor(Math.random()*2);i++){
  let px2=doorSide==='right'?left+20+Math.random()*(pw-100):left+40+Math.random()*(pw-100);
  plates.push({x:px2});
 }
 return {n,doorSide,left,right};
}

let room=newRoom(0);

function spawnRoom(){room=newRoom(roomNum)}

// Input
btnJ.addEventListener('pointerdown',e=>{e.preventDefault();jumpWanted=true});
btnJ.addEventListener('touchstart',e=>{e.preventDefault();jumpWanted=true});
btnS.addEventListener('pointerdown',e=>{e.preventDefault();shootHeld=true});
btnS.addEventListener('pointerup',e=>{e.preventDefault();shootHeld=false});
btnS.addEventListener('pointerleave',e=>{shootHeld=false});
btnS.addEventListener('touchstart',e=>{e.preventDefault();shootHeld=true});
btnS.addEventListener('touchend',e=>{e.preventDefault();shootHeld=false});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')jumpWanted=true;if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=true;if((e.key==='Enter'||e.key===' ')&&gameState==='intro'&&introT>30)start();if((e.key==='Enter'||e.key===' ')&&gameState==='dead')restart()});
window.addEventListener('keyup',e=>{if(e.key==='ArrowRight'||e.key==='d'||e.key===' ')shootHeld=false});
canvas.addEventListener('click',()=>{if(gameState==='intro'&&introT>30)start();if(gameState==='dead')restart()});

function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;if(W>0)spawnRoom()}window.addEventListener('resize',resize);
function sp(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:-2-Math.random()*4,life:10+Math.random()*15,c,size:1+Math.random()*3})}

function start(){gameState='playing';score=0;roomNum=0;P.hp=P.maxHp;P.inv=0;P.shootCd=0;P.dir=-1;P.vx=1.5;P.vy=0;P.onGround=true;bullets=[];transitionTimer=0;spawnRoom();P.x=room.left+60;P.y=H*0.8}
function restart(){gameState='intro';introT=0;roomNum=0;score=0;bullets=[];eBullets=[];particles=[];transitionTimer=0}
function die(){gameState='dead';if(score>highScore){highScore=score;localStorage.setItem('neonash_hs',highScore)}sp(P.x,P.y,C.magenta,40);shakeT=40;shakeI=12}

function nextRoom(){
 transitionTimer=30;roomNum++;score+=200;spawnRoom();
 P.x=room.doorSide==='right'?room.left+60:room.right-60-P.w;
 P.dir=room.doorSide==='right'?1:-1;
 P.y=H*0.8;P.onGround=true;P.vy=0;
 sp(P.x,P.y,C.cyan,20);
}

function update(){
 if(gameState==='intro'){introT++;if(introT>300)introT=300;return}
 if(gameState==='dead'){if(shakeT>0)shakeT--;return}
 if(transitionTimer>0){transitionTimer--;return}

 const floorY=H*0.85;
 // Move
 P.x+=P.vx*P.dir;
 if(P.x<=room.left){P.dir=1;P.x=room.left}
 if(P.x+P.w>=room.right){P.dir=-1;P.x=room.right-P.w}

 // Door trigger
 const atDoor=(room.doorSide==='right'&&P.x+P.w>=room.right-2)||(room.doorSide==='left'&&P.x<=room.left+2);
 if(atDoor&&P.onGround){nextRoom();return}

 // Gravity
 P.onGround=false;
 if(P.y+P.h>=floorY-2&&P.y+P.h<=floorY+16&&P.vy>=0){P.y=floorY-P.h;P.vy=0;P.onGround=true}
 if(P.y+P.h>floorY+24){P.y=floorY-P.h;P.vy=0;P.onGround=true}
 if(!P.onGround){P.vy+=0.4;P.y+=P.vy}

 // Jump
 if(jumpWanted&&P.onGround){P.vy=-9;P.y-=2;jumpWanted=false;P.onGround=false}
 // Shoot
 if(shootHeld&&P.shootCd<=0){bullets.push({x:P.x+P.w/2,y:P.y+P.h/2-5,vx:P.dir*8,vy:0,w:12,h:4});P.shootCd=12;sp(P.x+P.w/2+P.dir*8,P.y+P.h/2-5,C.cyan,3)}
 if(P.shootCd>0)P.shootCd--;if(P.inv>0)P.inv--;

 for(const b of bullets)b.x+=b.vx;bullets=bullets.filter(b=>b.x>-30&&b.x<W+30);
 for(const eb of eBullets)eb.x+=eb.vx;eBullets=eBullets.filter(eb=>eb.x>-30&&eb.x<W+30);

 // Enemies
 for(const e of enemies){
  e.x+=e.patrolDir*0.6;
  if(e.x<room.left+10||e.x+e.w>room.right-10)e.patrolDir*=-1;
  e.sTimer--;if(e.sTimer<=0&&e.type==='shooter'){eBullets.push({x:e.x+e.w/2,y:floorY-30,vx:(P.x>e.x?1:-1)*3,vy:0,w:7,h:3});e.sTimer=80+Math.random()*80}
  for(let bi=bullets.length-1;bi>=0;bi--){const b=bullets[bi];if(b.x<e.x+e.w&&b.x+b.w>e.x&&Math.abs(b.y-(floorY-20))<20){e.hp--;bullets.splice(bi,1);sp(e.x+e.w/2,floorY-20,C.magenta,5);shakeT=4;shakeI=2;if(e.hp<=0){enemies=enemies.filter(x=>x!==e);score+=250;sp(e.x+e.w/2,floorY-20,C.red,10)}break}}
  if(P.inv<=0&&e.x<P.x+P.w&&e.x+e.w>P.x&&Math.abs(P.y-floorY+15)<30){P.hp--;P.inv=50;sp(P.x+P.w/2,P.y+P.h/2,C.red,10);shakeT=12;shakeI=7;if(P.hp<=0)die()}
 }
 for(let ei=eBullets.length-1;ei>=0;ei--){const eb=eBullets[ei];if(P.inv<=0&&eb.x<P.x+P.w&&eb.x+eb.w>P.x&&Math.abs(eb.y-P.y-P.h/2)<20){P.hp--;P.inv=50;eBullets.splice(ei,1);shakeT=10;shakeI=6;sp(P.x+P.w/2,P.y+P.h/2,C.magenta,8);if(P.hp<=0)die()}}
 // Plates
 for(const pl of plates){
  const dx=P.x+P.w/2-pl.x,dy=P.y+P.h/2-(floorY-6);
  if(P.inv<=0&&Math.sqrt(dx*dx+dy*dy)<18){P.hp--;P.inv=35;sp(P.x+P.w/2,P.y+P.h/2,C.magenta,15);if(P.hp<=0)die()}
 }

 for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--}particles=particles.filter(p=>p.life>0);
 if(shakeT>0)shakeT--;
}

function draw(){
 ctx.save();const sx=shakeT>0?(Math.random()-.5)*shakeI:0,sy=shakeT>0?(Math.random()-.5)*shakeI:0;ctx.translate(sx,sy);
 ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
 if(transitionTimer>0){ctx.fillStyle=C.white;ctx.globalAlpha=transitionTimer/30;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;ctx.restore();return}

 const floorY=H*0.85;
 const pw=W-60,px=(W-pw)/2;
 // Building bg
 ctx.fillStyle='#0a0018';ctx.fillRect(px,0,pw,H);
 // Grid
 ctx.strokeStyle=C.cyan+'04';for(let yy=0;yy<H;yy+=40){ctx.beginPath();ctx.moveTo(px,yy);ctx.lineTo(px+pw,yy);ctx.stroke()}
 // Walls
 ctx.fillStyle=C.wall;ctx.fillRect(px,0,14,H);ctx.fillRect(px+pw-14,0,14,H);
 // Brick on walls
 for(let wy=0;wy<H;wy+=12){for(let wx=px;wx<px+14;wx+=7){ctx.fillStyle='#1a1a2e';ctx.fillRect(wx,wy,5,10)}for(let wx=px+pw-14;wx<px+pw;wx+=7){ctx.fillStyle='#1a1a2e';ctx.fillRect(wx,wy,5,10)}}
 // Door
 const doorX=room.doorSide==='right'?px+pw-18:px+4;
 ctx.fillStyle=C.magenta+'40';ctx.fillRect(doorX,floorY-60,14,60);
 ctx.strokeStyle=C.magenta;ctx.lineWidth=2;ctx.strokeRect(doorX,floorY-60,14,60);
 ctx.fillStyle=C.magenta;ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('NEXT',doorX+7,floorY-30);
 // Floor - cyan heartbeat
 const hb=(Math.sin(Date.now()*0.004+roomNum)+1)/2;
 ctx.fillStyle=C.cyan+(30+Math.floor(hb*30)).toString(16);ctx.fillRect(px,floorY-4,pw,12);
 ctx.fillStyle=C.cyan+(15+Math.floor(hb*20)).toString(16);ctx.fillRect(px,floorY-2,pw,8);
 ctx.strokeStyle=C.cyan+'60';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px,floorY);ctx.lineTo(px+pw,floorY);ctx.stroke();
 // Plates
 for(const pl of plates){
  const hb2=(Math.sin(Date.now()*0.005+pl.x)+1)/2;
  let g=ctx.createRadialGradient(pl.x,floorY-6,2,pl.x,floorY-6,14+hb2*4);
  g.addColorStop(0,C.magenta);g.addColorStop(0.6,C.magenta+'40');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(pl.x-20,floorY-26,40,40);
  ctx.fillStyle=C.magenta;ctx.beginPath();ctx.arc(pl.x,floorY-6,6+hb2*3,0,Math.PI*2);ctx.fill();
 }
 // Enemies
 for(const e of enemies){
  ctx.fillStyle=e.type==='shooter'?C.magenta:C.purple;
  ctx.fillRect(e.x,floorY-26,e.w,26);
  ctx.fillStyle=e.type==='shooter'?C.red:C.amber;
  ctx.fillRect(e.x+4,floorY-24,3,3);ctx.fillRect(e.x+10,floorY-24,3,3);
  if(e.type==='shooter'){ctx.fillStyle=C.red;ctx.fillRect(e.x+(e.patrolDir>0?e.w:0),floorY-10,6,2)}
 }
 // Player
 if(gameState==='playing'||gameState==='dead'){const a=P.inv>0?.4+Math.sin(Date.now()*.3)*.3:1;ctx.globalAlpha=a;ctx.fillStyle=C.cyan;ctx.fillRect(P.x,P.y+8,P.w,P.h-10);ctx.fillRect(P.x+6,P.y,10,10);ctx.fillStyle=C.white;ctx.fillRect(P.x+8,P.y+2,6,3);ctx.fillStyle=C.magenta;if(P.dir>0)ctx.fillRect(P.x+P.w,P.y+14,9,3);else ctx.fillRect(P.x-9,P.y+14,9,3);ctx.globalAlpha=1}
 // Bullets
 for(const b of bullets){ctx.fillStyle=C.cyan;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle=C.white;ctx.fillRect(b.x+2,b.y,b.w-4,b.h)}
 for(const eb of eBullets){ctx.fillStyle=C.magenta;ctx.fillRect(eb.x,eb.y,eb.w,eb.h)}
 for(const p of particles){ctx.fillStyle=p.c;ctx.globalAlpha=p.life/30;ctx.fillRect(p.x,p.y,p.size,p.size)}ctx.globalAlpha=1;ctx.restore();
 // HUD
 ctx.fillStyle='#0a0020ee';ctx.fillRect(0,0,W,40);
 ctx.fillStyle=C.cyan;ctx.font='bold 14px monospace';ctx.textAlign='left';ctx.fillText('ROOM '+roomNum,10,27);
 ctx.fillStyle=C.white;ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('⚡'+score,W/2,27);
 ctx.textAlign='right';let h='';for(let i=0;i<P.maxHp;i++)h+=i<P.hp?'♥':'♡';ctx.fillStyle=C.red;ctx.font='14px monospace';ctx.fillText(h,W-10,27);
}
function drawIntro(){
 ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);const t=Date.now()*.001;
 ctx.textAlign='center';ctx.fillStyle=C.cyan;ctx.font='bold 42px monospace';ctx.shadowColor=C.cyan;ctx.shadowBlur=26;ctx.fillText('NEON',W/2,H*.2);
 ctx.fillStyle=C.magenta;ctx.font='bold 42px monospace';ctx.shadowColor=C.magenta;ctx.shadowBlur=26;ctx.fillText('ASH',W/2,H*.3);ctx.shadowBlur=0;
 ctx.fillStyle=C.white+'30';ctx.font='11px monospace';ctx.fillText('CYBER TOWER',W/2,H*.37);
 const bx=W/2-78,by=H*.48,pulse=Math.sin(t*2.5)*3;
 ctx.strokeStyle=C.cyan;ctx.lineWidth=2.5;ctx.strokeRect(bx+pulse,by,156,58);ctx.fillStyle=C.cyan+'08';ctx.fillRect(bx,by,156,58);
 ctx.fillStyle=C.cyan;ctx.font='bold 20px monospace';ctx.fillText('▶ ENTRAR',W/2,by+38);
 if(highScore>0){ctx.fillStyle=C.amber;ctx.font='11px monospace';ctx.fillText('🏆 '+highScore,W/2,by+80)}
 ctx.fillStyle=C.white+'20';ctx.font='9px monospace';ctx.fillText('IZQ = SALTAR | DER = DISPARAR',W/2,H-20);
}
function drawDead(){ctx.fillStyle=C.bg+'DD';ctx.fillRect(0,0,W,H);ctx.fillStyle=C.red;ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('MUERTO',W/2,H/2-40);ctx.fillStyle=C.cyan;ctx.font='15px monospace';ctx.fillText('Room '+roomNum,W/2,H/2-12);ctx.fillStyle=C.white;ctx.font='24px monospace';ctx.fillText(''+score,W/2,H/2+18);if(score>=highScore&&score>0){ctx.fillStyle=C.amber;ctx.font='10px monospace';ctx.fillText('🏆 RECORD',W/2,H/2+38)}const a=.4+Math.sin(Date.now()*.004)*.3;ctx.fillStyle=C.white+Math.floor(a*255).toString(16).padStart(2,'0');ctx.font='10px monospace';ctx.fillText('toca para reiniciar',W/2,H/2+58)}
function loop(){resize();update();ctx.clearRect(0,0,W,H);if(gameState==='intro')drawIntro();else if(gameState==='dead'){draw();drawDead()}else draw();requestAnimationFrame(loop)}
resize();loop();
</script></body></html>
