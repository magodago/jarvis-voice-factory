<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Galería de Magos · El Gran Libro de la Magia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/magic-particles.css">
<style>
:root{--bg:#0a0a0f;--bg2:#0f0f1a;--card:#14141f;--gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#8a7030;--text:#f0ece4;--text2:#a09888;--text3:#6b6358;--border:rgba(201,168,76,0.08);--border-gold:rgba(201,168,76,0.2);--font-display:'Cormorant Garamond',serif;--font-body:'Inter',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--gold-dark) var(--bg)}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(10,10,15,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
nav .logo{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--gold);text-decoration:none}
nav .logo span{color:var(--text3)}
nav .back{color:var(--text2);text-decoration:none;font-size:12px;transition:color .3s}
.hero{position:relative;padding:100px 40px 60px;text-align:center;background:linear-gradient(180deg,var(--bg),var(--bg2))}
.hero h1{font-family:var(--font-display);font-size:clamp(36px,5vw,56px);font-weight:300;margin-bottom:8px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{color:var(--text2);font-size:15px;font-weight:300;max-width:600px;margin:0 auto;line-height:1.6}
.hero .stats{margin-top:20px;display:flex;gap:32px;justify-content:center}
.hero .stat-num{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--gold)}
.hero .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
#filters{padding:0 40px 20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#filters button{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .3s}
#filters button:hover{border-color:var(--border-gold);color:var(--gold)}
#filters button.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;max-width:1200px;margin:0 auto 60px;padding:0 20px}
.gallery-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .4s;position:relative}
.gallery-card:hover{transform:translateY(-4px);border-color:var(--border-gold);box-shadow:0 12px 48px rgba(201,168,76,.1)}
.gallery-card .gc-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:var(--bg2)}
.gallery-card .gc-img-placeholder{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-family:var(--font-display);font-size:40px;color:var(--gold-dark)}
.gallery-card .gc-info{padding:12px 14px}
.gallery-card .gc-name{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--gold)}
.gallery-card .gc-country{font-size:10px;color:var(--text3);margin-top:2px}
.gallery-card .gc-specialty{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.gallery-card .gc-era-tag{position:absolute;top:8px;left:8px;font-size:8px;letter-spacing:1px;text-transform:uppercase;background:rgba(10,10,15,.8);color:var(--gold);padding:3px 8px;border-radius:4px}
footer{text-align:center;padding:32px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
footer a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<nav>
  <a href="." class="logo">El Gran Libro <span>· Galería</span></a>
  <a href="magos.html" class="back">← Magos</a>
</nav>

  <div class="stats">

  </div>
</section>
<div id="filters">
  <button class="active" data-filter="all">Todos</button>

  <button data-filter="ilusionismo">🎩 Ilusionismo</button>
  <button data-filter="mentalismo">🧠 Mentalismo</button>
</div>
<div class="grid" id="grid"></div>
<footer>© 2026 <a href=".">El Gran Libro de la Magia</a></footer>

let currentFilter = 'all';
function renderGrid() {
  const grid = document.getElementById('grid');
  const items = currentFilter === 'all' ? GALLERY : GALLERY.filter(m => m.filter.includes(currentFilter));
  grid.innerHTML = items.map(m => `
    <div class="gallery-card breathing" style="animation-delay:${(Math.random()*2).toFixed(1)}s">
      <img class="gc-img" src="assets/images/${m.img}" alt="${m.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'gc-img-placeholder\\'>${m.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>'">
      <div class="gc-era-tag">${m.era}</div>
      <div class="gc-info">
        <div class="gc-name">${m.name}</div>
        <div class="gc-country">${m.country}</div>
        <div class="gc-specialty">${m.specialty}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('totalCount').textContent = GALLERY.length;
}

document.querySelectorAll('#filters button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#filters button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.filter;
    renderGrid();
  });
});
renderGrid();
