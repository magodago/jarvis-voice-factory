<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandes Magos · El Gran Libro de la Magia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#0f0f1a;--card:#14141f;--gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#8a7030;--text:#f0ece4;--text2:#a09888;--text3:#6b6358;--border:rgba(201,168,76,0.08);--border-gold:rgba(201,168,76,0.2);--font-display:'Cormorant Garamond',serif;--font-body:'Inter',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--gold-dark) var(--bg)}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(10,10,15,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
nav .logo{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:.5px;color:var(--gold);text-decoration:none}
nav .logo span{color:var(--text3)}
nav .back{color:var(--text2);text-decoration:none;font-size:12px;transition:color .3s}

/* Hero */
.hero{position:relative;padding:100px 40px 60px;text-align:center;background:linear-gradient(180deg,var(--bg),var(--bg2))}
.hero h1{font-family:var(--font-display);font-size:clamp(36px,5vw,60px);font-weight:300;letter-spacing:-1px;margin-bottom:12px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{color:var(--text2);font-size:16px;font-weight:300;max-width:600px;margin:0 auto}
.hero .stats{margin-top:24px;display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.hero .stat{text-align:center}
.hero .stat-num{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--gold)}
.hero .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Filters */
#filters{padding:0 40px 20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#filters button{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .3s}
#filters button:hover{border-color:var(--border-gold);color:var(--gold)}
#filters button.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);max-width:1200px;margin:0 auto 60px;border-radius:8px;overflow:hidden;padding:0 20px}
.card{background:var(--card);padding:0;position:relative;cursor:pointer;transition:all .3s;overflow:hidden;aspect-ratio:3/4;min-height:400px}
.card:hover{transform:scale(1.02);z-index:2;box-shadow:0 8px 40px rgba(201,168,76,.15)}
.card .bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.3;transition:opacity .5s}
.card:hover .bg-img{opacity:.5}
.card .overlay{position:absolute;bottom:0;left:0;right:0;padding:24px;background:linear-gradient(0deg,rgba(10,10,15,.95) 0%,transparent 80%)}
.card .era-tag{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:500}
.card .name{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--text);margin-bottom:2px}
.card .real-name{font-size:11px;color:var(--text3);font-weight:400;margin-bottom:6px}
.card .specialty{font-size:11px;color:var(--text2);font-weight:400;display:flex;align-items:center;gap:6px}
.card .specialty .dot{width:4px;height:4px;border-radius:50%;background:var(--gold-dark);display:inline-block}
.card .years{font-size:10px;color:var(--text3);margin-top:4px;font-feature-settings:'tnum'}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border-gold);border-radius:16px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal .close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;transition:color .3s;z-index:2}
.modal .close:hover{color:var(--gold)}
.modal .m-era-tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:4px}
.modal .m-name{font-family:var(--font-display);font-size:32px;font-weight:600;margin-bottom:2px}
.modal .m-real{font-size:12px;color:var(--text3);margin-bottom:16px}
.modal .m-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.modal .m-info div{background:var(--card);padding:10px 14px;border-radius:6px;border:1px solid var(--border)}
.modal .m-info .label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px}
.modal .m-info .value{font-size:13px;color:var(--text)}
.modal .m-bio{font-size:14px;color:var(--text2);line-height:1.7;font-weight:300;margin-bottom:16px}
.modal .m-effects h3{font-family:var(--font-display);font-size:18px;color:var(--gold);margin-bottom:10px}
.modal .m-effects li{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:6px;padding-left:16px;list-style:none;position:relative}
.modal .m-effects li::before{content:'✦';position:absolute;left:0;color:var(--gold-dark);font-size:9px}
.modal .m-curiosities h3{font-family:var(--font-display);font-size:18px;color:var(--gold);margin:16px 0 8px}
.modal .m-curiosities p{font-size:12px;color:var(--text2);line-height:1.6;font-weight:300;background:var(--card);padding:12px 16px;border-radius:6px;border:1px solid var(--border)}
.modal .read-more{display:inline-block;margin-top:16px;padding:10px 24px;background:var(--gold);color:var(--bg);text-decoration:none;border-radius:4px;font-size:12px;font-weight:600;letter-spacing:.5px;transition:all .3s}
.modal .read-more:hover{background:var(--gold-light)}
</style>
</head>
<body>

<nav>
  <a href="." class="logo">El Gran Libro <span>· Magos</span></a>
  <a href="historia.html" class="back">← Historia</a>
</nav>

<section class="hero">
  <h1>Los grandes <em>magos</em></h1>
  <p>Biografías extensas de los ilusionistas más influyentes de la historia. Cada ficha contiene su vida, efectos, logros y legado.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Magos</div></div>

    <div class="stat"><div class="stat-num" style="color:var(--text3)">12</div><div class="stat-label">Países</div></div>
  </div>
</section>

<div id="filters">
  <button class="active" data-filter="all">Todos</button>
  <button data-filter="cartomagia">🃏 Cartomagia</button>
  <button data-filter="escapismo">⛓️ Escapismo</button>
  <button data-filter="ilusionismo">🎩 Ilusionismo</button>
  <button data-filter="mentalismo">🧠 Mentalismo</button>

</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

  {id:"robert-houdin",name:"Jean-Eugène Robert-Houdin",real:"Jean-Eugène Robert-Houdin",born:1805,died:1871,country:"Francia",specialty:"Ilusionismo",era:"Clásico",eraTag:"Ilusionismo Clásico · 1780-1900",filter:["ilusionismo","clasico"],image:"assets/images/mago-portrait.jpg",

  {id:"houdini",name:"Harry Houdini",real:"Erik Weisz",born:1874,died:1926,country:"Hungría/EE.UU.",specialty:"Escapismo",era:"Houdini",eraTag:"Era Houdini · 1900-1930",filter:["escapismo","clasico"],image:"assets/images/hero-bg.jpg",

  {id:"dai-vernon",name:"Dai Vernon",real:"David Frederick Wingfield Verner",born:1894,died:1992,country:"Canadá",specialty:"Cartomagia",era:"Edad de Oro",eraTag:"Edad de Oro · 1930-1970",filter:["cartomagia","close-up"],image:"assets/images/timeline-deco.jpg",

  {id:"tamariz",name:"Juan Tamariz",real:"Juan Tamariz Martel",born:1942,died:null,country:"España",specialty:"Cartomagia",era:"Contemporánea",eraTag:"Magia Televisiva · 1970-2000",filter:["cartomagia","moderna"],image:"assets/images/mago-portrait.jpg",
   bio:"El mago español más influyente de todos los tiempos. Ganador del Premio Mundial FISM en 1973. Su libro 'La Vía Mágica' es considerado la biblia de la cartomagia. Su sistema Mnemonica revolucionó la memorización de barajas.",

  {id:"penn-teller",name:"Penn & Teller",real:"Penn Jillette & Teller",born:1955,died:null,country:"EE.UU.",specialty:"Magia Cómica",era:"Contemporánea",eraTag:"Magia Televisiva · 1970-2000",filter:["ilusionismo","moderna"],image:"assets/images/hero-bg.jpg",

  {id:"blaine",name:"David Blaine",real:"David Blaine White",born:1973,died:null,country:"EE.UU.",specialty:"Magia de Calle",era:"Digital",eraTag:"Era Digital · 2000-Actualidad",filter:["moderna"],image:"assets/images/hero-bg.jpg",

  {id:"derren-brown",name:"Derren Brown",real:"Derren Brown",born:1971,died:null,country:"Reino Unido",specialty:"Mentalismo",era:"Digital",eraTag:"Era Digital · 2000-Actualidad",filter:["mentalismo","moderna"],image:"assets/images/hero-bg.jpg",

   effects:["Russian Roulette — Ruleta rusa en televisión en directo (2003)","The Heist — Convirtió a un ciudadano normal en ladrón de banco","The Push — Demostró que se puede empujar a alguien a matar en 72 minutos"],

  {id:"criss-angel",name:"Criss Angel",real:"Christopher Sarantakos",born:1967,died:null,country:"EE.UU.",specialty:"Ilusionismo Extremo",era:"Digital",eraTag:"Era Digital · 2000-Actualidad",filter:["moderna","ilusionismo"],image:"assets/images/hero-bg.jpg",

   effects:["Levitación sobre el Luxor — Levitó sobre la pirámide del hotel Luxor en Las Vegas","Caminar sobre Agua — Caminó sobre la superficie del lago del Mirage"],

  {id:"dynamo",name:"Dynamo",real:"Steven Frayne",born:1982,died:null,country:"Reino Unido",specialty:"Magia Urbana",era:"Digital",eraTag:"Era Digital · 2000-Actualidad",filter:["moderna","ilusionismo"],image:"assets/images/hero-bg.jpg",

  {id:"ascanio",name:"Arturo de Ascanio",real:"Arturo de Ascanio y Navaz",born:1929,died:1997,country:"España",specialty:"Cartomagia",era:"Edad de Oro",eraTag:"Edad de Oro · 1930-1970",filter:["cartomagia","close-up","clasico"],image:"assets/images/mago-portrait.jpg",

   curiosity:"Era abogado de día y mago de noche. Su despacho profesional en Barcelona ocultaba su otra vida. Solo tras su jubilación se dedicó plenamente a la magia."},
  {id:"rene-lavand",name:"René Lavand",real:"José René Lavandera",born:1928,died:2015,country:"Argentina",specialty:"Cartomagia",era:"Contemporánea",eraTag:"Magia Televisiva · 1970-2000",filter:["cartomagia","close-up","clasico"],image:"assets/images/mago-portrait.jpg",

  {id:"chung-ling-soo",name:"Chung Ling Soo",real:"William Ellsworth Robinson",born:1861,died:1918,country:"EE.UU.",specialty:"Magia Oriental",era:"Clásico",eraTag:"Era Houdini · 1900-1930",filter:["ilusionismo","clasico"],image:"assets/images/poster-vintage.jpg",

  {id:"thurston",name:"Howard Thurston",real:"Howard Thurston",born:1869,died:1936,country:"EE.UU.",specialty:"Ilusionismo",era:"Clásico",eraTag:"Era Houdini · 1900-1930",filter:["ilusionismo","clasico"],image:"assets/images/hero-bg.jpg",

  {id:"richiardi",name:"Richiardi Jr.",real:"Aldo Izquierdo Colosi",born:1923,died:1985,country:"Perú",specialty:"Grandes Ilusiones",era:"Edad de Oro",eraTag:"Edad de Oro · 1930-1970",filter:["ilusionismo"],image:"assets/images/hero-bg.jpg",

   bio:'El verdadero padre de la cartomagia moderna. Creó efectos de cartas y monedas en el Viena del siglo XIX mucho antes que Robert-Houdin. Su salón privado era el centro de la magia vienesa.',
   effects:["El Sobre Imposible — Carta firmada que aparecía dentro de un sobre lacrado","Pase Hofzinser — Pase de cartas fundamental, erróneamente llamado Herrmann Pass"],

let currentFilter = 'all';

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter === 'all' ? MAGICIANS : MAGICIANS.filter(m => m.filter.includes(currentFilter));
  grid.innerHTML = filtered.map(m => `
    <div class="card" onclick="openModal('${m.id}')">
      <img class="bg-img" src="${m.image}" alt="${m.name}" loading="lazy">
      <div class="overlay">
        <div class="era-tag">${m.eraTag || ''}</div>
        <div class="name">${m.name}</div>
        <div class="real-name">${m.real}</div>
        <div class="specialty"><span class="dot"></span>${m.specialty}</div>
        <div class="years">${m.born}${m.died ? ' — '+m.died : ' — Actualidad'}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('totalCount').textContent = MAGICIANS.length;
}

function openModal(id) {
  const m = MAGICIANS.find(x => x.id === id);
  if (!m) return;
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="m-era-tag">${m.eraTag || ''}</div>
    <div class="m-name">${m.name}</div>
    <div class="m-real">${m.real} · ${m.country}</div>
    <div class="m-info">
      <div><div class="label">Nacimiento</div><div class="value">${m.born}</div></div>
      <div><div class="label">Fallecimiento</div><div class="value">${m.died || '—'}</div></div>
      <div><div class="label">Especialidad</div><div class="value">${m.specialty}</div></div>
      <div><div class="label">País</div><div class="value">${m.country}</div></div>
    </div>
    <div class="m-bio">${m.bio}</div>
    ${m.effects ? `<div class="m-effects"><h3>✨ Efectos y logros</h3><ul>${m.effects.map(e => '<li>'+e+'</li>').join('')}</ul></div>` : ''}
    ${m.curiosity ? `<div class="m-curiosities"><h3>🔮 Dato curioso</h3><p>${m.curiosity}</p></div>` : ''}
    <a href="data/bio-${m.id}.md" class="read-more" target="_blank">📖 Leer biografía completa →</a>
  `;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Filters
document.querySelectorAll('#filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

renderGrid();
</script>
</body>
</html>
