<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Mundial · El Gran Libro de la Magia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#0a0a0f;--bg2:#0f0f1a;--card:#14141f;--gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#8a7030;--text:#f0ece4;--text2:#a09888;--text3:#6b6358;--border:rgba(201,168,76,0.08);--font-display:'Cormorant Garamond',serif;--font-body:'Inter',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
nav .logo{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--gold);text-decoration:none}
nav .logo span{color:var(--text3)}
nav .back{color:var(--text2);text-decoration:none;font-size:11px;transition:color .3s}
#stats-bar{position:fixed;top:56px;left:0;right:0;z-index:999;display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;font-size:11px;align-items:center;justify-content:space-between;overflow-x:auto}
#stats-bar .s{display:flex;gap:16px}
#stats-bar .s span{color:var(--text3)}
#stats-bar .s strong{color:var(--gold);font-weight:600}
#stats-bar .filter-group{display:flex;gap:4px}
#stats-bar .filter-group button{padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
#stats-bar .filter-group button.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
#map{flex:1;margin-top:96px;z-index:1;background:#0a0a0f}
.leaflet-container{background:#0f1420!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text2)!important;border-color:var(--border)!important}
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--text)!important;border:1px solid var(--border-gold)!important;border-radius:8px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:var(--card)!important;border:1px solid var(--border-gold)!important}
.leaflet-popup-content{margin:12px 16px!important;font-size:13px!important;font-family:var(--font-body)!important;line-height:1.5!important}
.popup-name{font-family:var(--font-display);font-size:18px;color:var(--gold);font-weight:600}
.popup-real{font-size:11px;color:var(--text3);margin-bottom:4px}
.popup-info{font-size:11px;color:var(--text2);margin:2px 0}
.popup-specialty{display:inline-block;padding:1px 8px;border-radius:10px;font-size:9px;background:var(--gold-dark);color:var(--text);margin-top:4px}
.custom-marker{background:var(--gold);border:2px solid var(--gold-light);border-radius:50%;width:12px!important;height:12px!important;opacity:.8;box-shadow:0 0 12px rgba(201,168,76,.3)}
.custom-marker.historic{background:#8b5e3c;border-color:#c9a84c}
.custom-marker.historic{background:#8b5e3c;border-color:#a08030}
.custom-marker.mentalism{background:#7b2ff7;border-color:#b088ff}
.custom-marker.escapism{background:#c93400;border-color:#ff6b35}
.custom-marker.closeup{background:#007aff;border-color:#66b0ff}
#sidebar{position:fixed;right:16px;top:104px;z-index:998;width:280px;max-height:calc(100vh - 120px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;overflow-y:auto;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#sidebar.open{display:block;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
#sidebar .close{float:right;background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer}
#sidebar .sb-title{font-family:var(--font-display);font-size:20px;color:var(--gold);margin-bottom:4px}
#sidebar .sb-sub{font-size:11px;color:var(--text3);margin-bottom:12px}
#sidebar .sb-magos{display:flex;flex-direction:column;gap:6px}
#sidebar .sb-mago{padding:8px;background:var(--bg);border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
#sidebar .sb-mago:hover{border-color:var(--border-gold)}
#sidebar .sb-mago .sbm-name{font-size:13px;font-weight:600;color:var(--text)}
#sidebar .sb-mago .sbm-info{font-size:10px;color:var(--text3)}
#sidebar .sb-add{display:block;margin-top:12px;padding:8px;text-align:center;border:1px dashed var(--border-gold);border-radius:6px;color:var(--gold);font-size:11px;cursor:pointer;text-decoration:none;transition:all .3s}
#sidebar .sb-add:hover{background:rgba(201,168,76,.05)}
#legend{position:fixed;left:16px;bottom:24px;z-index:998;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:10px}
#legend .l-item{display:flex;align-items:center;gap:6px;margin:2px 0;color:var(--text2)}
#legend .l-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@media(max-width:768px){
  #sidebar{right:8px;left:8px;width:auto}
  #stats-bar{flex-wrap:wrap;gap:4px}
  #stats-bar .filter-group{flex-wrap:wrap}
  #legend{display:none}
}
</style>
</head>
<body>
<nav>
  <a href="." class="logo">El Gran Libro <span>· Mapa</span></a>
  <a href="magos.html" class="back">← Magos</a>
</nav>
<div id="stats-bar">
  <div class="s" id="statsDisplay"></div>
  <div class="filter-group" id="filters">
    <button class="active" data-f="all">Todos</button>
    <button data-f="historic">🏛️ Clásicos</button>
    <button data-f="modern">📺 Modernos</button>
    <button data-f="mentalism">🧠 Mentalismo</button>
    <button data-f="escapism">⛓️ Escapismo</button>
    <button data-f="closeup">🤏 Close-up</button>
    <button data-f="spain">🇪🇸 España</button>
  </div>
</div>
<div id="map"></div>
<div id="sidebar"></div>
<div id="legend">
  <div class="l-item"><div class="l-dot" style="background:var(--gold)"></div>Ilusionismo general</div>
  <div class="l-item"><div class="l-dot" style="background:#8b5e3c"></div>Clásico / Histórico</div>
  <div class="l-item"><div class="l-dot" style="background:#7b2ff7"></div>Mentalismo</div>
  <div class="l-item"><div class="l-dot" style="background:#c93400"></div>Escapismo</div>
  <div class="l-item"><div class="l-dot" style="background:#007aff"></div>Close-up / Cartomagia</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const MAGICIANS = [
  {name:"Jean-Eugène Robert-Houdin",real:"Robert-Houdin",born:1805,died:1871,lat:48.8566,lng:2.3522,country:"Francia",specialty:"Ilusionismo",type:"historic",era:"Clásico"},
  {name:"Harry Houdini",real:"Erik Weisz",born:1874,died:1926,lat:40.7128,lng:-74.006,country:"EE.UU.",specialty:"Escapismo",type:"escapism",era:"Houdini"},
  {name:"Dai Vernon",real:"David F.W. Verner",born:1894,died:1992,lat:45.4215,lng:-75.6972,country:"Canadá",specialty:"Cartomagia",type:"closeup",era:"Edad de Oro"},
  {name:"Juan Tamariz",real:"Juan Tamariz Martel",born:1942,lat:40.4168,lng:-3.7038,country:"España",specialty:"Cartomagia",type:"closeup",era:"Contemporánea"},
  {name:"David Copperfield",real:"David Seth Kotkin",born:1956,lat:36.1146,lng:-115.1728,country:"EE.UU.",specialty:"Grandes Ilusiones",type:"historic",era:"TV"},
  {name:"Penn & Teller",real:"Penn Jillette & Teller",born:1955,lat:36.1146,lng:-115.1728,country:"EE.UU.",specialty:"Magia Cómica",type:"modern",era:"TV"},
  {name:"David Blaine",real:"David Blaine White",born:1973,lat:40.7128,lng:-74.006,country:"EE.UU.",specialty:"Magia Callejera",type:"modern",era:"Digital"},
  {name:"Derren Brown",real:"Derren Brown",born:1971,lat:51.5074,lng:-0.1278,country:"Reino Unido",specialty:"Mentalismo",type:"mentalism",era:"Digital"},
  {name:"Criss Angel",real:"Christopher Sarantakos",born:1967,lat:40.7128,lng:-73.5,country:"EE.UU.",specialty:"Ilusionismo Extremo",type:"modern",era:"Digital"},
  {name:"Dynamo",real:"Steven Frayne",born:1982,lat:53.7959,lng:-1.7594,country:"Reino Unido",specialty:"Magia Urbana",type:"modern",era:"Digital"},
  {name:"Arturo de Ascanio",real:"Arturo de Ascanio",born:1929,died:1997,lat:41.3874,lng:2.1686,country:"España",specialty:"Cartomagia",type:"closeup",era:"Edad de Oro"},
  {name:"René Lavand",real:"José René Lavandera",born:1928,died:2015,lat:-34.6037,lng:-58.3816,country:"Argentina",specialty:"Cartomagia",type:"closeup",era:"Contemporánea"},
  {name:"Slydini",real:"Quintino Marucci",born:1900,died:1991,lat:40.7282,lng:-73.7949,country:"Italia",specialty:"Close-up",type:"closeup",era:"Edad de Oro"},
  {name:"Maskelyne",real:"John Nevil Maskelyne",born:1839,died:1917,lat:51.5074,lng:-0.1278,country:"Reino Unido",specialty:"Ilusionismo",type:"historic",era:"Clásico"},
  {name:"Chung Ling Soo",real:"William E. Robinson",born:1861,died:1918,lat:51.5562,lng:-0.1071,country:"EE.UU.",specialty:"Magia Oriental",type:"historic",era:"Houdini"},
  {name:"Howard Thurston",real:"Howard Thurston",born:1869,died:1936,lat:39.9612,lng:-82.9988,country:"EE.UU.",specialty:"Ilusionismo",type:"historic",era:"Houdini"},
  {name:"Richiardi Jr.",real:"Aldo Izquierdo Colosi",born:1923,died:1985,lat:-12.0464,lng:-77.0428,country:"Perú",specialty:"Grandes Ilusiones",type:"historic",era:"Edad de Oro"},
  {name:"Hofzinser",real:"Johann N. Hofzinser",born:1806,died:1875,lat:48.2082,lng:16.3738,country:"Austria",specialty:"Cartomagia",type:"closeup",era:"Clásico"},
  {name:"Tommy Wonder",real:"Jacobus M. Bemelman",born:1953,died:2006,lat:52.1326,lng:5.2913,country:"Países Bajos",specialty:"Close-up",type:"closeup",era:"Contemporánea"},
  // Additional from firmas
  {name:"El Misterioso",real:"Carlos Martínez",born:"?",lat:40.4168,lng:-3.7038,country:"España",specialty:"Cartomagia",type:"closeup",era:"Contemporánea",isUser:true},
  {name:"Dani Mental",real:"Daniel Pérez",born:"?",lat:-34.6037,lng:-58.3816,country:"Argentina",specialty:"Mentalismo",type:"mentalism",era:"Digital",isUser:true},
  {name:"Mago Rafa",real:"Rafael Gómez",born:"?",lat:19.4326,lng:-99.1332,country:"México",specialty:"Close-up",type:"closeup",era:"Contemporánea",isUser:true}
];

// Color mapping
const colorMap = {
  historic: '#8b5e3c', modern: '#c9a84c',
  mentalism: '#7b2ff7', escapism: '#c93400',
  closeup: '#007aff'
};

const map = L.map('map', {
  center: [20, 0],
  zoom: 2,
  minZoom: 2,
  maxZoom: 6,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

let markers = [];
let currentFilter = 'all';

function createIcon(type) {
  return L.divIcon({
    className: 'custom-marker ' + (colorMap[type] ? type : ''),
    iconSize: [12, 12],
    iconAnchor: [6, 6],
    popupAnchor: [0, -8]
  });
}

function renderMarkers(filter) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  currentFilter = filter;

  MAGICIANS.forEach(m => {
    if (filter !== 'all') {
      if (filter === 'spain' && m.country !== 'España') return;
      if (filter !== 'spain' && m.type !== filter) return;
    }
    const icon = createIcon(m.type);
    const marker = L.marker([m.lat, m.lng], { icon }).addTo(map);
    const era = m.died ? `${m.born}–${m.died}` : `${m.born}–presente`;
    marker.bindPopup(`
      <div class="popup-name">${m.name}</div>
      <div class="popup-real">${m.real} · ${m.country}</div>
      <div class="popup-info">${m.specialty} · ${era}</div>
      <div><span class="popup-specialty">${m.type === 'closeup' ? '🤏 Close-up' : m.type === 'mentalism' ? '🧠 Mentalismo' : m.type === 'escapism' ? '⛓️ Escapismo' : m.type === 'historic' ? '🏛️ Clásico' : '📺 Moderno'}</span></div>
    `);
    marker.on('click', () => showSidebar(m));
    markers.push(marker);
  });

  updateStats();
}

function updateStats() {
  const total = MAGICIANS.length;
  const countries = new Set(MAGICIANS.map(m => m.country));
  const visible = currentFilter === 'all' ? total : markers.length;
  document.getElementById('statsDisplay').innerHTML =
    `<span>🗺️ <strong>${visible}</strong> magos · <strong>${countries.size}</strong> países</span>`;
}

function showSidebar(m) {
  const sb = document.getElementById('sidebar');
  const era = m.died ? `${m.born}–${m.died}` : `${m.born}–presente`;
  sb.innerHTML = `
    <button class="close" onclick="document.getElementById('sidebar').classList.remove('open')">✕</button>
    <div class="sb-title">${m.name}</div>
    <div class="sb-sub">${m.real} · ${m.country} · ${era}</div>
    <div class="sb-magos">
      <div class="sb-mago" style="cursor:default">
        <div class="sbm-name">✨ ${m.specialty}</div>
        <div class="sbm-info">${m.type === 'closeup' ? '🤏 Close-up / Cartomagia' : m.type === 'mentalism' ? '🧠 Mentalismo' : m.type === 'escapism' ? '⛓️ Escapismo' : m.type === 'historic' ? '🏛️ Ilusionismo Clásico' : '📺 Magia Moderna'}</div>
      </div>
    </div>
    <a href="magos.html" class="sb-add">📖 Ver biografía completa →</a>
  `;
  sb.classList.add('open');
}
document.getElementById('sidebar').addEventListener('click', e => {
  if (e.target.classList.contains('close')) return;
});

// Filters
document.querySelectorAll('.filter-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-group button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMarkers(btn.dataset.f);
  });
});

// Close sidebar on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('sidebar').classList.remove('open');
});

renderMarkers('all');

// Close sidebar when clicking map
map.on('click', () => document.getElementById('sidebar').classList.remove('open'));
</script>
</body>
</html>
