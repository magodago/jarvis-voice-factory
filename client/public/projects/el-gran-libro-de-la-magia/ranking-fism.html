<style>
:root{--bg:#0a0a0f;--bg2:#0f0f1a;--card:#14141f;--gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#8a7030;--text:#f0ece4;--text2:#a09888;--text3:#6b6358;--border:rgba(201,168,76,0.08);--border-gold:rgba(201,168,76,0.2);--font-display:'Cormorant Garamond',serif;--font-body:'Inter',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--gold-dark) var(--bg)}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(10,10,15,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
nav .logo{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--gold);text-decoration:none}
nav .logo span{color:var(--text3)}
nav .back{color:var(--text2);text-decoration:none;font-size:12px;transition:color .3s}
.hero{position:relative;padding:100px 40px 40px;text-align:center;background:linear-gradient(180deg,var(--bg),var(--bg2))}
.hero h1{font-family:var(--font-display);font-size:clamp(36px,5vw,56px);font-weight:300;margin-bottom:8px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{color:var(--text2);font-size:15px;max-width:600px;margin:0 auto;font-weight:300}
.hero .stats{margin-top:16px;display:flex;gap:24px;justify-content:center}
.hero .stat-num{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--gold)}
.hero .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
#filters{padding:0 40px 16px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
#filters button{padding:5px 14px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .3s;white-space:nowrap}
#filters button:hover{border-color:var(--border-gold);color:var(--gold)}
#filters button.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}
.content{max-width:960px;margin:0 auto;padding:20px 20px 80px}

.year-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .3s}
.year-section:hover{border-color:var(--border-gold)}
.year-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.year-header:hover{background:rgba(201,168,76,.03)}
.year-header .yh-year{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--gold);min-width:60px}
.year-header .yh-info{flex:1;margin-left:16px}
.year-header .yh-edition{font-size:11px;color:var(--text3)}
.year-header .yh-place{font-size:12px;color:var(--text2)}
.year-header .yh-toggle{font-size:18px;color:var(--text3);transition:transform .3s}
.year-header .yh-toggle.open{transform:rotate(180deg)}

.year-body{max-height:0;overflow:hidden;transition:max-height .5s ease}
.year-body.open{max-height:5000px}

.gp-row{padding:12px 20px;background:rgba(201,168,76,.04);border-bottom:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap}
.gp-item{font-size:12px}
.gp-item .gp-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.gp-item .gp-name{color:var(--gold);font-weight:600}

.cats-table{padding:8px 20px 16px}
.cat-row{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid rgba(201,168,76,.03);font-size:12px;align-items:baseline}
.cat-row:last-child{border:none}
.cat-row .cat-name{min-width:160px;font-weight:500;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.cat-row .cat-winner{color:var(--text);font-weight:400}
.cat-row .cat-country{color:var(--text3);font-size:10px;margin-left:auto}

.flag{font-size:14px;margin-right:4px}
footer{text-align:center;padding:32px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
footer a{color:var(--gold);text-decoration:none}
</style>
</head>

function getFlag(country) {
  const flags = {
    "Spain": "🇪🇸", "France": "🇫🇷", "USA": "🇺🇸", "Japan": "🇯🇵", "Italy": "🇮🇹",
    "Germany": "🇩🇪", "United Kingdom": "🇬🇧", "Denmark": "🇩🇰", "Belgium": "🇧🇪",
    "Netherlands": "🇳🇱", "Austria": "🇦🇹", "China": "🇨🇳", "Taiwan": "🇹🇼",
    "South Korea": "🇰🇷", "Russia": "🇷🇺", "Canada": "🇨🇦", "Sweden": "🇸🇪",
    "Switzerland": "🇨🇭", "Portugal": "🇵🇹", "Argentina": "🇦🇷", "Peru": "🇵🇪",
    "Hungary": "🇭🇺", "Poland": "🇵🇱", "Australia": "🇦🇺", "Finland": "🇫🇮",
    "Norway": "🇳🇴", "Czech Republic": "🇨🇿", "Slovakia": "🇸🇰"
  };
  return flags[country] || '';
}

let currentFilter = 'all';

function getDecade(year) {
  if (year >= 2020) return '2020';
  if (year >= 2010) return '2010';
  if (year >= 2000) return '2000';
  if (year >= 1990) return '1990';
  if (year >= 1980) return '1980';
  return '1950';
}

function render() {
  const container = document.getElementById('content');
  let filtered = currentFilter === 'all' ? CHAMPS : CHAMPS.filter(c => {
    if (currentFilter === 'gp') return c.gs || c.gc;
    if (currentFilter === 'micro') return c.ct.some(x => x.c.toLowerCase().includes('micro') || x.c.toLowerCase().includes('card'));
    if (currentFilter === 'mental') return c.ct.some(x => x.c.toLowerCase().includes('mental'));
    if (currentFilter === 'stage') return c.ct.some(x => x.c.toLowerCase().includes('stage') || x.c.toLowerCase().includes('illusion') || x.c.toLowerCase().includes('manipulation') || x.c.toLowerCase().includes('general'));
    return getDecade(c.y) === currentFilter;
  });

  let totalWinners = 0;
  container.innerHTML = filtered.map(c => {
    totalWinners += c.ct.length + (c.gs ? 1 : 0) + (c.gc ? 1 : 0);
    return `
    <div class="year-section">
      <div class="year-header" onclick="toggleYear(this)">
        <div class="yh-year">${c.y}</div>
        <div class="yh-info">
          <div class="yh-edition">${c.e}</div>
          <div class="yh-place">${c.h}</div>
        </div>
        <div class="yh-toggle">▼</div>
      </div>
      <div class="year-body">
        ${(c.gs || c.gc) ? `
        <div class="gp-row">
          ${c.gs ? `<div class="gp-item"><div class="gp-label">🏆 Grand Prix Escena</div><div class="gp-name">${c.gs}</div></div>` : ''}
          ${c.gc ? `<div class="gp-item"><div class="gp-label">🏆 Grand Prix Close-up</div><div class="gp-name">${c.gc}</div></div>` : ''}
        </div>` : ''}
        <div class="cats-table">
          ${c.ct.map(x => `
          <div class="cat-row">
            <div class="cat-name">${x.c}</div>
            <div class="cat-winner">${x.w}</div>
            <div class="cat-country">${getFlag(x.n)} ${x.n}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;}).join('');

  document.getElementById('totalWinners').textContent = totalWinners;
}

function toggleYear(el) {
  const body = el.nextElementSibling;
  const toggle = el.querySelector('.yh-toggle');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

document.querySelectorAll('#filters button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#filters button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.f;
    render();
  });
});

render();
</script>
