<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GeoMarket · Señorío Plaza</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GeoMarket">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e8edf5;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:#00d4ff33;color:#fff}

/* Status bar */
#status-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:6px;padding:6px 12px;padding-top:calc(6px + env(safe-area-inset-top,0px));background:linear-gradient(180deg,#0a0e17 60%,transparent);font-size:10px;color:#6b7a99;pointer-events:none}
#status-bar .dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
#status-bar .badge{background:#1a2a4a;padding:2px 6px;border-radius:4px;color:#00d4ff;font-weight:600;font-size:9px;border:1px solid #00d4ff22}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#app{display:flex;flex-direction:column;height:100%;padding-top:32px}
#map-wrap{flex:1;position:relative;overflow:hidden;margin:0 8px;border-radius:14px;border:1px solid #1a2a4a;background:#0f1420}
#map-canvas{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at 50% 60%,#0f1f35 0%,#080c15 100%)}
#map-canvas svg{width:100%;height:100%}

/* Zones */
.zone{fill-opacity:.12;stroke-width:1.5;transition:all .3s ease;cursor:pointer}
.zone.active{fill-opacity:.3;stroke-width:2.5}
.zone.tiendas{fill:#00d4ff;stroke:#00d4ff}
.zone.restauracion{fill:#f97316;stroke:#f97316}
.zone.ocio{fill:#a855f7;stroke:#a855f7}
.zone.alimentacion{fill:#22c55e;stroke:#22c55e}
.zone.servicios{fill:#eab308;stroke:#eab308}
.zone-label{font-size:9px;font-weight:700;fill:#b0c4de;text-anchor:middle;pointer-events:none;opacity:.6}
.zone-label.active{fill:#fff;opacity:1}

/* Toasts */
#toasts{position:fixed;top:calc(40px + env(safe-area-inset-top,0px));right:8px;z-index:200;display:flex;flex-direction:column;gap:6px;width:260px;pointer-events:none}
.toast{background:linear-gradient(135deg,#0f1f35 0%,#1a2a4a 100%);border:1px solid;border-radius:10px;padding:10px 12px;animation:slideIn .35s ease-out;box-shadow:0 4px 24px rgba(0,0,0,.5);pointer-events:auto;cursor:pointer}
.toast.flash{border-color:#ff6b35}
.toast.permanente{border-color:#00d4ff44}
.toast .toast-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.toast .toast-tag{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.5px}
.toast.flash .toast-tag{background:#ff6b3522;color:#ff6b35;border:1px solid #ff6b3533}
.toast.permanente .toast-tag{background:#00d4ff22;color:#00d4ff;border:1px solid #00d4ff33}
.toast .toast-timer{font-size:10px;font-family:monospace;color:#ff6b35;font-weight:700}
.toast .toast-body{font-size:12px;line-height:1.3;color:#e8edf5}
.toast .toast-store{font-size:9px;color:#6b7a99;margin-top:3px}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Bottom panel */
#bottom-panel{background:#0f1420;border-top:1px solid #1a2a4a;padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));max-height:42vh;display:flex;flex-direction:column}
#panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0}
#panel-header h2{font-size:13px;font-weight:700}
#panel-header .tab{display:flex;gap:4px}
#panel-header .tab button{font-size:9px;padding:3px 10px;border-radius:12px;border:1px solid #1a2a4a;background:transparent;color:#6b7a99;cursor:pointer}
#panel-header .tab button.active{background:#00d4ff11;border-color:#00d4ff33;color:#00d4ff}
#panel-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#1a2a4a transparent}
#panel-scroll::-webkit-scrollbar{width:3px}
#panel-scroll::-webkit-scrollbar-thumb{background:#1a2a4a;border-radius:2px}

/* Flash banner */
#flash-banner{display:none;background:linear-gradient(135deg,#ff6b3511,#ff6b3522);border:1px solid #ff6b3533;border-radius:8px;padding:8px 10px;margin-bottom:6px;flex-shrink:0}
#flash-banner.show{display:block}
#flash-banner .fb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#flash-banner .fb-head span{font-size:10px;font-weight:700;color:#ff6b35}
#flash-banner .fb-timer{font-size:14px;font-family:monospace;color:#ff6b35;font-weight:700}
#flash-banner .fb-item{font-size:11px;color:#e8edf5;padding:3px 0}
#flash-banner .fb-store{font-size:9px;color:#6b7a99}

/* Store cards */
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.store-card{background:#131a28;border:1px solid #1a2a4a;border-radius:8px;padding:8px;cursor:pointer;transition:all .2s}
.store-card:active{transform:scale(.97);border-color:#00d4ff44}
.store-card .s-name{font-size:11px;font-weight:700;color:#e8edf5}
.store-card .s-cat{font-size:8px;color:#6b7a99;text-transform:uppercase;letter-spacing:.3px}
.store-card .s-reg-offer{font-size:10px;color:#22c55e;margin-top:3px;line-height:1.2}
.store-card .s-flash{font-size:9px;color:#ff6b35;margin-top:2px;font-weight:600}
.store-card .s-local{font-size:8px;color:#4a5a7a;margin-top:2px;font-family:monospace}

/* Controls */
#controls{display:flex;gap:4px;padding:6px 12px 0;flex-shrink:0;flex-wrap:wrap}
#controls button{flex:1;padding:6px 8px;border:1px solid #1a2a4a;border-radius:6px;background:#0f1420;color:#b0c4de;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;min-width:0}
#controls button:active{transform:scale(.96)}
#controls button.active{border-color:#00d4ff;color:#00d4ff;background:#00d4ff11}
#controls button.sim-btn{background:#1a2a4a;color:#ff6b35;border-color:#ff6b3533}
#controls button.sim-btn.active{background:#ff6b3522;color:#ff6b35}

/* Zone detail modal */
#zone-detail{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#0f1420;border-radius:16px 16px 0 0;border-top:1px solid #1a2a4a;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .3s ease;max-height:80vh;overflow-y:auto}
#zone-detail.open{transform:translateY(0)}
#zone-detail .close-btn{float:right;background:none;border:none;color:#6b7a99;font-size:18px;cursor:pointer}
#zone-detail h3{font-size:14px;font-weight:700;margin-bottom:2px}
#zone-detail .zd-desc{font-size:10px;color:#6b7a99;margin-bottom:10px}
#zone-detail .zd-store{background:#131a28;border:1px solid #1a2a4a;border-radius:8px;padding:8px;margin-bottom:6px}
#zone-detail .zd-store h4{font-size:11px;font-weight:700;color:#e8edf5}
#zone-detail .zd-store .zd-offer{font-size:10px;color:#22c55e;margin-top:2px}
#zone-detail .zd-store .zd-flash{font-size:9px;color:#ff6b35;margin-top:2px}

#gps-debug{position:fixed;bottom:0;left:0;right:0;z-index:99;padding:2px 8px;padding-bottom:calc(2px + env(safe-area-inset-bottom,0px));font-size:8px;font-family:monospace;color:#4a5a7a;background:linear-gradient(0deg,#080c15 60%,transparent);pointer-events:none;text-align:center}

@media(max-width:480px){.store-grid{grid-template-columns:1fr 1fr;gap:4px}
.store-card{padding:6px}
#controls{flex-wrap:nowrap;overflow-x:auto}
#controls button{font-size:9px;padding:4px 8px;min-width:50px;flex:none}}
</style>
</head>
<body>

    <div id="flash-banner">

      </div>
      <div id="flash-items"></div>
    </div>
    <div id="panel-scroll"></div>
  </div>
</div>

<div id="zone-detail">
  <button class="close-btn" id="close-detail">✕</button>
  <h3 id="zd-title"></h3>
  <p class="zd-desc" id="zd-desc"></p>
  <div id="zd-stores"></div>
</div>

<div id="toasts"></div>
<div id="gps-debug">C. Juan Carlos Onetti, 1 · Illescas, Toledo · GPS: 40.1323, -3.8477</div>

<script>
// SEÑORÍO PLAZA — Datos reales

        {name:'Fitness Gym', local:'O02', desc:'Gimnasio completo 06:00-01:00.', offer:'💪 Día GRATIS + -50% inscripción', price:'Gratis'},
        {name:'Zona Gaming', local:'O03', desc:'VR y arcade.', offer:'🎮 1h VR 8€ (2 jugadores)', price:'8€'},

      ]
    },
    servicios: { label: '⚙️ Servicios', color: '#eab308', desc: 'Todo lo que necesitas en un solo lugar.',
      flash: [
        { store:'Farmacia', offer:'⏰ 30min -20% en toda la parafarmacia' },
      ],
      stores: [
        {name:'Lavandería', local:'SV01', desc:'Autoservicio 24h.', offer:'🧺 Lava+seca 5€ (nuevos)', price:'5€'},
        {name:'Farmacia', local:'SV02', desc:'Horario ampliado.', offer:'💊 -15% vitaminas', price:'Desde 5€'},
        {name:'Óptica', local:'SV03', desc:'Gafas y revisiones.', offer:'👓 2x1 gafas graduadas + revisión gratis', price:'Desde 49€'},
        {name:'Belleza', local:'SV04', desc:'Peluquería y estética.', offer:'💇 Corte+peinado 15€ (semana)', price:'15€'},
        {name:'Loterías', local:'SV05', desc:'Lotería y apuestas.', offer:'🍀 Lleva 5€, llévate boleto regalo', price:'Desde 2€'},
      ]
    }
  }
};

const ZONE_ORDER = ['tiendas','restauracion','ocio','alimentacion','servicios'];
let currentZone = null, simInterval = null, simZoneIdx = 0, toastCount = 0, visitedZones = new Set();
let flashTotalSeconds = 1800; // 30 min
let flashTimer = null;
let activeFlashes = [];

// DOM
const zoneBadge = document.getElementById('zone-badge');
const panelScroll = document.getElementById('panel-scroll');
const panelTitle = document.getElementById('panel-title');
const flashBanner = document.getElementById('flash-banner');
const flashItems = document.getElementById('flash-items');
const flashTotalTimer = document.getElementById('flash-total-timer');
const tabTiendas = document.getElementById('tab-tiendas');
const tabFlash = document.getElementById('tab-flash');
const toasts = document.getElementById('toasts');
const simWalk = document.getElementById('sim-walk');

// Flash timer
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2,'0');
  const s = (sec % 60).toString().padStart(2,'0');
  return m + ':' + s;
}

function startFlashTimer() {
  if (flashTimer) clearInterval(flashTimer);
  flashTotalSeconds = 1800;
  flashTimer = setInterval(() => {
    flashTotalSeconds--;
    flashTotalTimer.textContent = formatTime(flashTotalSeconds);
    if (flashTotalSeconds <= 0) {
      clearInterval(flashTimer);
      flashTimer = null;
      flashBanner.classList.remove('show');
      activeFlashes = [];
      updatePanel('tiendas');
    }
  }, 1000);
}

// Zone centers for map animation
const zoneCenters = {
  tiendas: {x:115, y:98}, restauracion: {x:290, y:65},
  ocio: {x:290, y:138}, alimentacion: {x:115, y:225}, servicios: {x:290, y:225}
};

function updateMapZone(zoneKey) {
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
  document.querySelectorAll('.zone-label').forEach(z => z.classList.remove('active'));
  if (zoneKey) {
    const el = document.querySelector('.zone.' + zoneKey);
    if (el) el.classList.add('active');
  }
  if (zoneKey && zoneCenters[zoneKey]) {
    const c = zoneCenters[zoneKey];
    document.getElementById('user-dot').setAttribute('cx', c.x);
    document.getElementById('user-dot').setAttribute('cy', c.y);
    document.getElementById('user-glow').setAttribute('cx', c.x);
    document.getElementById('user-glow').setAttribute('cy', c.y);
  }
}

function showToast(zoneKey, store, isFlash) {
  const zone = CC.zones[zoneKey];
  const id = 'toast-' + (toastCount++);
  const div = document.createElement('div');
  div.className = 'toast ' + (isFlash ? 'flash' : 'permanente');
  div.id = id;
  if (isFlash) {
    div.innerHTML = '<div class="toast-head"><span class="toast-tag">⏰ FLASH 30min</span></div><div class="toast-body">' + store.offer + '</div><div class="toast-store">' + store.store + '</div>';
  } else {
    div.innerHTML = '<div class="toast-head"><span class="toast-tag">🏪 OFERTA</span></div><div class="toast-body">' + store.offer + '</div><div class="toast-store">' + store.name + ' · ' + store.price + '</div>';
  }
  div.onclick = () => div.remove();
  toasts.appendChild(div);
  setTimeout(() => { const el = document.getElementById(id); if(el) el.remove(); }, 8000);
}

function enterZone(zoneKey) {
  if (visitedZones.has(zoneKey)) return;
  visitedZones.add(zoneKey);
  currentZone = zoneKey;
  const zone = CC.zones[zoneKey];
  zoneBadge.textContent = '📍 ' + zone.label;
  updateMapZone(zoneKey);
  updatePanel('tiendas');

  // Trigger flash offers for this zone
  if (zone.flash && zone.flash.length > 0) {
    zone.flash.forEach(f => {
      showToast(zoneKey, f, true);
      activeFlashes.push({ zone: zoneKey, store: f.store, offer: f.offer, remaining: 1800 });
    });
    if (!flashTimer) startFlashTimer();
    updateFlashBanner();
    updatePanel('flash');
  }
  // Also show a permanent offer
  if (zone.stores && zone.stores.length > 0) {
    const rand = zone.stores[Math.floor(Math.random() * zone.stores.length)];
    showToast(zoneKey, rand, false);
  }
}

function updateFlashBanner() {
  if (activeFlashes.length > 0) {
    flashBanner.classList.add('show');
    flashItems.innerHTML = activeFlashes.map(f =>
      '<div class="fb-item">' + f.offer + '<div class="fb-store">📍 ' + f.store + '</div></div>'
    ).join('');
  } else {
    flashBanner.classList.remove('show');
  }
}

function updatePanel(mode) {
  if (mode === 'flash') {
    panelTitle.textContent = '⏰ Ofertas Flash Activas';
    if (activeFlashes.length === 0) {
      panelScroll.innerHTML = '<div style="text-align:center;padding:20px;color:#6b7a99;font-size:12px">No hay ofertas flash activas. Explora las zonas del centro.</div>';
    } else {
      let html = '<div class="store-grid">';
      activeFlashes.forEach(f => {
        const zone = CC.zones[f.zone];
        html += '<div class="store-card" style="border-color:#ff6b3533"><div class="s-name">⏰ ' + f.store + '</div><div class="s-cat">' + (zone ? zone.label : '') + '</div><div class="s-reg-offer" style="color:#ff6b35">' + f.offer + '</div></div>';
      });
      html += '</div>';
      panelScroll.innerHTML = html;
    }
    return;
  }

  // Regular store view
  panelTitle.textContent = '🏪 Ofertas de Tienda';
  let html = '<div class="store-grid">';
  let targetZones = currentZone ? [currentZone] : Object.keys(CC.zones);
  targetZones.forEach(key => {
    const zone = CC.zones[key];
    zone.stores.forEach(s => {
      const hasFlash = activeFlashes.some(f => f.store === s.name && f.zone === key);
      html += '<div class="store-card" onclick="openZoneDetail('' + key + '')">';
      html += '<div class="s-name">' + s.name + '</div>';
      html += '<div class="s-cat">' + zone.label + ' · Local ' + (s.local||'—') + '</div>';
      html += '<div class="s-reg-offer">' + s.offer + '</div>';
      html += '<div class="s-local">' + s.price + '</div>';
      if (hasFlash) html += '<div class="s-flash">⏰ Oferta flash activa</div>';
      html += '</div>';
    });
  });
  html += '</div>';
  panelScroll.innerHTML = html;
}

// Zone detail
window.openZoneDetail = function(zoneKey) {
  const zone = CC.zones[zoneKey];
  document.getElementById('zd-title').textContent = zone.label;
  document.getElementById('zd-desc').textContent = zone.desc;
  let html = '';
  zone.stores.forEach(s => {
    const hasFlash = activeFlashes.some(f => f.store === s.name && f.zone === zoneKey);
    html += '<div class="zd-store"><h4>' + s.name + ' <span style="font-size:9px;color:#4a5a7a;font-weight:400;">Local ' + (s.local||'—') + '</span></h4>';
    html += '<div style="font-size:9px;color:#6b7a99;margin-top:2px">' + s.desc + '</div>';
    html += '<div class="zd-offer">🏪 ' + s.offer + '</div>';
    if (hasFlash) html += '<div class="zd-flash">⏰ Oferta flash activa en esta tienda</div>';
    html += '</div>';
  });
  document.getElementById('zd-stores').innerHTML = html;
  document.getElementById('zone-detail').classList.add('open');
};
document.getElementById('close-detail').onclick = () => document.getElementById('zone-detail').classList.remove('open');

// Tabs
tabTiendas.onclick = () => {
  tabTiendas.classList.add('active'); tabFlash.classList.remove('active');
  updatePanel('tiendas');
};
tabFlash.onclick = () => {
  tabFlash.classList.add('active'); tabTiendas.classList.remove('active');
  updatePanel('flash');
};

// Simulation
simWalk.onclick = function() {
  if (simInterval) {
    clearInterval(simInterval); simInterval = null;
    simWalk.textContent = '⏰ Simular'; simWalk.classList.remove('active');
    visitedZones.clear(); updateMapZone(null); currentZone = null;
    zoneBadge.textContent = '📍 CENTRO'; updatePanel('tiendas');
    if (flashTimer) { clearInterval(flashTimer); flashTimer = null; }
    flashBanner.classList.remove('show'); activeFlashes = [];
    toasts.innerHTML = ''; flashTotalSeconds = 1800;
    return;
  }
  simWalk.textContent = '⏹ Parar'; simWalk.classList.add('active');
  simZoneIdx = 0; visitedZones.clear(); toasts.innerHTML = '';
  activeFlashes = []; flashTotalSeconds = 1800;
  enterZone(ZONE_ORDER[0]);
  simInterval = setInterval(() => {
    simZoneIdx++;
    if (simZoneIdx >= ZONE_ORDER.length) {
      clearInterval(simInterval); simInterval = null;
      simWalk.textContent = '⏰ Simular'; simWalk.classList.remove('active');
      return;
    }
    enterZone(ZONE_ORDER[simZoneIdx]);
  }, 3500);
};

// Filter buttons
document.querySelectorAll('#controls button[data-zone]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#controls button[data-zone]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentZone = btn.dataset.zone === 'all' ? null : btn.dataset.zone;
    zoneBadge.textContent = currentZone ? ('📍 ' + CC.zones[currentZone].label) : '📍 CENTRO';
    updateMapZone(currentZone);
    tabTiendas.click();
  });
});

// GPS
if ('geolocation' in navigator) {
  let lastZone = null;
  navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude } = pos.coords;
    const dLat = latitude - CC.lat, dLng = longitude - CC.lng;
    const dist = Math.sqrt(dLat*dLat + dLng*dLng);
    if (dist > CC.radius * 1.5) {
      if (lastZone !== null) { lastZone = null; zoneBadge.textContent = '📍 FUERA DEL CC'; updateMapZone(null); }
      return;
    }
    const relX = (dLng / CC.radius + 1) / 2;
    const relY = (dLat / CC.radius + 1) / 2;
    const zoneMap = {
      '0,0':'tiendas','1,0':'restauracion','1,1':'ocio','0,1':'alimentacion'
    };
    const xi = relX < 0.5 ? 0 : 1;
    const yi = relY < 0.5 ? 0 : 1;
    const key = xi + ',' + yi;
    let zone = null;
    if (xi === 0 && yi === 0) zone = 'tiendas';
    else if (xi === 1 && yi === 0) zone = relY < 0.3 ? 'restauracion' : 'ocio';
    else if (xi === 0 && yi === 1) zone = 'alimentacion';
    else if (xi === 1 && yi === 1) zone = 'servicios';
    if (zone && zone !== lastZone) { enterZone(zone); lastZone = zone; }
  }, () => { if (!simInterval) setTimeout(() => simWalk.click(), 2000); }, { enableHighAccuracy: true, timeout: 10000 });
} else {
  setTimeout(() => { if (!simInterval) simWalk.click(); }, 2000);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { const i = ZONE_ORDER.indexOf(currentZone); enterZone(ZONE_ORDER[(i+1)%ZONE_ORDER.length]); }
  else if (e.key === 'ArrowLeft') { const i = ZONE_ORDER.indexOf(currentZone); enterZone(ZONE_ORDER[(i-1+ZONE_ORDER.length)%ZONE_ORDER.length]); }
  else if (e.key === 'Escape') document.getElementById('zone-detail').classList.remove('open');
});

console.log('🏪 GeoMarket · Señorío Plaza');
console.log('⏰ Ofertas Flash (30min) + 🏪 Ofertas permanentes de tienda');
</script>
