<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Señorío Plaza · Ofertas</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Señorío Plaza">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;color:#1d1d1f;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#status-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;padding-top:calc(10px + env(safe-area-inset-top,0px));background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06)}
#status-bar .left{display:flex;align-items:center;gap:10px}
#status-bar .logo{font-size:17px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,#1d1d1f,#434344);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#status-bar .sub{font-size:12px;color:#86868b;font-weight:500}
#status-bar .badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:#007aff;color:#fff}
#status-bar .badge.outside{background:#8e8e93;color:#fff}
#app{height:100%;padding-top:52px;padding-bottom:calc(env(safe-area-inset-bottom,0px))}
#zone-tabs{display:flex;gap:6px;padding:10px 16px 8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-shrink:0}
#zone-tabs::-webkit-scrollbar{display:none}
#zone-tabs button{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:none;background:rgba(0,0,0,.05);color:#86868b;cursor:pointer;transition:all .2s;flex-shrink:0}
#zone-tabs button:active{transform:scale(.95)}
#zone-tabs button.active{background:#007aff;color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(0,122,255,.3)}
#content{height:calc(100% - 48px);overflow-y:auto;padding:4px 16px 100px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#content::-webkit-scrollbar{width:0}
.store-section{margin-bottom:20px}
.store-section:last-child{margin-bottom:40px}
.store-section .section-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding:0 4px}
.store-section .section-title{font-size:15px;font-weight:700;color:#1d1d1f;letter-spacing:-.2px}
.store-section .section-sub{font-size:11px;color:#86868b;font-weight:500}
.store-section .section-count{font-size:11px;color:#86868b;font-weight:400}
.store-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.06);transition:all .2s;cursor:pointer}
.store-card:active{transform:scale(.98)}
.store-card .sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.store-card .sc-name{font-size:15px;font-weight:700;color:#1d1d1f;letter-spacing:-.2px}
.store-card .sc-local{font-size:11px;color:#86868b;font-weight:500;font-feature-settings:'tnum';margin-top:1px}
.store-card .sc-desc{font-size:12px;color:#86868b;line-height:1.3;margin-bottom:8px}
.store-card .sc-offers{display:flex;flex-direction:column;gap:4px}
.store-card .sc-offer{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;line-height:1.2}
.store-card .sc-offer.permanent{background:#f0f7ff;color:#0066cc}
.store-card .sc-offer.permanent .tag{background:#007aff;color:#fff;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.3px}
.store-card .sc-offer.flash{background:#fff5f0;color:#c93400;animation:pulse-glow 2s infinite}
.store-card .sc-offer.flash .tag{background:#ff3b00;color:#fff;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.3px}
.store-card .sc-offer .price{font-size:11px;color:#86868b;font-weight:600;margin-left:auto;font-feature-settings:'tnum'}
@keyframes pulse-glow{0%,100%{opacity:1}50%{opacity:.75}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.3}
.empty-state h3{font-size:17px;font-weight:600;color:#1d1d1f;margin-bottom:4px}
.empty-state p{font-size:13px;color:#86868b;line-height:1.4;max-width:280px}
#flash-header{display:none;background:linear-gradient(135deg,#fff5f0,#fff0ea);border-radius:14px;padding:12px 16px;margin:0 0 12px;border:1px solid rgba(255,59,0,.1)}
#flash-header.show{display:block}
#flash-header .fh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#flash-header .fh-title{font-size:13px;font-weight:700;color:#c93400}
#flash-header .fh-timer{font-size:16px;font-weight:700;font-feature-settings:'tnum';color:#ff3b00}
#flash-header .fh-item{font-size:12px;color:#c93400;padding:2px 0;font-weight:500}
#toasts{position:fixed;top:calc(60px + env(safe-area-inset-top,0px));right:12px;z-index:200;display:flex;flex-direction:column;gap:8px;width:300px;pointer-events:none}
.toast{background:#fff;border-radius:14px;padding:14px 16px;animation:toastIn .4s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);pointer-events:auto;cursor:pointer;border:1px solid rgba(0,0,0,.06)}
.toast.flash{border-left:4px solid #ff3b00}
.toast.permanent{border-left:4px solid #007aff}
.toast .t-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.toast .t-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px}
.toast.flash .t-tag{background:#fff5f0;color:#ff3b00}
.toast.permanent .t-tag{background:#f0f7ff;color:#007aff}
.toast .t-timer{font-size:12px;font-weight:700;color:#ff3b00;font-feature-settings:'tnum'}
.toast .t-body{font-size:13px;font-weight:600;color:#1d1d1f;line-height:1.3}
.toast .t-store{font-size:11px;color:#86868b;margin-top:2px}
@keyframes toastIn{from{transform:translateX(120%) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
#gps-dot{width:8px;height:8px;border-radius:50%;background:#34c759;display:inline-block;animation:gpsPulse 2s infinite;margin-right:4px;vertical-align:middle}
@keyframes gpsPulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,199,89,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(52,199,89,0)}}
#debug-bar{position:fixed;bottom:0;left:0;right:0;z-index:99;padding:3px 12px;padding-bottom:calc(3px + env(safe-area-inset-bottom,0px));font-size:9px;color:rgba(0,0,0,.25);background:rgba(255,255,255,.8);backdrop-filter:blur(10px);border-top:1px solid rgba(0,0,0,.04);text-align:center;font-weight:500}
</style>
</head>
<body>
<div id="status-bar">
  <div class="left">
    <span class="logo">Señorío Plaza</span>
    <span class="sub">Illescas</span>
  </div>
  <span class="badge" id="zone-badge"><span id="gps-dot"></span>En el centro</span>
</div>
<div id="app">
  <div id="zone-tabs">
    <button data-zone="all" class="active">Todas</button>
    <button data-zone="tiendas">🛍️ Tiendas</button>

    <div id="flash-header">

      </div>
      <div id="flash-items"></div>
    </div>
    <div id="store-list"></div>
  </div>
</div>
<div id="toasts"></div>
<div id="debug-bar">Al entrar en cada zona recibe ofertas flash · C. Juan Carlos Onetti, 1 · Illescas</div>
<script>
const CC={name:'Señorío Plaza',lat:40.1323,lng:-3.8477,radius:.002,zones:{tiendas:{label:'🛍️ Tiendas',color:'#007aff',flash:[{store:'Joma',offer:'-50% en segunda prenda · todo el día',price:'Desde 25€'},{store:'Sprinter',offer:'-40% en chaquetas running',price:'39€'},{store:'Action',offer:'Lote sorpresa -70% · solo 30 uds',price:'1€'}],stores:[{name:'Joma',local:'A02',desc:'Prestigiosa marca deportiva española. Calzado y equipamiento técnico para fútbol, running y más.',offer:'2x1 en calzado de running',price:'Desde 39€'},{name:'Max Colchón',local:'A02B',desc:'Fabricante especializado en descanso. Colchones viscoelásticos, canapés y almohadas.',offer:'-30% en colchones viscoelásticos',price:'249€'},{name:'Hôma',local:'A03/B04',desc:'Inspiración para tu hogar. Muebles, decoración y menaje de última tendencia.',offer:'-20% en muebles seleccionados',price:'Desde 59€'},{name:'Toy Planet',local:'A05',desc:'La juguetería de toda la vida. Juegos de mesa, muñecos y diversión garantizada.',offer:'3x2 en juegos de mesa seleccionados',price:'Desde 12€'},{name:'Feuvert',local:'B01A',desc:'Expertos en automoción. Taller mecánico rápido y venta de recambios.',offer:'Revisión gratuita + -15% en neumáticos',price:'Gratis'},{name:'Bermellón',local:'B01B',desc:'Textil hogar de calidad. Cortinas, ropa de cama y complementos elegantes.',offer:'-25% en toda la ropa de cama',price:'Desde 29€'},{name:'JYSK',local:'B02-B03B',desc:'Diseño escandinavo para tu hogar. Muebles, decoración y descanso.',offer:'-40% en colchones JYSK seleccionados',price:'Desde 99€'},{name:'Dormity',local:'B04A',desc:'Salud y descanso. Colchones diseñados para mejorar tu sueño.',offer:'2ª unidad al 50% en almohadas viscoelásticas',price:'19€'},{name:'Kiwoko',local:'B06',desc:'Paraíso para mascotas. Alimentación, accesorios y cuidados.',offer:'-20% en pienso premium + regalo sorpresa',price:'Desde 8€'},{name:'Sprinter',local:'B08',desc:'Multimarca deportiva. Las mejores firmas en running, fitness y lifestyle.',offer:'-50% en ropa de entrenamiento',price:'Desde 15€'},{name:'Action',local:'B09',desc:'Descuentos increíbles. Surtido rotativo que cambia cada semana.',offer:'-70% en sección de hobby y craft',price:'Desde 1€'},{name:'Kiabi',local:'—',desc:'Moda para toda la familia a precios que enamoran.',offer:'2x1 en camisetas básicas',price:'6€'}]},restauracion:{label:'🍔 Restauración',color:'#ff9500',flash:[{store:"McDonald's",offer:'Menú Big Mac por solo 5.99€ · 30 min'},{store:'100 Montaditos',offer:'Todos los montaditos a 0.50€ · 30 min'},{store:'Churrería',offer:'Churros con chocolate 2.50€ · 30 min'}],stores:[{name:'100 Montaditos',local:'R01',desc:'Los míticos montaditos. Miércoles y domingos de locura.',offer:'Miércoles y domingo: montaditos a 1€',price:'1€'},{name:"McDonald's",local:'R02',desc:'El clásico de siempre. Rápido, rico y para toda la familia.',offer:'Menú Big Mac por 7.99€',price:'7.99€'},{name:'Ginos',local:'R03',desc:'Auténtica cocina italiana. Pastas artesanales y pizzas al horno.',offer:'Menú pasta + bebida por 9.90€',price:'9.90€'},{name:'VIPS',local:'R04',desc:'El restaurante americano de referencia. Hamburguesas y desayunos.',offer:'Los lunes: hamburguesa VIPS 2x1',price:'11.50€'},{name:'Makitoki',local:'R05',desc:'Cocina asiática fusión. Makis frescos, wok y noodles.',offer:'Menú makis 12.90€ (2ª ración gratis)',price:'12.90€'},{name:'Anubis',local:'R06',desc:'Cocina mexicana auténtica. Tacos, burritos y margaritas.',offer:'Jueves: 3x2 en tacos tradicionales',price:'9€'},{name:'Foodtrucker',local:'R07',desc:'Comida urbana sobre ruedas. Perritos, burgers y pulled pork.',offer:'Menú Foodie: burger+patatas+bebida 8.50€',price:'8.50€'},{name:'Churrería',local:'R08',desc:'Churros artesanales recién hechos. El aroma del centro.',offer:'Churros con chocolate caliente 3.50€',price:'3.50€'},{name:'Kebap',local:'R09',desc:'Comida turca de calidad. Döner, kebab y durum.',offer:'Durum + bebida 5.90€ (menú estudiante)',price:'5.90€'}]},ocio:{label:'🎮 Ocio',color:'#af52de',flash:[{store:'Bowling Co.',offer:'2 partidas gratis + 1 bebida · 30 min'}],stores:[{name:'Bowling Co.',local:'O01',desc:'Pistas de bolos profesionales. Diversión en grupo garantizada.',offer:'2 partidas por 1: 9.90€ (lunes a jueves)',price:'9.90€'},{name:'Fitness Gym',local:'O02',desc:'Gimnasio completo. Abierto de 06:00 a 01:00. Clases incluidas.',offer:'Día de prueba GRATIS + -50% en inscripción',price:'Gratis'},{name:'Zona Gaming',local:'O03',desc:'Simuladores, realidad virtual y máquinas arcade.',offer:'1 hora de VR por 8€ (hasta 2 jugadores)',price:'8€'}]},alimentacion:{label:'🛒 Mercado',color:'#34c759',flash:[{store:'Alcampo',offer:'-50% en pescadería fresca · 30 min'},{store:'Lidl',offer:'Lote de fruta variada por 2.99€ · 30 min'}],stores:[{name:'Alcampo',local:'S01',desc:'Hipermercado completo. Alimentación, hogar, textil y electrónica.',offer:'-20% en carne y pescado fresco (viernes)',price:'Desde 3€'},{name:'Lidl',local:'S02',desc:'Supermercado de descuento. Calidad al mejor precio.',offer:'Ofertas de la semana: fruta y verdura -30%',price:'Desde 0.99€'}]},servicios:{label:'⚙️ Servicios',color:'#ffcc00',flash:[{store:'Farmacia',offer:'-20% en toda la parafarmacia · 30 min'}],stores:[{name:'Lavandería',local:'SV01',desc:'Lavandería autoservicio 24 horas.',offer:'Lava + seca por 5€ (promo nuevos usuarios)',price:'5€'},{name:'Farmacia',local:'SV02',desc:'Farmacia con horario ampliado y parafarmacia.',offer:'-15% en vitaminas y complementos alimenticios',price:'Desde 5€'},{name:'Óptica',local:'SV03',desc:'Gafas graduadas y de sol. Revisiones visuales gratuitas.',offer:'2x1 en gafas graduadas + revisión gratis',price:'Desde 49€'},{name:'Belleza',local:'SV04',desc:'Peluquería, estética y manicura. Mimarte es fácil.',offer:'Corte + peinado por 15€ (entre semana)',price:'15€'},{name:'Loterías',local:'SV05',desc:'Administración de lotería y apuestas del Estado.',offer:'Lleva 5€ y llévate un boleto de regalo',price:'Desde 2€'}]}}},ZONE_ORDER=['tiendas','restauracion','ocio','alimentacion','servicios'],currentView='all',simInterval=null,simIdx=0,toastCount=0,visitedZones=new Set,flashSecs=1800,flashTimer=null,activeFlashes=[];
const storeList=document.getElementById('store-list'),zoneBadge=document.getElementById('zone-badge'),flashHeader=document.getElementById('flash-header'),flashItems=document.getElementById('flash-items'),flashTimerEl=document.getElementById('flash-timer'),content=document.getElementById('content'),simBtn=document.getElementById('sim-btn');
function fmt(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0')}
function startFlashTimer(){if(flashTimer)clearInterval(flashTimer);flashSecs=1800;flashTimer=setInterval(()=>{flashSecs--;flashTimerEl.textContent=fmt(flashSecs);if(flashSecs<=0){clearInterval(flashTimer);flashTimer=null;flashHeader.classList.remove('show');activeFlashes=[];renderStores()}},1000)}
function showToast(zoneKey,data,isFlash){const zone=CC.zones[zoneKey],id='t-'+(toastCount++),d=document.createElement('div');d.className='toast '+(isFlash?'flash':'permanent');d.id=id;if(isFlash)d.innerHTML='<div class="t-head"><span class="t-tag">⏰ OFERTA FLASH</span><span class="t-timer">'+fmt(flashSecs)+'</span></div><div class="t-body">'+data.offer+'</div><div class="t-store">'+data.store+' · '+zone.label+'</div>';else d.innerHTML='<div class="t-head"><span class="t-tag">🏪 OFERTA</span></div><div class="t-body">'+data.offer+'</div><div class="t-store">'+data.name+' · '+zone.label+'</div>';d.onclick=()=>d.remove();document.getElementById('toasts').appendChild(d);setTimeout(()=>{const e=document.getElementById(id);if(e)e.remove()},10000)}
function enterZone(zoneKey){if(visitedZones.has(zoneKey))return;visitedZones.add(zoneKey);const zone=CC.zones[zoneKey];zoneBadge.innerHTML='<span id="gps-dot"></span>'+zone.label;if(zone.flash&&zone.flash.length){zone.flash.forEach(f=>{showToast(zoneKey,f,true);activeFlashes.push({zone:zoneKey,store:f.store,offer:f.offer})});if(!flashTimer)startFlashTimer();updateFlashHeader()}if(zone.stores&&zone.stores.length){const r=zone.stores[Math.floor(Math.random()*zone.stores.length)];showToast(zoneKey,r,false)}renderStores()}
function updateFlashHeader(){if(activeFlashes.length){flashHeader.classList.add('show');flashItems.innerHTML=activeFlashes.map(f=>'<div class="fh-item">⏰ '+f.store+' · '+f.offer+'</div>').join('')}else flashHeader.classList.remove('show')}
function renderStores(){if(currentView==='all'){const keys=Object.keys(CC.zones);let html='';keys.forEach(key=>{const zone=CC.zones[key];html+='<div class="store-section"><div class="section-header"><span class="section-title">'+zone.label+'</span><span class="section-count">'+zone.stores.length+' tiendas</span></div>';zone.stores.forEach(s=>{const hf=activeFlashes.some(f=>f.store===s.name&&f.zone===key);html+='<div class="store-card"><div class="sc-top"><span class="sc-name">'+s.name+'</span><span class="sc-local">Local '+(s.local||'—')+'</span></div><div class="sc-desc">'+s.desc+'</div><div class="sc-offers"><div class="sc-offer permanent"><span class="tag">OFERTA</span> '+s.offer+' <span class="price">'+s.price+'</span></div>'+(hf?'<div class="sc-offer flash"><span class="tag">FLASH</span> '+activeFlashes.find(f=>f.store===s.name).offer+'</div>':'')+'</div></div>'})});storeList.innerHTML=html}else{let html='<div class="store-section"><div class="section-header"><span class="section-title">'+CC.zones[currentView].label+'</span><span class="section-count">'+CC.zones[currentView].stores.length+' tiendas</span></div>';CC.zones[currentView].stores.forEach(s=>{const hf=activeFlashes.some(f=>f.store===s.name&&f.zone===currentView);html+='<div class="store-card"><div class="sc-top"><span class="sc-name">'+s.name+'</span><span class="sc-local">Local '+(s.local||'—')+'</span></div><div class="sc-desc">'+s.desc+'</div><div class="sc-offers"><div class="sc-offer permanent"><span class="tag">OFERTA</span> '+s.offer+' <span class="price">'+s.price+'</span></div>'+(hf?'<div class="sc-offer flash"><span class="tag">FLASH</span> '+activeFlashes.find(f=>f.store===s.name).offer+'</div>':'')+'</div></div>'});storeList.innerHTML=html}}
document.querySelectorAll('#zone-tabs button[data-zone]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#zone-tabs button[data-zone]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentView=btn.dataset.zone;if(currentView==='all')zoneBadge.innerHTML='<span id="gps-dot"></span>En el centro';else zoneBadge.innerHTML='<span id="gps-dot"></span>'+CC.zones[currentView].label;renderStores();content.scrollTop=0})});
simBtn.onclick=()=>{if(simInterval){clearInterval(simInterval);simInterval=null;simBtn.textContent='⏰ Simular';visitedZones.clear();currentView='all';document.querySelectorAll('#zone-tabs button[data-zone]').forEach(b=>b.classList.remove('active'));document.querySelector('[data-zone="all"]').classList.add('active');zoneBadge.innerHTML='<span id="gps-dot"></span>En el centro';if(flashTimer){clearInterval(flashTimer);flashTimer=null}flashHeader.classList.remove('show');activeFlashes=[];document.getElementById('toasts').innerHTML='';flashSecs=1800;renderStores();return}simBtn.textContent='⏹ Parar';simIdx=0;visitedZones.clear();document.getElementById('toasts').innerHTML='';activeFlashes=[];flashSecs=1800;enterZone(ZONE_ORDER[0]);simInterval=setInterval(()=>{simIdx++;if(simIdx>=ZONE_ORDER.length){clearInterval(simInterval);simInterval=null;simBtn.textContent='⏰ Simular';return}enterZone(ZONE_ORDER[simIdx])},4000)};
if('geolocation'in navigator){let lastZone=null;navigator.geolocation.watchPosition(pos=>{const dLat=pos.coords.latitude-CC.lat,dLng=pos.coords.longitude-CC.lng;if(Math.sqrt(dLat*dLat+dLng*dLng)>CC.radius*1.5){if(lastZone!==null){lastZone=null;zoneBadge.innerHTML='<span id="gps-dot"></span>Fuera del centro'}return}const relX=(dLng/CC.radius+1)/2,relY=(dLat/CC.radius+1)/2;let zone=relX<0.5?(relY<0.5?'tiendas':'alimentacion'):(relY<0.3?'restauracion':relY<0.5?'ocio':'servicios');if(zone&&zone!==lastZone){enterZone(zone);lastZone=zone}},()=>{if(!simInterval)setTimeout(()=>simBtn.click(),2000)},{enableHighAccuracy:true,timeout:10000})}else setTimeout(()=>{if(!simInterval)simBtn.click()},2000);
renderStores();
</script>
</body>
</html>'''
