<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e8edf5;height:100%;overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
::selection{background:#00d4ff33;color:#fff}

/* Status bar */
#status-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:8px;padding:8px 14px;padding-top:calc(8px + env(safe-area-inset-top,0px));background:linear-gradient(180deg,#0a0e17 60%,transparent);font-size:11px;color:#6b7a99;pointer-events:none}
#status-bar .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
#status-bar .coord{color:#4a5a7a;font-family:monospace;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
#status-bar .badge{background:#1a2a4a;padding:2px 8px;border-radius:4px;color:#00d4ff;font-weight:600;font-size:10px;border:1px solid #00d4ff22}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Main layout */
#app{display:flex;flex-direction:column;height:100%;padding-top:40px}
#map-wrap{flex:1;position:relative;overflow:hidden;margin:0 10px;border-radius:16px;border:1px solid #1a2a4a;background:#0f1420}

/* Map canvas */
#map-canvas{width:100%;height:100%;position:relative;background:radial-gradient(ellipse at 50% 60%,#0f1f35 0%,#080c15 100%)}
#map-canvas svg{width:100%;height:100%}

/* Zones on map */
.zone{fill-opacity:.15;stroke-width:2;transition:all .4s ease;cursor:pointer}
.zone.active{fill-opacity:.35;stroke-width:3}
.zone.tiendas{fill:#00d4ff;stroke:#00d4ff}
.zone.restauracion{fill:#f97316;stroke:#f97316}
.zone.ocio{fill:#a855f7;stroke:#a855f7}
.zone.alimentacion{fill:#22c55e;stroke:#22c55e}
.zone.servicios{fill:#eab308;stroke:#eab308}

/* Zone labels */
.zone-label{font-size:11px;font-weight:700;fill:#b0c4de;text-anchor:middle;pointer-events:none;opacity:.7;font-family:-apple-system,sans-serif}
.zone-label.active{fill:#fff;opacity:1}

/* Notifications */
#toasts{position:fixed;top:calc(52px + env(safe-area-inset-top,0px));right:12px;z-index:200;display:flex;flex-direction:column;gap:8px;width:280px;pointer-events:none}
.toast{background:linear-gradient(135deg,#0f1f35 0%,#1a2a4a 100%);border:1px solid;border-radius:12px;padding:12px 14px;animation:slideInRight .4s ease-out;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:auto;cursor:pointer}
.toast.tiendas{border-color:#00d4ff44}.toast.restauracion{border-color:#f9731644}.toast.ocio{border-color:#a855f744}.toast.alimentacion{border-color:#22c55e44}
.toast .toast-title{font-size:12px;font-weight:700;margin-bottom:2px}
.toast.tiendas .toast-title{color:#00d4ff}.toast.restauracion .toast-title{color:#f97316}.toast.ocio .toast-title{color:#a855f7}.toast.alimentacion .toast-title{color:#22c55e}
.toast .toast-body{font-size:13px;line-height:1.4}
.toast .toast-store{font-size:10px;color:#6b7a99;margin-top:4px}
.toast .toast-price{font-size:11px;color:#22c55e;font-weight:700;margin-top:2px}
@keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Bottom panel */
#bottom-panel{background:#0f1420;border-top:1px solid #1a2a4a;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));max-height:45vh;overflow:hidden;display:flex;flex-direction:column;transition:max-height .3s ease}
#bottom-panel.expanded{max-height:70vh}
#panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-shrink:0}
#panel-header h2{font-size:15px;font-weight:700;color:#e8edf5}
#panel-header .zone-indicator{font-size:11px;padding:3px 10px;border-radius:20px;background:#1a2a4a;color:#6b7a99}
#panel-header .toggle-btn{background:none;border:none;color:#6b7a99;cursor:pointer;padding:4px 8px;font-size:16px}
#panel-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#1a2a4a transparent}
#panel-scroll::-webkit-scrollbar{width:4px}
#panel-scroll::-webkit-scrollbar-thumb{background:#1a2a4a;border-radius:2px}

/* Store cards */
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.store-card{background:#131a28;border:1px solid #1a2a4a;border-radius:10px;padding:10px;cursor:pointer;transition:all .2s}
.store-card:active{transform:scale(.97);border-color:#00d4ff44}
.store-card .store-name{font-size:12px;font-weight:700;color:#e8edf5}
.store-card .store-cat{font-size:9px;color:#6b7a99;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.store-card .store-offer{font-size:11px;color:#22c55e;margin-top:4px;line-height:1.3}
.store-card .store-local{font-size:9px;color:#4a5a7a;margin-top:2px;font-family:monospace}

/* Controls */
#controls{display:flex;gap:6px;padding:10px 14px 0;flex-shrink:0;flex-wrap:wrap}
#controls button{flex:1;padding:8px 12px;border:1px solid #1a2a4a;border-radius:8px;background:#0f1420;color:#b0c4de;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;min-width:0}
#controls button:active{transform:scale(.96)}
#controls button.active{border-color:#00d4ff;color:#00d4ff;background:#00d4ff11}
#controls button.sim-btn{background:#1a2a4a;color:#00d4ff}

/* Zone detail modal */
#zone-detail{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#0f1420;border-radius:20px 20px 0 0;border-top:1px solid #1a2a4a;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .3s ease;max-height:80vh;overflow-y:auto}
#zone-detail.open{transform:translateY(0)}
#zone-detail .close-btn{float:right;background:none;border:none;color:#6b7a99;font-size:20px;cursor:pointer;padding:4px}
#zone-detail h3{font-size:16px;font-weight:700;margin-bottom:4px}
#zone-detail .zone-desc{font-size:12px;color:#6b7a99;margin-bottom:12px}
#zone-detail .zd-store{background:#131a28;border:1px solid #1a2a4a;border-radius:10px;padding:12px;margin-bottom:8px}

/* GPS debug */
#gps-debug{position:fixed;bottom:0;left:0;right:0;z-index:99;padding:4px 10px;padding-bottom:calc(4px + env(safe-area-inset-bottom,0px));font-size:9px;font-family:monospace;color:#4a5a7a;background:linear-gradient(0deg,#080c15 60%,transparent);pointer-events:none;text-align:center}

/* Animations for offers appearing */
.offer-highlight{animation:glowPulse 2s ease-in-out infinite}

// ============================================================
// GPS Detection
// ============================================================
function deg2rad(d) { return d * Math.PI / 180; }
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = deg2rad(lat2-lat1);
  const dLng = deg2rad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Determine which zone based on relative position within CC
function getZoneByOffset(lat, lng) {
  const dLat = lat - CC.lat;
  const dLng = lng - CC.lng;
  const dist = Math.sqrt(dLat*dLat + dLng*dLng);
  if (dist > CC.radius * 1.5) return null; // Outside CC

  // Map relative position to zones (matching SVG layout)
  const relX = (dLng / CC.radius + 1) / 2; // 0-1
  const relY = (dLat / CC.radius + 1) / 2; // 0-1

  if (relX < 0.5 && relY < 0.55) return 'tiendas';
  if (relX >= 0.5 && relY < 0.32) return 'restauracion';
  if (relX >= 0.5 && relY < 0.55) return 'ocio';
  if (relX < 0.5 && relY >= 0.55) return 'alimentacion';
  if (relX >= 0.5 && relY >= 0.55) return 'servicios';
  return null;
}

  document.querySelectorAll('.zone-label').forEach(z => z.classList.remove('active'));
  if (zoneKey) {
    const el = document.querySelector(`.zone.${zoneKey}`);
    if (el) el.classList.add('active');
    const label = document.querySelector(`.zone-label:not(.zone.${zoneKey})`);
  }

  // Update user dot position
  const zoneCenters = {
    tiendas: {x:115, y:100},
    restauracion: {x:290, y:68},
    ocio: {x:290, y:145},
    alimentacion: {x:115, y:233},
    servicios: {x:290, y:233},
  };
  if (zoneKey && zoneCenters[zoneKey]) {
    const c = zoneCenters[zoneKey];
    document.getElementById('user-dot').setAttribute('cx', c.x);
    document.getElementById('user-dot').setAttribute('cy', c.y);
    document.getElementById('user-glow').setAttribute('cx', c.x);
    document.getElementById('user-glow').setAttribute('cy', c.y);
  }
}

function showToast(zoneKey, store) {
  const zone = CC.zones[zoneKey];
  const id = `toast-${toastCount++}`;
  const div = document.createElement('div');
  div.className = `toast ${zoneKey}`;
  div.id = id;
  div.innerHTML = `
    <div class="toast-title">${zone.label}</div>
    <div class="toast-body">${store.offer}</div>
    <div class="toast-store">${store.name} · Local ${store.local || '—'}</div>
    <div class="toast-price">${store.price}</div>
  `;
  div.onclick = () => div.remove();
  toasts.appendChild(div);
  setTimeout(() => { const el = document.getElementById(id); if(el) el.remove(); }, 8000);
}

function enterZone(zoneKey) {
  if (visitedZones.has(zoneKey)) return;
  visitedZones.add(zoneKey);
  currentZone = zoneKey;

  const zone = CC.zones[zoneKey];
  zoneBadge.textContent = `📍 ${zone.label}`;
  updateMapZone(zoneKey);
  updatePanel(zoneKey);

  // Show 2 random offers from this zone
  const shuffled = [...zone.stores].sort(() => Math.random() - .5);
  shuffled.slice(0, 2).forEach(s => showToast(zoneKey, s));
}

function updatePanel(zoneKey) {
  if (!zoneKey || !CC.zones[zoneKey]) {
    panelTitle.textContent = '🏪 Todas las tiendas';
    zoneIndicator.textContent = '📍 CENTRO';
    renderAllStores();
    return;
  }
  const zone = CC.zones[zoneKey];
  panelTitle.textContent = zone.label;
  zoneIndicator.textContent = `📍 ${zoneKey.toUpperCase()}`;
  renderFilteredStores(zoneKey);
}

function renderAllStores(filter) {
  let html = '<div class="store-grid">';
  Object.entries(CC.zones).forEach(([key, zone]) => {
    zone.stores.forEach(s => {
      if (filter && !s.name.toLowerCase().includes(filter.toLowerCase()) &&
          !zone.label.toLowerCase().includes(filter.toLowerCase())) return;
      html += `
        <div class="store-card" onclick="openZoneDetail('${key}')">
          <div class="store-name">${s.name}</div>
          <div class="store-cat">${zone.label} · Local ${s.local || '—'}</div>
          <div class="store-offer">${s.offer}</div>
          <div class="store-local">${s.price}</div>
        </div>`;
    });
  });
  html += '</div>';
  panelScroll.innerHTML = html;
}

function renderFilteredStores(zoneKey) {
  const zone = CC.zones[zoneKey];
  let html = '<div class="store-grid">';
  zone.stores.forEach(s => {
    html += `
      <div class="store-card" onclick="openZoneDetail('${zoneKey}')">
        <div class="store-name">${s.name}</div>
        <div class="store-cat">${zone.label} · Local ${s.local || '—'}</div>
        <div class="store-offer">${s.offer}</div>
        <div class="store-local">${s.price}</div>
      </div>`;
  });
  html += '</div>';
  panelScroll.innerHTML = html;
}

// Zone detail modal
window.openZoneDetail = function(zoneKey) {
  const zone = CC.zones[zoneKey];
  zdTitle.textContent = zone.label;
  zdDesc.textContent = zone.desc;
  let html = '';
  zone.stores.forEach(s => {
    html += `
      <div class="zd-store">
        <h4>${s.name} <span style="font-size:10px;color:#4a5a7a;font-weight:400;">Local ${s.local || '—'}</span></h4>
        <div class="zd-desc">${s.desc}</div>
        <div class="zd-offer">${s.offer}</div>
      </div>`;
  });
  zdStores.innerHTML = html;
  document.getElementById('zone-detail').classList.add('open');
};

closeDetail.onclick = () => document.getElementById('zone-detail').classList.remove('open');

// Toggle panel
let panelExpanded = false;
toggleBtn.onclick = () => {
  panelExpanded = !panelExpanded;
  bottomPanel.classList.toggle('expanded', panelExpanded);
  toggleBtn.textContent = panelExpanded ? '▼' : '▲';
};

// ============================================================
// Walking simulation
// ============================================================
simWalk.onclick = function() {
  if (simInterval) {
    clearInterval(simInterval);
    simInterval = null;
    simWalk.textContent = '🚶 Simular';
    visitedZones.clear();
    updateMapZone(null);
    updatePanel(null);
    zoneBadge.textContent = '📍 CENTRO';
    return;
  }
  simWalk.textContent = '⏹️ Parar';
  simZoneIdx = 0;
  visitedZones.clear();
  toasts.innerHTML = '';

  // Walk through zones sequentially
  enterZone(ZONE_ORDER[0]);
  simInterval = setInterval(() => {
    simZoneIdx++;
    if (simZoneIdx >= ZONE_ORDER.length) {
      clearInterval(simInterval);
      simInterval = null;
      simWalk.textContent = '🚶 Simular';
      // Show summary
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'toast tiendas';
        div.innerHTML = `
          <div class="toast-title">✅ Recorrido completo</div>
          <div class="toast-body">Has visitado todas las zonas de Señorío Plaza. ¡Vuelve pronto!</div>`;
        div.onclick = () => div.remove();
        toasts.appendChild(div);
      }, 500);
      return;
    }
    enterZone(ZONE_ORDER[simZoneIdx]);
  }, 3000);
};

// ============================================================
// Filter buttons
// ============================================================
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const zone = btn.dataset.zone;
    if (zone === 'all') {
      updateMapZone(null);
      updatePanel(null);
      zoneBadge.textContent = '📍 CENTRO';
    } else {
      enterZone(zone);
    }
  });
});

// ============================================================
// Real GPS
// ============================================================
if ('geolocation' in navigator) {
  const geoOpts = { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 };
  let lastZone = null;

  function onPosition(pos) {
    const { latitude, longitude } = pos.coords;
    gpsCoord.textContent = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;

    const zone = getZoneByOffset(latitude, longitude);
    if (zone && zone !== lastZone) {
      enterZone(zone);
      lastZone = zone;
    } else if (!zone && lastZone !== null) {
      lastZone = null;
      zoneBadge.textContent = '📍 FUERA DEL CC';
      updateMapZone(null);
    } else if (zone) {
      // Already in this zone, just update display
      zoneBadge.textContent = `📍 ${CC.zones[zone].label}`;
    }

    updateMapZone(zone);
  }

  function onError(err) {
    gpsCoord.textContent = 'GPS no disponible';
    // Auto-simulate if no GPS
    setTimeout(() => {
      if (!simInterval) simWalk.click();
    }, 2000);
  }

  navigator.geolocation.watchPosition(onPosition, onError, geoOpts);
} else {
  gpsCoord.textContent = 'GPS no soportado';
  // Auto-simulate
  setTimeout(() => {
    if (!simInterval) simWalk.click();
  }, 2000);
}

// ============================================================
// Keyboard controls
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') {
    const idx = ZONE_ORDER.indexOf(currentZone);
    const next = (idx + 1) % ZONE_ORDER.length;
    enterZone(ZONE_ORDER[next]);
  } else if (e.key === 'ArrowLeft') {
    const idx = ZONE_ORDER.indexOf(currentZone);
    const prev = (idx - 1 + ZONE_ORDER.length) % ZONE_ORDER.length;
    enterZone(ZONE_ORDER[prev]);
  } else if (e.key === 'Escape') {
    document.getElementById('zone-detail').classList.remove('open');
  }
});

// Initial state
updatePanel(null);
console.log('🏪 GeoMarket · Señorío Plaza cargado');
console.log(`📍 ${CC.address}`);
console.log(`🏪 ${Object.values(CC.zones).reduce((a,z) => a+z.stores.length, 0)} tiendas/restaurantes`);
</script>
