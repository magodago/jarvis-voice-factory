<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1510;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)" rx="8"/>
  <circle cx="400" cy="260" r="120" fill="none" stroke="url(#gold1)" stroke-width="2"/>
  <circle cx="400" cy="260" r="100" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="260" r="140" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
  <!-- Scissors icon -->
  <g transform="translate(360,220)" stroke="#c9a96e" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M0,40 Q20,20 40,0" />
    <path d="M40,40 Q20,20 0,0" />
    <circle cx="0" cy="42" r="6" fill="#c9a96e"/>
    <circle cx="40" cy="42" r="6" fill="#c9a96e"/>
  </g>
  <!-- Hair strands -->
  <g stroke="#c9a96e" stroke-width="0.8" opacity="0.4">
    <path d="M350,380 Q370,320 400,300" fill="none"/>
    <path d="M370,390 Q380,330 400,310" fill="none"/>
    <path d="M390,395 Q395,335 400,315" fill="none"/>
    <path d="M410,395 Q415,335 420,315" fill="none"/>
    <path d="M430,390 Q440,330 450,310" fill="none"/>
  </g>
  <text x="400" y="440" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#c9a96e" text-anchor="middle" letter-spacing="4">CORTE MODERNO</text>
  <text x="400" y="470" font-family="Rajdhani, Arial, sans-serif" font-size="14" fill="#8b6914" text-anchor="middle" letter-spacing="6">ESTILO</text>
  <rect x="360" y="490" width="80" height="1" fill="#c9a96e" opacity="0.5"/>
