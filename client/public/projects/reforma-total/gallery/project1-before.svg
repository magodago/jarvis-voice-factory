<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#e8672b" stroke-width="3"/>
  <!-- Bathtub before -->
  <rect x="100" y="250" width="200" height="120" rx="10" fill="#3a3a3a" stroke="#555" stroke-width="2"/>
  <rect x="110" y="260" width="180" height="100" rx="8" fill="#2d2d2d"/>
  <!-- Cracked tiles -->
  <line x1="130" y1="280" x2="170" y2="320" stroke="#e8672b" stroke-width="1.5" opacity="0.6"/>
  <line x1="175" y1="275" x2="180" y2="310" stroke="#e8672b" stroke-width="1.5" opacity="0.6"/>
  <!-- Old sink -->
  <rect x="350" y="300" width="100" height="70" rx="5" fill="#444" stroke="#666" stroke-width="1.5"/>
  <rect x="360" y="310" width="80" height="50" rx="3" fill="#333"/>
  <!-- Water damage stain -->
  <ellipse cx="400" cy="200" rx="60" ry="40" fill="#2a1a1a" opacity="0.7"/>
  <ellipse cx="400" cy="200" rx="40" ry="25" fill="#1a1010" opacity="0.5"/>
  <!-- Rusty pipes -->
  <rect x="460" y="350" width="15" height="120" rx="3" fill="#5a3a2a"/>
  <rect x="490" y="350" width="12" height="120" rx="3" fill="#5a3a2a"/>
  <!-- Before label -->
  <rect x="300" y="30" width="200" height="50" rx="25" fill="#e8672b" opacity="0.9"/>
  <text x="400" y="62" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">ANTES</text>
  <!-- Description -->
  <text x="400" y="530" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="16">Baño original - Estado inicial</text>
</svg>
