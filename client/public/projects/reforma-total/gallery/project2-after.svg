  <rect x="140" y="220" width="3" height="40" rx="1" fill="#e8672b"/>
  <rect x="260" y="220" width="3" height="40" rx="1" fill="#e8672b"/>
  <rect x="380" y="220" width="3" height="40" rx="1" fill="#e8672b"/>
  <rect x="500" y="220" width="3" height="40" rx="1" fill="#e8672b"/>
  <!-- Countertop -->
  <rect x="50" y="310" width="470" height="22" fill="#e8672b"/>
  <rect x="50" y="332" width="470" height="5" fill="#c85a1f"/>
