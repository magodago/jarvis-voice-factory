  <rect x="50" y="140" width="470" height="40" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
  <g opacity="0.3"><rect x="55" y="145" width="20" height="20" fill="#e8672b"/><rect x="80" y="145" width="20" height="20" fill="#e8672b"/><rect x="105" y="145" width="20" height="20" fill="#e8672b"/></g>
  <!-- Modern sink -->
  <rect x="130" y="288" width="80" height="22" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <!-- Oven/hob -->
  <rect x="350" y="285" width="50" height="25" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="365" cy="298" r="6" fill="#555"/>
  <circle cx="385" cy="298" r="6" fill="#555"/>
  <!-- Island -->
  <rect x="560" y="250" width="160" height="80" rx="5" fill="#2a2a2a"/>
  <rect x="560" y="330" width="160" height="5" fill="#e8672b"/>
  <!-- After label -->
  <rect x="300" y="30" width="200" height="50" rx="25" fill="#e8672b"/>
  <text x="400" y="62" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">DESPUÉS</text>
  <text x="400" y="555" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="16">Cocina moderna - Instalación completa</text>
