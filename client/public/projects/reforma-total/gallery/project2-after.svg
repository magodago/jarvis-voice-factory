<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs><linearGradient id="b2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f5f5f0"/><stop offset="100%" stop-color="#e8e8e0"/></linearGradient></defs>
  <rect width="800" height="600" fill="url(#b2)"/>
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#e8672b" stroke-width="3"/>
  <!-- Modern kitchen cabinets -->
  <rect x="50" y="180" width="110" height="130" rx="4" fill="#2a2a2a"/>
  <rect x="170" y="180" width="110" height="130" rx="4" fill="#2a2a2a"/>
  <rect x="290" y="180" width="110" height="130" rx="4" fill="#2a2a2a"/>
  <rect x="410" y="180" width="110" height="130" rx="4" fill="#2a2a2a"/>
